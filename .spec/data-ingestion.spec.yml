# Backend API: external Railway service (becalm-backend repo). This repo is client_primary.
#
# SYNC ARCHITECTURE NOTE:
# PRIMARY local-arrival path: ING-011 foreground catch-up (ON_START / pull-to-refresh)
#   for Android-owned sources + Room-as-source-of-truth + immediate UploadWorker (SYNC-006).
# SECONDARY redundancy path: periodic WorkManager jobs (ING-006..010).
# ContentObserver (ING-001) covers realtime detection ONLY while process is alive.
# Events missed while process is dead are recovered via ING-011 MediaStore cursor.
# Provider fetch owner is separate from local UI source of truth:
#   backend-managed: gmail, outlook_mail, google_calendar, outlook_calendar
#   local-worker: voice, naver_imap, daum_imap

module: data-ingestion
platform: android
version: 1
# Boundary reference: docs/becalm-mvp-boundary.md

behaviors:
  - id: ING-001
    type: lifecycle
    description: "ContentObserver가 Samsung One UI Recordings/ 하위 신규 녹음 파일 저장을 감지하면 Room raw_ingestion_events에 pending 레코드를 INSERT한다. 상위 Recordings/ 폴더의 단일 SAF URI grant 하에 두 서브디렉토리('Voice Recorder/'=음성 메모, 'Call/'=통화 녹음)를 동시에 감시한다. source_type은 저장 경로로 구분: 'Voice Recorder/' 하위면 source_type='voice', 'Call/' 하위면 source_type='call_recording'. ContentObserver는 앱 프로세스가 살아있는 동안만 작동한다 — 프로세스 종료 중 발생한 이벤트는 ING-011 foreground catch-up이 MediaStore timestamp cursor로 보완한다"
    trigger: "Samsung Voice Recorder 또는 Samsung Phone(통화 녹음)이 새 .m4a 파일을 SAF-granted Recordings/ URI 하위에 저장, 앱 프로세스가 FOREGROUND 또는 BACKGROUND에서 살아있음"
    precondition: "앱 프로세스가 FOREGROUND 또는 BACKGROUND 상태, SAF tree URI 권한 보유(상위 Recordings/), Room DB 초기화 완료, ContentObserver 등록됨"
    expected: "Room raw_ingestion_events에 {source_type:'voice'|'call_recording', sync_status:'pending', retry_count:0, person_ref: 통화 녹음의 경우 MediaStore 메타데이터에서 추출 가능한 상대 번호를 E.164 정규화하여 설정(없으면 null), 음성 메모는 null, event_title: MediaStore TITLE, duration_seconds: MediaStore DURATION/1000, commitments_extracted_count:0} 레코드 1건 INSERT됨. event_snippet은 VOI-001 draft extraction 완료 후 Android가 첫 commitment.quote로 로컬 갱신"
    source: phase2-acceptance
    tests: []

  - id: ING-002
    type: lifecycle
    description: "WorkManager UploadWorker가 pending 레코드를 Railway batch 엔드포인트에 업로드하고 sync_status를 synced로 업데이트한다. 이 WorkManager periodic job은 ING-011 foreground catch-up의 보조 중복 경로다"
    trigger: "WorkManager UploadWorker 실행 (네트워크 연결 있음)"
    precondition: "Room에 sync_status='pending' raw_ingestion_events 레코드 1건 이상 존재, Supabase JWT 유효"
    expected: "POST /v1/raw_ingestion_events:batch 성공(HTTP 200 with results[]/failed[]) → results[]에 포함된 client_event_id 행만 Room sync_status='synced'로 UPDATE됨. count-only ack는 허용되지 않음. 레코드 DELETE 없음"
    source: phase2-acceptance
    tests: []

  - id: ING-003
    type: lifecycle
    description: "UploadWorker는 HTTP 응답 코드에 따라 Room 레코드를 차등 처리한다: (1) 네트워크 없음 또는 5xx/429/408/503 → retry_count 증가, exponential backoff 재시도 (2) 401 → AUTH-007 refresh 후 1회 재시도, 실패 시 재시도 (3) 400/413/422 → sync_status='quarantined'로 UPDATE, 재시도 중단 (4) 200 + failed[]에 포함된 개별 이벤트 → retryable:true면 pending 유지, retryable:false면 quarantined."
    trigger: "UploadWorker 실행 (네트워크 없음 / Railway 4xx/5xx / 200 with failed[])"
    precondition: "Room에 sync_status='pending' 레코드 존재"
    expected: "응답 코드별 분기: 5xx/429/408/503/network → sync_status='failed', retry_count+=1, WorkManager backoff 재시도 등록. 400/413/422 → sync_status='quarantined', retry_count 동결. 레코드 DELETE 없음. 200 failed[] 이벤트는 retryable 플래그에 따라 pending 유지 또는 quarantined로 UPDATE."
    source: phase2-acceptance
    tests: []

  - id: ING-004
    type: api
    description: "Railway batch upload 성공 시 HTTP 200 + row-level result payload를 반환한다. response에 포함된 각 result는 이미 user-scoped durable insert가 완료된 이벤트만 나타낸다"
    endpoint: "POST /v1/raw_ingestion_events:batch"
    precondition: "Supabase JWT Bearer 토큰 유효, body에 events[] 배열(client_event_id, source_type, timestamp 포함)"
    expected: "HTTP 200, {results:[{client_event_id, disposition, committed_at}], failed: []} — Android는 result.client_event_id 기준으로만 Room sync_status='synced'로 UPDATE됨"
    source: phase2-acceptance
    tests: []

  - id: ING-005
    type: api
    description: "Railway batch upload 시 인증 토큰 없으면 401 반환"
    endpoint: "POST /v1/raw_ingestion_events:batch"
    precondition: "Authorization 헤더 없음"
    expected: "HTTP 401, {error: 'unauthorized', message: string}"
    source: phase2-acceptance
    tests: []

  - id: ING-006
    type: lifecycle
    description: "[backend-managed 경로] Railway backend-managed Gmail sync가 신규 이메일을 server-side canonical raw_ingestion_events + source_status로 저장한다. Android는 provider fetch를 수행하지 않고 OAuth/status/manual-sync 호출만 담당한다. 인덱싱 범위는 'INBOX' + 'SENT' 두 라벨만 대상이며 Draft/Trash/Spam/Promotions/Social/Updates/Forums는 제외된다"
    trigger: "Railway Gmail sync endpoint 호출"
    precondition: "Railway에 Gmail 연결 완료, 마지막 sync 이후 INBOX 또는 SENT 라벨에 신규 메시지 1건 존재"
    expected: "Railway source_status='gmail: synced'와 server-side raw_ingestion_events(source_type='gmail')가 반영된다. Android source-management 화면은 backend status를 refresh/cache하고, Gmail provider fetch를 local worker로 실행하지 않는다. person_ref 방향은 INBOX=발신자, SENT=수신자 기준으로 정규화된다"
    source: phase2-acceptance
    tests: []

  - id: ING-007
    type: lifecycle
    description: "[backend-managed 경로] Railway backend-managed Outlook Mail sync가 신규 이메일을 server-side canonical raw_ingestion_events + source_status로 저장한다. Android는 provider fetch를 수행하지 않고 OAuth/status/manual-sync 호출만 담당한다. 인덱싱 범위는 'Inbox' + 'Sent Items' 두 폴더만 대상이며 Drafts/Deleted Items/Junk Email/Archive는 제외된다"
    trigger: "Railway Outlook Mail sync endpoint 호출"
    precondition: "Railway에 Outlook Mail 연결 완료, Inbox 또는 Sent Items에 신규 메시지 1건 존재"
    expected: "Railway source_status='outlook_mail: synced'와 server-side raw_ingestion_events(source_type='outlook_mail')가 반영된다. Android source-management 화면은 backend status를 refresh/cache하고, Outlook Mail provider fetch를 local worker로 실행하지 않는다. person_ref 방향은 Inbox=발신자, Sent Items=수신자 기준으로 정규화된다"
    source: phase2-acceptance
    tests: []

  - id: ING-008
    type: lifecycle
    description: "[local-worker 경로] 네이버/다음 IMAP sync가 신규 이메일을 Android에서 직접 IMAPS fetch + 로컬 파싱하여 Room에 저장한다. 인덱싱 범위는 provider별 INBOX + SENT special-use/fallback folder 두 개만 대상이다. Naver의 '임시보관함', '스팸메일함', '휴지통', '전체메일'과 Daum denylist folder는 제외한다. IMAP 앱 비밀번호는 Android Keystore에 보관되며 Railway로 전송되지 않는다"
    trigger: "WorkManager ImapNaverWorker 또는 ImapDaumWorker 실행"
    precondition: "Keystore에 해당 provider IMAP credential 저장됨, IMAP 연결 성공, INBOX 또는 SENT fallback folder에 신규 UID 1건 존재"
    expected: "Room raw_ingestion_events 1건(source_type='naver_imap' 또는 'daum_imap', person_ref=INBOX는 발신자/SENT는 수신자 이메일, event_title=이메일제목, event_snippet=snippet builder 결과, source_ref=UIDVALIDITY+UID envelope) + EmailBody 1건 INSERT됨. provider denylist folder UID는 INSERT되지 않음. 다음 sync 시 UIDVALIDITY 변경 감지되면 ING-013 재동기화"
    source: phase2-acceptance
    tests: []

  - id: ING-009
    type: lifecycle
    description: "[주기적 보조 경로] Railway backend-managed Google Calendar sync가 오늘의 이벤트를 canonical calendar_events / raw_ingestion_events로 저장하고, Android는 그 결과를 로컬 Room mirror로 가져온다. 취소된 이벤트는 status='cancelled'로 유지한다"
    trigger: "GoogleCalendarWorker 또는 source manual sync가 Railway calendar sync endpoint를 호출"
    precondition: "Railway에 Google Calendar 연결 완료, 오늘 캘린더 이벤트 1건 존재"
    expected: "Android Room calendar_events mirror에 source_type='google_calendar' row가 INSERT 또는 UPSERT된다. 취소된 이벤트는 hard delete 대신 status='cancelled'로 유지되고, raw_ingestion_events mirror에도 event_title/location이 반영된다"
    source: phase2-acceptance
    tests: []

  - id: ING-010
    type: lifecycle
    description: "[주기적 보조 경로] Railway backend-managed Outlook Calendar sync가 오늘의 이벤트를 canonical calendar_events / raw_ingestion_events로 저장하고, Android는 그 결과를 로컬 Room mirror로 가져온다. 취소된 이벤트는 status='cancelled'로 유지한다"
    trigger: "OutlookCalendarWorker 또는 source manual sync가 Railway calendar sync endpoint를 호출"
    precondition: "Railway에 Outlook Calendar 연결 완료, 오늘 이벤트 1건 존재"
    expected: "Android Room calendar_events mirror에 source_type='outlook_calendar' row가 INSERT 또는 UPSERT된다. 취소된 이벤트는 hard delete 대신 status='cancelled'로 유지되고, raw_ingestion_events mirror에도 event_title/location이 반영된다"
    source: phase2-acceptance
    tests: []

  - id: ING-011
    type: lifecycle
    description: "[PRIMARY local-arrival 경로] 앱 foreground 진입(ON_START) 또는 pull-to-refresh 시 Android-owned source에 대응하는 worker를 enqueue하여 catch-up sync를 수행한다. voice와 IMAP은 local worker가 Room에 직접 INSERT한다. calendar는 thin Android worker가 Railway provider fetch를 trigger하고 `CalendarEventRepository.refreshSince`로 Room projection을 갱신한다. Gmail/Outlook Mail은 backend-managed owner이므로 local foreground fan-out에서 provider worker를 실행하지 않는다"
    trigger: "앱이 ON_START 생명주기 진입 (BACKGROUND→FOREGROUND 포함) 또는 사용자 pull-to-refresh"
    precondition: "인증 완료, 최소 1개 소스 연결됨, 네트워크 연결됨"
    expected: "DataStore enabled source 중 `voice`, `naver_imap`, `daum_imap`, `google_calendar`, `outlook_calendar`만 ForegroundCatchUpScheduler dispatch table에 의해 enqueue됨. Gmail/Outlook Mail은 backend-managed flag가 true이면 enabled local source set에서 제외된다. 각 local enqueue는 독립 성공/실패 격리된다. local raw row가 생긴 source는 UploadWorker 경로로 mirror된다. 자동 ON_START catch-up은 첫 프레임/초기 navigation과 경쟁하지 않도록 짧은 지연 후 enqueue할 수 있으며, 사용자 pull-to-refresh는 지연 없이 즉시 enqueue한다"
    source: phase2-acceptance
    tests: []

  - id: ING-012
    type: lifecycle
    description: "Android-owned source adapter는 DataStore에 source별 last_cursor를 영속 저장한다. 커서 타입: voice=MediaStore DATE_MODIFIED epoch millis, naver_imap/daum_imap=per-folder UIDVALIDITY+last_UID, calendar Room projection=`calendar_events` pagination cursor. Gmail/Outlook Mail local cursor key는 backend-managed 전환 이후 legacy compatibility only이며 새 sync에서 advance하지 않는다"
    trigger: "소스 어댑터가 성공적으로 sync 완료"
    precondition: "어댑터가 최소 1건의 이벤트를 처리하거나 source API가 새 cursor를 반환"
    expected: "DataStore에 해당 소스의 last_cursor가 UPDATE됨. 다음 ING-011 실행 시 업데이트된 cursor로 API 호출함"
    source: phase2-acceptance
    tests: []

  - id: ING-013
    type: lifecycle
    description: "Android-owned cursor 무효화(IMAP UIDVALIDITY 변경 / backend mirror pagination invalidation) 시 해당 소스 어댑터가 DataStore cursor를 초기화하고 제한된 전체 재동기화를 수행한다. Gmail/Outlook Mail provider cursor invalidation은 Railway mail sync owner가 처리하며 Android local cursor invalidation 경로가 아니다"
    trigger: "소스 API가 커서 무효화 오류 반환 (IMAP UIDVALIDITY mismatch, backend pagination reset)"
    precondition: "어댑터 cursor가 DataStore에 저장됨, source API가 410 또는 UIDVALIDITY mismatch 응답"
    expected: "DataStore 해당 소스 cursor 초기화됨(null). 최근 30일 범위로 전체 재동기화 실행됨. 신규 cursor 저장됨. OverallSyncIndicator의 해당 소스 칩이 syncing 상태로 표시됨"
    source: phase2-acceptance
    tests: []

  - id: ING-014
    type: api
    description: "Railway batch upload 시 body가 max_batch_size(100) 또는 max_body_bytes(1 MiB)를 초과하면 413 반환. 클라이언트는 events[]를 50건씩 chunk하여 재전송한다"
    endpoint: "POST /v1/raw_ingestion_events:batch"
    precondition: "events[] 길이 > 100 또는 payload > 1 MiB"
    expected: "HTTP 413. UploadWorker가 events[]를 50건 단위로 분할하여 순차 재호출. Room sync_status는 분할 재전송 성공 이벤트만 synced로 UPDATE됨"
    source: phase2-acceptance
    tests: []

  - id: ING-015
    type: api
    description: "중복 client_event_id 재전송 시 서버는 200 + result(disposition='duplicate')를 반환한다 — 신규 INSERT 없이 기존 레코드 유지. 이는 ING-003의 재시도가 안전하게 반복 실행될 수 있도록 하는 멱등성 계약이다"
    endpoint: "POST /v1/raw_ingestion_events:batch"
    precondition: "이미 서버에 (user_id, client_event_id) 레코드 존재"
    expected: "HTTP 200, results=[{client_event_id, disposition:'duplicate', committed_at}] 반환. 서버 raw_ingestion_events에 신규 INSERT 없음. Android는 해당 client_event_id를 sync_status='synced'로 UPDATE함"
    source: phase2-acceptance
    tests: []

invariants:
  - "인증 완료 전(current_user_id == null)에는 foreground catch-up, periodic redundancy, manual source sync가 어떤 source worker도 enqueue하면 안 된다. pre-login startup은 worker no-op 이어야 한다"
  - "raw_ingestion_events는 Railway durable result(sync_status='synced') 확인 전까지 Room에서 DELETE되지 않는다"
  - "Transcript 및 EmailBody는 Railway 또는 Supabase로 업로드되지 않는다 (로컬 only). voice에서 서버로 나가는 텍스트는 consent 이후의 quote/event_snippet 최소치뿐이다"
  - "Gmail/Outlook OAuth 토큰은 backend-managed 연결로 Railway가 보관/refresh한다. Naver/Daum IMAP 앱 비밀번호는 Android Keystore에만 저장되며 Railway 서버로 전송되지 않는다"
  - "IMAP/voice 데이터는 Android 기기에서 직접 로컬 파싱/감지 후 구조화된 이벤트만 Railway로 업로드된다. Gmail/Outlook Mail/calendar provider fetch는 Railway owner다"
  - "Foreground catch-up dispatch table에 포함된 source worker는 병렬/독립 실행되며 한 worker의 실패가 다른 worker의 실행을 중단시키지 않는다"
  - "커서는 로그아웃 또는 앱 삭제 시 DataStore에서 삭제된다"
  - "Railway 응답 4xx(401 제외)는 영구 실패로 간주 — sync_status='quarantined'로 격리, 재시도하지 않음"
  - "동일 client_event_id의 재전송은 서버에서 멱등 처리되며 항상 200 + row-level result(disposition='duplicate') 반환 (ING-015)"
  - "이메일 인덱싱 범위는 INBOX(받은)과 SENT(보낸) 두 시스템 폴더/라벨로 제한된다 — Drafts·Trash·Spam·Archive·Promotions/Social/Updates/Forums 카테고리는 수집 금지 (ING-006..008)"
  - "Room raw_ingestion_events와 EmailBody는 timestamp 기준 30일 rolling window로 자동 삭제된다 — 단 sync_status='synced' 조건을 만족할 때만. commitments·calendar_events는 자체 lifecycle을 따르며 리텐션 삭제 대상 아님 (data-model.yml migration_notes 참조)"
