# Backend API: external Railway service (becalm-backend repo). This repo is client_primary.
module: auth
platform: android
version: 1
# Boundary reference: docs/becalm-mvp-boundary.md

behaviors:
  - id: AUTH-001
    type: api
    description: "мқҙл©”мқј+л№„л°ҖлІҲнҳёлЎң Supabase Auth лЎңк·ёмқё м„ұкіө мӢң access_token + refresh_tokenмқ„ EncryptedSharedPreferencesм—җ м ҖмһҘн•ңлӢӨ"
    endpoint: "POST /auth/v1/token?grant_type=password"
    precondition: "Supabase н”„лЎңм қнҠё мҙҲкё°нҷ”, к°Җмһ…лҗң user (email=test@becalm.com, password=ValidPass1!)"
    expected: "HTTP 200, {access_token: string, refresh_token: string} вҖ” нҶ нҒ°мқҙ EncryptedSharedPreferencesм—җ м ҖмһҘлҗЁ"
    source: phase2-acceptance
    tests: []

  - id: AUTH-002
    type: api
    description: "мһҳлӘ»лҗң л№„л°ҖлІҲнҳёлЎң лЎңк·ёмқё мӢң Supabase Authк°Җ 400мқ„ л°ҳнҷҳн•ҳкі  м•ұмқҖ LoginScreenм—җ м—җлҹ¬ л©”мӢңм§ҖлҘј н‘ңмӢңн•ңлӢӨ"
    endpoint: "POST /auth/v1/token?grant_type=password"
    precondition: "к°Җмһ…лҗң user, мһҳлӘ»лҗң password='wrongpass'"
    expected: "HTTP 400, {error: 'invalid_grant'} вҖ” LoginScreenм—җ 'мқҙл©”мқј лҳҗлҠ” л№„л°ҖлІҲнҳёк°Җ мҳ¬л°”лҘҙм§Җ м•ҠмҠөлӢҲлӢӨ' л©”мӢңм§Җ н‘ңмӢңлҗЁ"
    source: phase2-acceptance
    tests: []

  - id: AUTH-003
    type: api
    description: "Google OAuth мҶҢм…ң лЎңк·ёмқё м„ұкіө мӢң Supabase Auth м„ём…ҳмқҙ мғқм„ұлҗҳкі  нҶ нҒ°мқҙ м ҖмһҘлҗңлӢӨ"
    endpoint: "POST /auth/v1/token?grant_type=id_token"
    precondition: "Google OAuth client_id м„Өм •лҗЁ, Google кі„м •мңјлЎң лЎңк·ёмқё м„ұкіө"
    expected: "HTTP 200, {access_token: string} вҖ” м„ём…ҳ мғқм„ұ, нҶ нҒ° EncryptedSharedPreferences м ҖмһҘлҗЁ"
    source: phase2-acceptance
    tests: []

  - id: AUTH-004
    type: api
    description: "access_token л§ҢлЈҢ мӢң refresh_tokenмңјлЎң мһҗлҸҷ к°ұмӢ н•ҳкі  мһ¬мӢңлҸ„н•ңлӢӨ"
    endpoint: "POST /auth/v1/token?grant_type=refresh_token"
    precondition: "access_token л§ҢлЈҢ, refresh_token мң нҡЁ"
    expected: "HTTP 200, мғҲ access_token л°ңкёүлҗЁ вҖ” EncryptedSharedPreferences м—…лҚ°мқҙнҠёлҗЁ"
