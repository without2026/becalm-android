# Backend API: external Railway service (becalm-backend repo). This repo is client_primary.
#
# SYNC ARCHITECTURE NOTE:
# PRIMARY 100%-arrival path: ING-011 foreground catch-up (ON_START / pull-to-refresh)
#   + Room-as-source-of-truth + immediate UploadWorker (SYNC-006).
# SECONDARY redundancy path: periodic WorkManager jobs (ING-006..010).
# ContentObserver (ING-001) covers realtime detection ONLY while process is alive.
# Events missed while process is dead are recovered via ING-011 MediaStore cursor.

module: data-ingestion
platform: android
version: 1
# Boundary reference: docs/becalm-mvp-boundary.md

behaviors:
  - id: ING-001
    type: lifecycle
    description: "ContentObserver가 Samsung One UI Recordings/ 하위 신규 녹음 파일 저장을 감지하면 Room raw_ingestion_events에 pending 레코드를 INSERT한다. 상위 Recordings/ 폴더의 단일 SAF URI grant 하에 두 서브디렉토리('Voice Recorder/'=음성 메모, 'Call/'=통화 녹음)를 동시에 감시한다. source_type은 저장 경로로 구분: 'Voice Recorder/' 하위면 source_type='voice', 'Call/' 하위면 source_type='call_recording'. ContentObserver는 앱 프로세스가 살아있는 동안만 작동한다 — 프로세스 종료 중 발생한 이벤트는 ING-011 foreground catch-up이 MediaStore timestamp cursor로 보완한다"
    trigger: "Samsung Voice Recorder 또는 Samsung Phone(통화 녹음)이 새 .m4a 파일을 SAF-granted Recordings/ URI 하위에 저장, 앱 프로세스가 FOREGROUND 또는 BACKGROUND에서 살아있음"
    precondition: "앱 프로세스가 FOREGROUND 또는 BACKGROUND 상태, SAF tree URI 권한 보유(상위 Recordings/), Room DB 초기화 완료, ContentObserver 등록됨"
    expected: "Room raw_ingestion_events에 {source_type:'voice'|'call_recording', sync_status:'pending', retry_count:0, person_ref: 통화 녹음의 경우 MediaStore 메타데이터에서 추출 가능한 상대 번호를 E.164 정규화하여 설정(없으면 null), 음성 메모는 null, event_title: MediaStore TITLE, duration_seconds: MediaStore DURATION/1000, commitments_extracted_count:0} 레코드 1건 INSERT됨. event_snippet은 VOI-001 draft extraction 완료 후 Android가 첫 commitment.quote로 로컬 갱신"
    source: phase2-acceptance
    tests: []

  - id: ING-002
    type: lifecycle
    description: "WorkManager UploadWorker가 pending 레코드를 Railway batch 엔드포인트에 업로드하고 sync_status를 synced로 업데이트한다. 이 WorkManager periodic job은 ING-011 foreground catch-up의 보조 중복 경로다"
    trigger: "WorkManager UploadWorker 실행 (네트워크 연결 있음)"
    precondition: "Room에 sync_status='pending' raw_ingestion_events 레코드 1건 이상 존재, Supabase JWT 유효"
    expected: "POST /v1/raw_ingestion_events:batch 성공(HTTP 200 with results[]/failed[]) → results[]에 포함된 client_event_id 행만 Room sync_status='synced'로 UPDATE됨. count-only ack는 허용되지 않음. 레코드 DELETE 없음"
    source: phase2-acceptance
    tests: []

  - id: ING-003
    type: lifecycle
    description: "UploadWorker는 HTTP 응답 코드에 따라 Room 레코드를 차등 처리한다: (1) 네트워크 없음 또는 5xx/429/408/503 → retry_count 증가, exponential backoff 재시도 (2) 401 → AUTH-007 refresh 후 1회 재시도, 실패 시 재시도 (3) 400/413/422 → sync_status='quarantined'로 UPDATE, 재시도 중단 (4) 200 + failed[]에 포함된 개별 이벤트 → retryable:true면 pending 유지, retryable:false면 quarantined."
    trigger: "UploadWorker 실행 (네트워크 없음 / Railway 4xx/5xx / 200 with failed[])"
    precondition: "Room에 sync_status='pending' 레코드 존재"
    expected: "응답 코드별 분기: 5xx/429/408/503/network → sync_status='failed', retry_count+=1, WorkManager backoff 재시도 등록. 400/413/422 → sync_status='quarantined', retry_count 동결. 레코드 DELETE 없음. 200 failed[] 이벤트는 retryable 플래그에 따라 pending 유지 또는 quarantined로 UPDATE."
    source: phase2-acceptance
    tests: []

  - id: ING-004
    type: api
    description: "Railway batch upload 성공 시 HTTP 200 + row-level result payload를 반환한다. response에 포함된 각 result는 이미 user-scoped durable insert가 완료된 이벤트만 나타낸다"
    endpoint: "POST /v1/raw_ingestion_events:batch"
    precondition: "Supabase JWT Bearer 토큰 유효, body에 events[] 배열(client_event_id, source_type, timestamp 포함)"
    expected: "HTTP 200, {results:[{client_event_id, disposition, committed_at}], failed: []} — Android는 result.client_event_id 기준으로만 Room sync_status='synced'로 UPDATE됨"
    source: phase2-acceptance
    tests: []

  - id: ING-005
    type: api
    description: "Railway batch upload 시 인증 토큰 없으면 401 반환"
    endpoint: "POST /v1/raw_ingestion_events:batch"
    precondition: "Authorization 헤더 없음"
    expected: "HTTP 401, {error: 'unauthorized', message: string}"
    source: phase2-acceptance
    tests: []

  - id: ING-006
    type: lifecycle
    description: "[주기적 보조 경로] Gmail OAuth WorkManager periodic sync가 신규 이메일을 로컬 파싱하여 Room EmailBody + RawIngestionEvent로 저장한다. 인덱싱 범위는 사용자 주소록 기반 대화 메일로 한정: 시스템 라벨 'INBOX'(받은 편지함) + 'SENT'(보낸 편지함) 두 라벨만 대상. 'DRAFT', 'TRASH', 'SPAM', 'CATEGORY_PROMOTIONS', 'CATEGORY_SOCIAL', 'CATEGORY_UPDATES', 'CATEGORY_FORUMS'는 제외. person_ref 정규화 방향은 direction에 따라 다름: INBOX 메일은 발신자(From) 이메일, SENT 메일은 수신자(To 첫 번째) 이메일. Gmail 자격증명은 Android Keystore에 보관되며 Railway로 전송되지 않는다"
    trigger: "WorkManager GmailSyncWorker 실행 (15분 주기)"
    precondition: "Gmail OAuth 토큰 유효(Keystore 저장), Room DB 초기화, 마지막 sync 이후 INBOX 또는 SENT 라벨에 신규 메시지 1건 존재"
    expected: "Room raw_ingestion_events 1건(source_type='gmail', person_ref=INBOX는 발신자/SENT는 수신자 이메일, event_title=이메일제목, event_snippet=본문앞200자, source_ref=Gmail messageId) + EmailBody 1건 INSERT됨. Promotions/Social/Updates/Forums 카테고리 및 Draft/Trash/Spam 메일은 INSERT되지 않음"
    source: phase2-acceptance
    tests: []

  - id: ING-007
    type: lifecycle
    description: "[주기적 보조 경로] Outlook Mail Microsoft Graph WorkManager periodic sync가 신규 이메일을 로컬 파싱하여 Room에 저장한다. 인덱싱 범위는 'Inbox' + 'Sent Items' 두 메일 폴더만 대상. 'Drafts', 'Deleted Items', 'Junk Email', 'Archive'는 제외. Focused/Other 구분 없이 Inbox 전체 처리. Outlook OAuth 토큰은 Keystore에 보관되며 Railway로 전송되지 않는다"
    trigger: "WorkManager OutlookSyncWorker 실행 (15분 주기)"
    precondition: "Microsoft Graph OAuth 토큰 유효(Keystore 저장), Inbox 또는 Sent Items에 신규 메시지 1건 존재"
    expected: "Room raw_ingestion_events 1건(source_type='outlook_mail', person_ref=Inbox는 발신자/Sent Items는 수신자 이메일, event_title=이메일제목, event_snippet=본문앞200자, source_ref=Outlook messageId) + EmailBody 1건 INSERT됨. Drafts/Deleted Items/Junk Email/Archive 메일은 INSERT되지 않음"
    source: phase2-acceptance
    tests: []

  - id: ING-008
    type: lifecycle
    description: "[주기적 보조 경로] 네이버 IMAP sync가 신규 이메일을 로컬 파싱하여 Room에 저장한다. 인덱싱 범위는 IMAP folder 'INBOX'(받은 메일) + '보낸메일함'(또는 서버 반환 SENT special-use flag가 있는 폴더) 두 개만 대상. '임시보관함', '스팸메일함', '휴지통', '전체메일'은 제외. IMAP 앱 비밀번호는 Android Keystore에 보관되며 Railway로 전송되지 않는다"
    trigger: "WorkManager NaverImapSyncWorker 실행"
    precondition: "Keystore에 네이버 IMAP credential 저장됨, IMAP 연결 성공, INBOX 또는 보낸메일함에 신규 UID 1건 존재"
    expected: "Room raw_ingestion_events 1건(source_type='naver_imap', person_ref=INBOX는 발신자/보낸메일함은 수신자 이메일, event_title=이메일제목, event_snippet=본문앞200자, source_ref=UIDVALIDITY+UID) + EmailBody 1건 INSERT됨. 임시보관함/스팸메일함/휴지통/전체메일 UID는 INSERT되지 않음. 다음 sync 시 UIDVALIDITY 변경 감지되면 ING-013 재동기화"
    source: phase2-acceptance
    tests: []

  - id: ING-009
    type: lifecycle
    description: "[주기적 보조 경로] Google Calendar sync가 오늘의 이벤트를 Room CalendarEvent에 저장한다. 취소된 이벤트(Google API status='cancelled')는 하드 삭제하지 않고 Room calendar_events.status='cancelled'로 UPSERT하여 UI가 회색 처리(strike-through) 후 표시하도록 한다 — 사용자가 과거에 본 약속의 흔적을 잃지 않도록 보존"
    trigger: "WorkManager CalendarSyncWorker 실행 (1시간 주기)"
    precondition: "Google Calendar OAuth 토큰 유효(Keystore 저장), 오늘 캘린더 이벤트 1건 존재"
    expected: "Room calendar_events 1건(source_type='google_calendar', status='confirmed'|'cancelled') INSERT 또는 UPSERT됨. Google API가 deletedEvent 또는 status='cancelled'로 반환한 이벤트는 기존 row를 status='cancelled'로 UPDATE(DELETE 아님). 해당 raw_ingestion_events에 event_title=캘린더 제목, location=장소(있을 경우) 저장됨"
    source: phase2-acceptance
    tests: []

  - id: ING-010
    type: lifecycle
    description: "[주기적 보조 경로] Outlook Calendar sync가 오늘의 이벤트를 Room CalendarEvent에 저장한다. 취소된 이벤트(MS Graph isCancelled=true 또는 @removed deltaToken 응답)는 하드 삭제하지 않고 Room calendar_events.status='cancelled'로 UPSERT하여 회색 처리 후 UI에 유지한다"
    trigger: "WorkManager OutlookCalendarSyncWorker 실행"
    precondition: "Microsoft Graph Calendar 토큰 유효(Keystore 저장), 오늘 이벤트 1건 존재"
    expected: "Room calendar_events 1건(source_type='outlook_calendar', status='confirmed'|'cancelled') INSERT 또는 UPSERT됨. MS Graph가 isCancelled=true 또는 @removed 이벤트를 반환한 경우 기존 row를 status='cancelled'로 UPDATE(DELETE 아님). 해당 raw_ingestion_events에 event_title=캘린더 제목, location=장소(있을 경우) 저장됨"
    source: phase2-acceptance
    tests: []

  - id: ING-011
    type: lifecycle
    description: "[PRIMARY 100%-arrival 경로] 앱 foreground 진입(ON_START) 또는 pull-to-refresh 시 7개 사용자-facing source에 대응하는 어댑터를 병렬 코루틴으로 실행하여 catch-up sync를 수행한다. 각 어댑터는 DataStore의 last_cursor를 읽어 해당 소스의 'since cursor' API를 호출하고 신규 이벤트를 Room에 INSERT(sync_status='pending')한다. 이후 SYNC-006 즉시 업로드 워커를 enqueueUniqueWork('sync-all-upload', REPLACE)로 트리거한다"
    trigger: "앱이 ON_START 생명주기 진입 (BACKGROUND→FOREGROUND 포함) 또는 사용자 pull-to-refresh"
    precondition: "인증 완료, 최소 1개 소스 연결됨, 네트워크 연결됨"
    expected: "7개 사용자-facing source에 대응하는 어댑터가 병렬 실행됨(각 어댑터 독립 성공/실패 격리). 각 어댑터가 last_cursor 이후 신규 이벤트를 Room에 INSERT함. UploadWorker enqueueUniqueWork('sync-all-upload', REPLACE) 호출됨. DashboardScreen의 OverallSyncIndicator가 'syncing N/7' 상태로 업데이트됨"
    source: phase2-acceptance
    tests: []

  - id: ING-012
    type: lifecycle
    description: "각 소스 어댑터는 DataStore에 source별 last_cursor를 영속 저장한다. 커서 타입: voice=MediaStore DATE_MODIFIED epoch millis, gmail=history.list startHistoryId, outlook_mail=messages/delta @odata.deltaLink, naver_imap/daum_imap=UIDVALIDITY+last_UID, google_calendar=events.list syncToken, outlook_calendar=events/delta deltaLink"
    trigger: "소스 어댑터가 성공적으로 sync 완료"
    precondition: "어댑터가 최소 1건의 이벤트를 처리하거나 source API가 새 cursor를 반환"
    expected: "DataStore에 해당 소스의 last_cursor가 UPDATE됨. 다음 ING-011 실행 시 업데이트된 cursor로 API 호출함"
    source: phase2-acceptance
    tests: []

  - id: ING-013
    type: lifecycle
    description: "커서 무효화(Gmail 410 historyId 만료 / IMAP UIDVALIDITY 변경 / MS Graph 410 deltaToken stale) 시 해당 소스 어댑터가 DataStore cursor를 초기화하고 제한된 전체 재동기화(최근 30일)를 수행한다"
    trigger: "소스 API가 커서 무효화 오류 반환 (Gmail HTTP 410, IMAP UIDVALIDITY mismatch, MS Graph HTTP 410)"
    precondition: "어댑터 cursor가 DataStore에 저장됨, source API가 410 또는 UIDVALIDITY mismatch 응답"
    expected: "DataStore 해당 소스 cursor 초기화됨(null). 최근 30일 범위로 전체 재동기화 실행됨. 신규 cursor 저장됨. OverallSyncIndicator의 해당 소스 칩이 syncing 상태로 표시됨"
    source: phase2-acceptance
    tests: []

  - id: ING-014
    type: api
    description: "Railway batch upload 시 body가 max_batch_size(100) 또는 max_body_bytes(1 MiB)를 초과하면 413 반환. 클라이언트는 events[]를 50건씩 chunk하여 재전송한다"
    endpoint: "POST /v1/raw_ingestion_events:batch"
    precondition: "events[] 길이 > 100 또는 payload > 1 MiB"
    expected: "HTTP 413. UploadWorker가 events[]를 50건 단위로 분할하여 순차 재호출. Room sync_status는 분할 재전송 성공 이벤트만 synced로 UPDATE됨"
    source: phase2-acceptance
    tests: []

  - id: ING-015
    type: api
    description: "중복 client_event_id 재전송 시 서버는 200 + result(disposition='duplicate')를 반환한다 — 신규 INSERT 없이 기존 레코드 유지. 이는 ING-003의 재시도가 안전하게 반복 실행될 수 있도록 하는 멱등성 계약이다"
    endpoint: "POST /v1/raw_ingestion_events:batch"
    precondition: "이미 서버에 (user_id, client_event_id) 레코드 존재"
    expected: "HTTP 200, results=[{client_event_id, disposition:'duplicate', committed_at}] 반환. 서버 raw_ingestion_events에 신규 INSERT 없음. Android는 해당 client_event_id를 sync_status='synced'로 UPDATE함"
    source: phase2-acceptance
    tests: []

invariants:
  - "raw_ingestion_events는 Railway durable result(sync_status='synced') 확인 전까지 Room에서 DELETE되지 않는다"
  - "Transcript 및 EmailBody는 Railway 또는 Supabase로 업로드되지 않는다 (로컬 only). voice에서 서버로 나가는 텍스트는 consent 이후의 quote/event_snippet 최소치뿐이다"
  - "Gmail/Outlook OAuth 토큰 및 IMAP 앱 비밀번호는 Android Keystore에만 저장되며 Railway 서버로 전송되지 않는다"
  - "이메일/캘린더 데이터는 Android 기기에서 직접 로컬 파싱 후 구조화된 이벤트만 Railway로 업로드된다"
  - "7개 사용자-facing source에 대응하는 어댑터는 병렬 실행되며 한 어댑터의 실패가 다른 어댑터의 실행을 중단시키지 않는다"
  - "커서는 로그아웃 또는 앱 삭제 시 DataStore에서 삭제된다"
  - "Railway 응답 4xx(401 제외)는 영구 실패로 간주 — sync_status='quarantined'로 격리, 재시도하지 않음"
  - "동일 client_event_id의 재전송은 서버에서 멱등 처리되며 항상 200 + row-level result(disposition='duplicate') 반환 (ING-015)"
  - "이메일 인덱싱 범위는 INBOX(받은)과 SENT(보낸) 두 시스템 폴더/라벨로 제한된다 — Drafts·Trash·Spam·Archive·Promotions/Social/Updates/Forums 카테고리는 수집 금지 (ING-006..008)"
  - "Room raw_ingestion_events와 EmailBody는 timestamp 기준 30일 rolling window로 자동 삭제된다 — 단 sync_status='synced' 조건을 만족할 때만. commitments·calendar_events는 자체 lifecycle을 따르며 리텐션 삭제 대상 아님 (data-model.yml migration_notes 참조)"
