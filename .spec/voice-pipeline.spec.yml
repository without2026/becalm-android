module: voice-pipeline
platform: android
version: 1

behaviors:
  - id: VOI-001
    type: lifecycle
    description: "WorkManager STT Worker가 새 녹음 파일에 대해 on-device STT를 실행하고 결과를 Room Transcript에 저장한다"
    trigger: "Room raw_ingestion_events에 source_type='voice', sync_status='pending' 레코드 삽입"
    precondition: "Samsung 기기, STT 엔진(Android SpeechRecognizer 또는 Whisper.cpp) 초기화 완료, 오디오 파일 접근 가능"
    expected: "Room transcripts 1건(raw_ingestion_id 연결) INSERT됨, text 길이 > 0"
    source: phase2-acceptance
    tests: []

  - id: VOI-002
    type: lifecycle
    description: "STT 성공 후 LLM(Gemini Nano on-device)이 give/take commitment를 추출하고 Room Commitment에 저장한다"
    trigger: "Room transcripts에 신규 레코드 INSERT됨"
    precondition: "Gemini Nano AICore 사용 가능 (Android 14+, 모델 다운로드 완료), transcript text 비어있지 않음"
    expected: "Room commitments에 direction='give' 또는 direction='take', confidence > 0.0인 레코드 N건 INSERT됨 (N >= 0)"
    source: phase2-acceptance
    tests: []

  - id: VOI-003
    type: lifecycle
    description: "Gemini Nano 사용 불가 시 commitment 추출을 스킵하고 raw_ingestion_event는 그대로 Supabase로 mirror한다"
    trigger: "AICore 미지원 기기 또는 모델 미다운로드 상태에서 STT 완료"
    precondition: "Gemini Nano AICore 사용 불가, STT 성공"
    expected: "Room commitments INSERT 없음. raw_ingestion_events sync_status='pending' 유지, UploadWorker에 의해 Supabase로 업로드됨"
    source: phase2-acceptance
    tests: []

  - id: VOI-004
    type: permission
    description: "READ_MEDIA_AUDIO 권한 미부여 시 ContentObserver가 등록되지 않고 사용자에게 안내한다"
    os_permission: "READ_MEDIA_AUDIO"
    precondition: "앱 설치 직후, READ_MEDIA_AUDIO 권한 미부여"
    expected: "ContentObserver 등록 안 됨. Sentry에 onboarding_permission_denied 이벤트 전송됨"
    source: phase2-acceptance
    tests: []

  - id: VOI-005
    type: lifecycle
    description: "STT가 60초 초과 녹음에 대해 청크 분할 처리를 시도한다"
    trigger: "오디오 파일 duration > 60s인 상태에서 STT Worker 실행"
    precondition: "오디오 파일 duration = 120s, STT 엔진 초기화 완료"
    expected: "2개 이상의 청크로 분할 STT 처리됨. Room transcript에 병합된 text 저장됨 (길이 > 0)"
    source: phase2-acceptance
    tests: []

invariants:
  - "Transcript는 Supabase로 업로드되지 않는다"
  - "STT 실패 시에도 raw_ingestion_event는 보존되어 Supabase mirror 파이프라인을 타야 한다"
