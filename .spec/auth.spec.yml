    tests: []

  - id: AUTH-005
    type: api
    description: "лЎңк·ём•„мӣғ мӢң Supabase Auth м„ём…ҳмқҙ мў…лЈҢлҗҳкі  лЎңм»¬ нҶ нҒ° л°Ҹ н•ҙлӢ№ userмқҳ in-memory Room м—°кІ°мқҙ н•ҙм ңлҗңлӢӨ. Room DB нҢҢмқј(AUTH-008 к·ңм№ҷмңјлЎң user-scoped)мқҖ л””мҠӨнҒ¬м—җ мң м§Җлҗҳм–ҙ лҸҷмқј кі„м •мңјлЎң мһ¬лЎңк·ёмқё мӢң лҚ°мқҙн„°к°Җ ліөмӣҗлҗңлӢӨ. DataStoreм—җм„ң мӮ¬мҡ©мһҗлі„ cursorВ·мҳЁліҙл”© н”Ңлһҳк·ёлҸ„ ліҙмЎҙ вҖ” лӢЁ кёҖлЎңлІҢ нӮӨ(PIPA лҸҷмқҳ timestamp л“ұ current session state)лҠ” мҙҲкё°нҷ”"
    endpoint: "POST /auth/v1/logout"
    precondition: "мң нҡЁн•ң access_token"
    expected: "HTTP 204 вҖ” EncryptedSharedPreferencesмқҳ access_token/refresh_token мӮӯм ңлҗЁ, нҳ„мһ¬ userмқҳ Room DB м—°кІ°мқҖ close()лҗҳм§Җл§Ң DB нҢҢмқј(becalm_<user_id_hash>.db)мқҖ мӮӯм ңлҗҳм§Җ м•ҠмқҢ, DataStoreмқҳ user-scoped keyл“ӨмқҖ ліҙмЎҙлҗЁ. terms_acceptedлҠ” мң м§ҖлҗҳлҜҖлЎң м•ұмқҖ LoginScreenмңјлЎң м§Ғм ‘ ліөк·Җн•ңлӢӨ"
    source: phase2-acceptance
    tests: []

  - id: AUTH-006
    type: ui_interaction
    description: "мқҙмҡ©м•ҪкҙҖ лҜёлҸҷмқҳ мӢң м•ұмқҙ мў…лЈҢлҗңлӢӨ"
    screen: "TermsScreen"
    interaction: "[лҜёлҸҷмқҳ] лІ„нҠј нғӯ"
    precondition: "м•ұ мІ« мӢӨн–ү (onboarding_completed = false), TermsScreen н‘ңмӢңлҗЁ"
    expected: "м•ұ н”„лЎңм„ёмҠӨ мў…лЈҢлҗЁ (finish() нҳём¶ң). DataStore onboarding_completed = false мң м§Җ"
    source: phase2-acceptance
    tests: []

  - id: AUTH-007
    type: api
    description: "Railway API нҳём¶ң мӢң 401 мҲҳмӢ н•ҳл©ҙ Supabase AuthлЎң нҶ нҒ° к°ұмӢ  нӣ„ лҸҷмқј мҡ”мІӯмқ„ 1нҡҢ мһ¬мӢңлҸ„н•ңлӢӨ. мһ¬мӢңлҸ„лҸ„ 401мқҙл©ҙ лЎңк·ёмқё нҷ”л©ҙмңјлЎң мқҙлҸҷн•ңлӢӨ"
    endpoint: "POST /auth/v1/token?grant_type=refresh_token"
    precondition: "Railway API нҳём¶ң вҶ’ HTTP 401 мҲҳмӢ , refresh_token мң нҡЁ"
    expected: "Supabase Auth refresh м„ұкіө вҶ’ лҸҷмқј Railway API мҡ”мІӯ мһ¬мӢңлҸ„ 1нҡҢ мҲҳн–үлҗЁ. мһ¬мӢңлҸ„ м„ұкіө мӢң м •мғҒ мқ‘лӢө л°ҳнҷҳлҗЁ. мһ¬мӢңлҸ„лҸ„ 401мқҙл©ҙ LoginScreenмңјлЎң мқҙлҸҷлҗЁ"
    source: phase2-acceptance
    tests: []

  - id: AUTH-008
    type: lifecycle
    description: "Room DB нҢҢмқјмқҖ лЎңк·ёмқён•ң Supabase user_id лӢЁмң„лЎң л¶„лҰ¬лҗңлӢӨ вҖ” нҢҢмқјлӘ… к·ңм№ҷ `becalm_<sha256(user_id)[:16]>.db`. лҸҷмқј л””л°”мқҙмҠӨм—җм„ң кі„м • м „нҷҳ(мҳҲ: нҡҢмӮ¬ вҶ’ к°ңмқё) мӢң мқҙм „ кі„м •мқҳ лҚ°мқҙн„°к°Җ мғҲ кі„м • м„ём…ҳм—җ м„һмқҙм§Җ м•Ҡкі , лҸҷмқј кі„м •мңјлЎң мһ¬лЎңк·ёмқё мӢң кё°мЎҙ DB нҢҢмқјмқҙ к·ёлҢҖлЎң м—ҙл Ө лЎңм»¬ лҚ°мқҙн„°к°Җ ліөмӣҗлҗңлӢӨ. DataStoreмқҳ мӮ¬мҡ©мһҗлі„ мғҒнғң(cursor_*, contacts_permission_asked, pipa_consent_timestamp л“ұ)лҠ” лҸҷмқјн•ҳкІҢ `user_<hash>` л„Өмһ„мҠӨнҺҳмқҙмҠӨлЎң л¶„лҰ¬ м ҖмһҘ"
    trigger: "лЎңк·ёмқё м„ұкіө (AUTH-001/003/004) м§Ғнӣ„ RoomDatabase мқёмҠӨн„ҙмҠӨ мҙҲкё°нҷ”"
    precondition: "Supabase Authм—җм„ң user.id(UUID) нҡҚл“қ"
    expected: "Application contextм—җм„ң Room.databaseBuilder(ctx, AppDatabase::class.java, 'becalm_${user_id_hash}.db').build() нҳём¶ңлҗЁ. лҸҷмқј кі„м • мһ¬лЎңк·ёмқё мӢң кё°мЎҙ нҢҢмқј re-open(лҚ°мқҙн„° ліҙмЎҙ). лӢӨлҘё кі„м • лЎңк·ёмқё мӢң лі„лҸ„ нҢҢмқј мғқм„ұ. нҢҢмқј лҰ¬мҠӨнҠёлҠ” ContextCompat.getDatabasesDir()м—җ ліөмҲҳ мЎҙмһ¬ к°ҖлҠҘ. кі„м • мӮӯм ң(лҜёлһҳ) мӢңм—җл§Ң н•ҙлӢ№ нҢҢмқј Context.deleteDatabase(name) нҳём¶ң"
    source: phase2-acceptance
    tests: []

  - id: AUTH-009
    type: lifecycle
    description: "мқёмҰқ м „(pre-login) лҳҗлҠ” лЎңк·ём•„мӣғ м§Ғнӣ„м—җлҠ” user-scoped Roomм—җ мқҳмЎҙн•ҳлҠ” startup/background кІҪлЎңк°Җ мӢӨн–үлҗҳл©ҙ м•Ҳ лҗңлӢӨ. WorkManager/Hilt worker мғқм„ұкіј persisted stale work ліөмӣҗк№Ңм§Җ нҸ¬н•Ён•ҙ, foreground catch-up, periodic redundancy, source manual syncлҠ” лӘЁл‘җ AuthState.Authenticated мқҙнӣ„м—җл§Ң м—ҙлҰҙ мҲҳ мһҲлӢӨ"
    trigger: "м•ұ cold start, н”„лЎңм„ёмҠӨ foreground м§„мһ…, лЎңк·ём•„мӣғ м§Ғнӣ„"
    precondition: "current_user_id == null лҳҗлҠ” AuthRepository.observeAuthState() != Authenticated"
    expected: "BeCalmDatabaseProvider.current() к°Җ нҳём¶ңлҗҳм§Җ м•ҠмқҢ. AppRuntimeSyncCoordinatorлҠ” auth-gated no-op мғҒнғңлҘј мң м§Җн•ңлӢӨ. ForegroundCatchUpScheduler / periodic source workers / manual source sync CTAлҠ” enqueueлҘј мҲҳн–үн•ҳм§Җ м•ҠлҠ”лӢӨ. UIлҠ” Terms/Login лҳҗлҠ” cached read-only shellлЎңл§Ң м§„мһ…н•ҳл©° background worker crashк°Җ л°ңмғқн•ҳм§Җ м•ҠлҠ”лӢӨ"
    source: phase2-acceptance
    tests: []

invariants:
  - "мқёмҰқ нҶ нҒ°мқҖ EncryptedSharedPreferences лҳҗлҠ” Android Keystoreм—җл§Ң м ҖмһҘлҗңлӢӨ вҖ” plaintext м ҖмһҘ кёҲм§Җ"
