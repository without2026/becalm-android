name: Android Deterministic Gates
on:
  workflow_call:

jobs:
  gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python tools
        run: pip install pyyaml detect-secrets

      - name: Read project_root
        id: config
        run: |
          PROJECT_ROOT=$(python3 -c "
          import yaml
          with open('.pipeline/platform.yml') as f:
              print(yaml.safe_load(f).get('project_root', '.'))
          ")
          echo "root=$PROJECT_ROOT" >> "$GITHUB_OUTPUT"

      - name: Spec coverage
        run: python .pipeline/core/spec-coverage.py

      - name: Assert guard
        run: python .pipeline/core/assert-guard.py

      - name: Secret detection
        run: |
          if [ -f .secrets.baseline ]; then
            detect-secrets scan --baseline .secrets.baseline
          else
            detect-secrets scan > .secrets.baseline
            echo "[WARN] Baseline created"
          fi

      - name: Restore google-services.json
        working-directory: ${{ steps.config.outputs.root }}/android
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON_B64" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON_B64" | base64 -d > app/google-services.json
          else
            echo "[WARN] GOOGLE_SERVICES_JSON_B64 is not configured; Firebase plugins remain disabled."
          fi

      - name: Cache OWASP Dependency-Check data
        uses: actions/cache@v5
        with:
          path: ~/.gradle/dependency-check-data
          key: dependency-check-${{ runner.os }}-${{ hashFiles('android/gradle/libs.versions.toml', 'android/**/*.gradle.kts') }}
          restore-keys: |
            dependency-check-${{ runner.os }}-

      - name: Gradle dependency check
        if: ${{ env.NVD_API_KEY != '' }}
        working-directory: ${{ steps.config.outputs.root }}/android
        run: ./gradlew dependencyCheckAnalyze

      - name: Gradle dependency check task presence
        if: ${{ env.NVD_API_KEY == '' }}
        working-directory: ${{ steps.config.outputs.root }}/android
        run: |
          echo "[WARN] NVD_API_KEY is not configured; validating dependencyCheckAnalyze task only."
          ./gradlew tasks --all --console=plain | grep -q "dependencyCheckAnalyze"

      - name: Android Lint (security + a11y)
        working-directory: ${{ steps.config.outputs.root }}/android
        # AGP 8.7.3 + Kotlin 2.1.x can crash while linting debug test sources
        # through FIR/UAST. Release lint still covers the beta-distributed APK
        # surface and remains paired with unit/instrumentation test jobs.
        run: ./gradlew lintRelease

      - name: APK size check
        working-directory: ${{ steps.config.outputs.root }}/android
        run: bash ../.pipeline/adapters/android/perf-check.sh

      - name: Upload gate reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-gate-reports
          path: |
            ${{ steps.config.outputs.root }}/android/app/build/reports/
            ${{ steps.config.outputs.root }}/android/build/reports/
          if-no-files-found: ignore
