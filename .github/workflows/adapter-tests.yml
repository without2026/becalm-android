# Adapter dispatcher: routes tests to the correct platform adapter.
# Called by ci-review.yml with the adapter name from platform.yml.

name: Adapter Tests Dispatcher

on:
  workflow_call:
    inputs:
      adapter:
        description: "Adapter name from platform.yml (electron, android, etc.)"
        required: true
        type: string

jobs:
  android-tests:
    if: inputs.adapter == 'android'
    uses: ./.github/workflows/android-tests.yml
    secrets: inherit

  unsupported-adapter:
    if: inputs.adapter != 'android'
    runs-on: ubuntu-latest
    steps:
      - name: Fail unsupported adapter
        run: |
          echo "::error::No test workflow is configured for adapter=${{ inputs.adapter }}"
          exit 1

  test-result:
    runs-on: ubuntu-latest
    if: always()
    needs: [android-tests, unsupported-adapter]
    steps:
      - name: Verify at least one adapter ran
        run: |
          A="${{ needs.android-tests.result }}"
          U="${{ needs.unsupported-adapter.result }}"
          if [ "$A" = "success" ]; then
            echo "[PASS] Adapter tests completed"
          elif [ "$A" = "skipped" ] && [ "$U" = "success" ]; then
            echo "::error::No adapter matched: ${{ inputs.adapter }}"
            exit 1
          else
            echo "::error::Adapter test failed (android=$A, unsupported=$U)"
            exit 1
          fi
