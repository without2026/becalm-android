version: 1
# Boundary reference: docs/becalm-mvp-boundary.md

# BeCalm Android MVP — Data Model Contract
# Persistence: Room (local primary) + Supabase Postgres (mirror via Railway FastAPI).
# Railway is the ONLY writer to Supabase — Android does NOT call Supabase REST directly for data R/W.
# EmailBody lives in Room only — never uploaded to Railway or Supabase.
# Transcript (STT 중간 산출물): 어디에도 영속되지 않음. 음성 파이프라인은 오디오 → commitment draft를 한 번에 추출하며, 중간 transcript는 Railway 요청 lifetime 내 ephemeral로만 존재한다.
# persons_enrichment lives in Room only — never uploaded to Railway or Supabase (PIPA).

tables:
  # ---- Supabase tables (written by Railway; mirrored from Room via Railway batch API) ----

  - name: raw_ingestion_events
    columns:
      - name: id
        type: uuid
        primary: true
        nullable: false
        default: gen_random_uuid()
      - name: user_id
        type: uuid
        nullable: false
        fk: "auth.users.id"
      - name: client_event_id
        type: uuid
        nullable: false
        # Client-generated idempotency key (UUID v4). Railway uses this for upsert deduplication.
      - name: source_type
        type: text
        nullable: false
        # enum: voice | call_recording | meeting | gmail | outlook_mail | naver_imap | daum_imap | google_calendar | outlook_calendar
        # voice = Samsung 음성 녹음(Voice Recorder), call_recording = Samsung 통화 녹음(Call), meeting = 사용자가 앱에서 Recordings/BeCalm Meetings/로 저장한 미팅 오디오 또는 전사본. voice/call_recording/meeting 오디오는 동일한 Vertex AI Gemini 파이프라인(VOI-001)에서 처리되며, source_type은 UI·필터링·증거성 표시 용도로 보존된다.
        # 사용자-facing source label은 meeting='Meetings', naver_imap='Naver Email', daum_imap='Daum Email'. SourceStatusStrip/OverallSyncIndicator는 voice, meeting, gmail, outlook_mail, naver_imap, daum_imap, google_calendar, outlook_calendar의 8개 source를 기준으로 계산하고 call_recording은 별도 칩을 두지 않음.
      - name: source_ref
        type: text
        nullable: true
        # email message_id, file URI, calendar event id, etc.
      - name: counterparty_ref
        type: text
        nullable: true
        # Android Room + Railway API compatibility seed. Backend strips it before durable
        # Supabase raw_ingestion_events persistence. New source adapters MUST populate
        # source_event_participants via the batch API participants[] contract; this field
        # is not a canonical person/relation input.
      - name: event_title
        type: text
        nullable: true
        # voice/meeting audio: MediaStore TITLE 또는 SAF display name / meeting transcript: user-picked file title / email: subject / calendar: event title. Populated at ingestion time.
      - name: event_snippet
        type: text
        nullable: true
        # voice/meeting audio: Android가 draft extraction 응답을 받은 뒤 첫 번째 commitment.quote(<=100 chars)를 로컬에 반영한 값. meeting transcript: transcript extraction 응답의 첫 commitment.quote 또는 사용자 전사본 앞 200자 로컬-only preview. full transcript는 Supabase/Railway에 영속되지 않는다. / email: first 200 chars of body / calendar: null
      - name: duration_seconds
        type: int
        nullable: true
        # voice/call_recording/meeting audio only: MediaStore DURATION / 1000 or resolver metadata. null for transcript-only and non-audio sources.
      - name: location
        type: text
        nullable: true
        # calendar only: event location. null for non-calendar sources.
      - name: commitments_extracted_count
        type: int
        nullable: false
        default: "0"
        # Number of commitments extracted from this event by the LLM pipeline. Updated after extraction.
      - name: timestamp
        type: timestamptz
        nullable: false
      - name: sync_status
        type: text
        nullable: false
        default: "'pending'"
        # enum: pending | synced | failed | quarantined | awaiting_consent — Room-side tracking column, not uploaded to Supabase
        # awaiting_consent: voice/call_recording/meeting audio 및 meeting transcript source에서 사용. pipa_third_party_consent=false인 동안 Railway extraction 업로드를 보류. 동의 ON 시 자동으로 pending으로 전이 (VOI-004, MTG-006).
      - name: quarantine_reason
        type: text
        nullable: true
        # Room-side only. sync_status='quarantined'일 때 사유 enum 저장:
        # schema_invalid | source_type_unknown | timestamp_parse_error | output_truncated | internal_error | payload_too_large
        # null = non-quarantined row.
      - name: retry_count
        type: int
        nullable: false
        default: "0"
      - name: last_attempt_at
        type: timestamptz
        nullable: true
    indexes:
      - columns: [user_id, sync_status]
        type: btree
      - columns: [user_id, timestamp]
        type: btree
    rls: true

  - name: commitments
    columns:
      - name: id
        type: uuid
        primary: true
        nullable: false
        default: gen_random_uuid()
      - name: user_id
        type: uuid
        nullable: false
        fk: "auth.users.id"
      - name: item_type
        type: text
        nullable: false
        default: "'action'"
        # enum: action | schedule | decision
        # action rows participate in action_state lifecycle / reminders / Today / CommitmentManagement.
        # schedule and decision rows are persisted so PersonDetail and person timelines can surface
        # non-action outcomes from calls/meetings without forcing them through the action state machine.
      - name: direction
        type: text
        nullable: true
        # enum: give | take
        # Required only when item_type='action'. NULL for schedule / decision rows.
      - name: schedule_status
        type: text
        nullable: true
        # enum: confirmed | changed | postponed | cancelled | follow_up
        # Required only when item_type='schedule'. NULL for action / decision rows.
      - name: decision_status
        type: text
        nullable: true
        # enum: approved | rejected | chosen | deferred | ongoing
        # Required only when item_type='decision'. NULL for action / schedule rows.
      - name: counterparty_ref
        type: text
        nullable: true
        # Android Room + Railway API seed input. Backend strips it before durable Supabase commitments persistence.
        # Commitment-person linking is stored in commitment_participants.
      - name: title
        type: text
        nullable: false
      - name: description
        type: text
        nullable: true
      - name: quote
        type: text
        nullable: false
        # source_type != 'manual': verbatim text fragment extracted from source event (<=100 chars).
        # source_type == 'manual': user-authored context/note field (1..500 chars).
        # Extracted quote는 recall용 최소 evidence이며 legally sensitive — app/LLM/user edit로 요약·수정 불가. dispute는 flag만 허용.
      - name: source_event_title
        type: text
        nullable: true
        # Denormalized event_title of the source raw_ingestion_event. For display in CommitmentCard.
      - name: source_event_occurred_at
        type: timestamptz
        nullable: false
        # Timestamp of the source event (not extraction time). Required for attribution display.
      - name: due_at
        type: timestamptz
        nullable: true
        # SourceExtractedItem.due_at(ISO8601 KST)에서 정규화된 시점. 저장은 UTC, 클라이언트 렌더링·Railway 페이로드는 KST(+09:00) 고정. D-N 배지는 due_at을 local KST date로 변환 후 today와 비교
      - name: due_hint
        type: text
        nullable: true
        # LLM이 추출한 원문 시점 표현 (예: '다음주', '월말', '이번달 안'). due_at 유무와 무관하게 보존되어 UI·사용자 편집 시 원문 복원에 사용
      - name: due_is_approximate
        type: boolean
        nullable: false
        default: "false"
        # true = due_at이 명시적 날짜 아닌 hint로부터 LLM이 추론한 값. UI는 '~' prefix (예: '~4/24')로 표시하여 사용자 보정 유도
      - name: action_state
        type: text
        nullable: false
        default: "'pending'"
        # enum: pending | reminded | followed_up | completed | overdue | cancelled
        # Replaces status column. Tracks follow-through lifecycle for action rows.
        # schedule / decision rows retain the default 'pending' sentinel for storage compatibility
        # but MUST be excluded from action-state state machine / overdue / reminder queries.
        # Transitions:
        #   pending → reminded (CMT-005, user taps [리마인드])
        #   pending|reminded → followed_up (CMT-006, user taps [팔로업])
        #   pending|reminded|followed_up → completed (CMT-007, user taps [완료])
        #   pending|reminded|followed_up → overdue (CMT-011, system auto when due_at < now() - 24h AND not completed/cancelled)
        #   pending|reminded|followed_up → cancelled (CMT-012, user taps [취소])
        #   overdue → followed_up|completed|cancelled (user can still act on overdue items)
        #   completed → pending (CMT-013 undo within 5s Snackbar window)
        #   cancelled → pending (CMT-013 undo within 5s Snackbar window)
      - name: source_type
        type: text
        nullable: false
        # enum: voice | call_recording | meeting | gmail | outlook_mail | naver_imap | daum_imap | google_calendar | outlook_calendar | manual
        # 'manual' = user-created via CommitmentCreateSheet (manual-commitment.spec.yml MAN-001..006). No associated raw_ingestion_events row.
        # UI label mapping: meeting -> 'Meetings', naver_imap -> 'Naver Email', daum_imap -> 'Daum Email'. call_recording은 source provenance 보존용이며 Today/Settings의 source status count에는 포함되지 않는다.
      - name: source_ref
        type: text
        nullable: true
      - name: confidence
        type: float
        nullable: false
        default: "0.0"
      - name: sync_status
        type: text
        nullable: false
        default: "'pending'"
      - name: created_at
        type: timestamptz
        nullable: false
        default: now()
      - name: updated_at
        type: timestamptz
        nullable: false
        default: now()
      - name: last_edited_by
        type: uuid
        nullable: true
        fk: "auth.users.id"
        # Set on every user-initiated edit/dispute/delete/supersede (commitment-edit.spec.yml EDIT-003). NULL for unedited LLM-extracted commitments and for system-auto transitions (e.g., CMT-011 overdue sweep).
      - name: last_edited_at
        type: timestamptz
        nullable: true
        # Timestamp of most recent user edit. Displayed as '마지막 수정: {M/d HH:mm} (본인)' on CommitmentDetailSheet (EDIT-008).
      - name: quote_disputed
        type: boolean
        nullable: false
        default: "false"
        # true = user flagged the quote as inaccurate/misleading (EDIT-005). The quote string itself is never modified — only this flag + quote_disputed_at.
      - name: quote_disputed_at
        type: timestamptz
        nullable: true
        # Set when quote_disputed transitions false→true. Cleared back to NULL when user taps [이의 제기 해제].
      - name: deleted_at
        type: timestamptz
        nullable: true
        # Soft delete marker (EDIT-006). All client queries MUST include `WHERE deleted_at IS NULL` filter. Distinct from action_state='cancelled': deleted=mis-extracted/spurious record, cancelled=valid commitment that was invalidated.
      - name: supersedes_commitment_id
        type: uuid
        nullable: true
        fk: "commitments.id"
        # Non-null on the NEW commitment created via EDIT-007 supersede flow (old row is soft-deleted via deleted_at=now()). Forms a chain queryable for post-MVP '이전 버전 보기' UI. quote + source_event_* are copied from the predecessor.
    indexes:
      - columns: [user_id, item_type, action_state, due_at]
        type: btree
        # idx_commitments_user_action_due — supports action-only CommitmentManagementScreen / Today queries. Queries MUST still filter `deleted_at IS NULL` at application level.
      - columns: [user_id, sync_status]
        type: btree
      - columns: [user_id, counterparty_ref, due_at]
        type: btree
        # idx_commitments_user_counterparty_due — supports local counterparty-scoped edit/search paths only. Person UI uses commitment_participants/person_id.
      - columns: [user_id, deleted_at]
        type: btree
        # idx_commitments_user_deleted — supports fast exclusion of soft-deleted rows across all list screens. Postgres partial index `WHERE deleted_at IS NULL` is optional perf optimization (post-MVP).
      - columns: [supersedes_commitment_id]
        type: btree
        # idx_commitments_supersedes — reverse-chain lookup for history walk (post-MVP).
    rls: true

  - name: calendar_events
    columns:
      - name: id
        type: uuid
        primary: true
        nullable: false
        default: gen_random_uuid()
      - name: user_id
        type: uuid
        nullable: false
        fk: "auth.users.id"
      - name: source_type
        type: text
        nullable: false
        # enum: google_calendar | outlook_calendar
      - name: source_ref
        type: text
        nullable: true
        # External calendar event ID for upsert
      - name: title
        type: text
        nullable: false
      - name: start_at
        type: timestamptz
        nullable: false
      - name: end_at
        type: timestamptz
        nullable: false
      - name: attendees_raw
        type: text
        nullable: true
      - name: status
        type: text
        nullable: false
        default: "'confirmed'"
        # enum: confirmed | cancelled
        # 취소된 이벤트도 하드 삭제하지 않고 status='cancelled'로 보존하여 UI에서 회색 처리(strike-through) 후 노출 — 사용자가 과거에 본 약속의 흔적을 잃지 않도록 함 (ING-009, ING-010)
      - name: recurring_event_id
        type: text
        nullable: true
        # Google Calendar: recurringEventId (master event ID for instances). Microsoft Graph: seriesMasterId. NULL for non-recurring events. Enables UI grouping ('반복 — 매주 월') and series-level operations post-MVP. Multiple rows may share the same recurring_event_id — each represents one occurrence instance.
      - name: original_start_at
        type: timestamptz
        nullable: true
        # Google Calendar: originalStartTime (instance의 원래 시각, 이동/오버라이드 감지용). Microsoft Graph: originalStart. NULL for first-time-generated instances. When an instance is rescheduled (start_at != original_start_at) UI can show '원래: M/d HH:mm'. Used by ING-009/010 to detect override-vs-cancel distinction.
      - name: sync_status
        type: text
        nullable: false
        default: "'pending'"
    indexes:
      - columns: [user_id, start_at]
        type: btree
      - columns: [user_id, status, start_at]
        type: btree
        # idx_calendar_events_user_status_start — TodayTimelineScreen에서 status='confirmed' 필터링과 회색 처리 분리 쿼리 지원
      - columns: [user_id, recurring_event_id]
        type: btree
        # idx_calendar_events_user_recurring — series-level lookup for master-event view (post-MVP).
    rls: true

  # ---- Room-only table (never uploaded to Railway or Supabase) ----

  - name: user_profile
    # Supabase 미러 있음 — 단일 로그인 계정당 1행. phone_e164_self는 Gemini voice 프롬프트의 speaker 식별에 쓰여 서버 전송이 불가피하므로 Supabase에 저장.
    columns:
      - name: user_id
        type: uuid
        primary: true
        nullable: false
        fk: "auth.users.id"
      - name: display_name_override
        type: text
        nullable: true
        # 사용자가 직접 입력한 표시명. null이면 Supabase Auth email local-part 또는 Google OAuth display_name 사용
      - name: phone_e164_self
        type: text
        nullable: true
        # 사용자 본인 전화번호 (E.164). voice/call_recording 프롬프트에서 "화자 중 +8210xxxx가 사용자이고 나머지는 상대방" 컨텍스트 제공. 미등록 시 Gemini는 speaker diarization 없이 direction 추정 — 정확도 저하. 온보딩 12단계에 입력 단계 없음 — Settings > 내 프로필에서 사용자 직접 입력
      - name: timezone
        type: text
        nullable: false
        default: "'Asia/Seoul'"
        # IANA tz. MVP는 Asia/Seoul 고정이지만 컬럼 보존 — 해외 출장 use case post-MVP
      - name: preferred_locale
        type: text
        nullable: false
        default: "'ko'"
        # MVP는 'ko' 고정
      - name: created_at
        type: timestamptz
        nullable: false
        default: now()
      - name: updated_at
        type: timestamptz
        nullable: false
        default: now()
    indexes: []
    rls: true

  - name: email_body
    room_only: true
    # PIPA invariant: 이메일 원문은 온디바이스 전용. Railway/Supabase DB persist 금지. 자동 age-based 삭제 대상이 아니며 사용자의 명시적 source archive 삭제 액션으로만 제거.
    columns:
      - name: id
        type: uuid
        primary: true
        nullable: false
        default: gen_random_uuid()
      - name: raw_event_id
        type: uuid
        nullable: false
        # Room raw_ingestion_events.id FK (로컬 내 FK). Supabase 미러에는 존재하지 않음
      - name: provider_message_id
        type: text
        nullable: false
        # Gmail messageId / Microsoft Graph id / IMAP UIDVALIDITY+UID
      - name: folder
        type: text
        nullable: false
        # enum: INBOX | SENT. EMAIL-002의 person_ref 결정 및 EMAIL-001의 direction 힌트에 사용
      - name: subject
        type: text
        nullable: true
      - name: from_address
        type: text
        nullable: true
        # lowercase normalized
      - name: to_addresses
        type: text
        nullable: true
        # JSON array of {email, name?} (전체 수신자 보존 — person_ref는 [0]만 사용)
      - name: body_plain
        type: text
        nullable: true
      - name: body_html
        type: text
        nullable: true
      - name: attachments_meta
        type: text
        nullable: true
        # JSON [{filename, mime, size_bytes}]. 바이트는 다운로드 안 함 (EMAIL-004)
      - name: raw_headers
        type: text
        nullable: true
        # In-Reply-To, References 등 thread 구성 헤더를 원형 보존 (EMAIL-005, post-MVP thread view 기반)
      - name: parse_failed
        type: boolean
        nullable: false
        default: "false"
        # EMAIL-007: HTML 파싱 실패 시 true, body_plain=null + body_html=원본
      - name: group_email
        type: boolean
        nullable: false
        default: "false"
        # EMAIL-002: To 수신자 10명 초과 그룹 발송. person_ref는 null로 raw event에 저장됨
      - name: received_at
        type: timestamptz
        nullable: false
    indexes:
      - columns: [raw_event_id]
        type: btree
      - columns: [provider_message_id]

  - name: source_artifacts
    room_only: true
    # Local-first source recall archive metadata. The Markdown original lives in app-private files storage; this table stores only the relative path and integrity metadata. No Supabase/Railway mirror.
    columns:
      - name: id
        type: uuid
        primary: true
        nullable: false
        default: gen_random_uuid()
      - name: user_id
        type: uuid
        nullable: false
      - name: raw_event_id
        type: uuid
        nullable: true
        # Optional local pointer to raw_ingestion_events.id. Nullable so archive metadata can survive raw row lifecycle changes; delete-by-date targets artifacts, not raw events.
      - name: source_type
        type: text
        nullable: false
      - name: source_ref
        type: text
        nullable: true
      - name: artifact_type
        type: text
        nullable: false
        # enum: markdown_original
      - name: local_path
        type: text
        nullable: false
        # Path relative to Context.filesDir, e.g. source_archive/<user_hash>/email/2026/05/<raw_event_id>.md
      - name: sha256
        type: text
        nullable: false
      - name: byte_size
        type: integer
        nullable: false
      - name: occurred_at
        type: timestamptz
        nullable: false
      - name: created_at
        type: timestamptz
        nullable: false
      - name: updated_at
        type: timestamptz
        nullable: false
    indexes:
      - columns: [user_id, source_type, source_ref, artifact_type]
        type: btree
        unique: true
      - columns: [user_id, occurred_at]
        type: btree
      - columns: [raw_event_id]
        type: btree
        type: btree

  - name: persons_enrichment
    room_only: true
    # PIPA invariant: 연락처 데이터는 온디바이스 전용. Railway/Supabase로 전송 절대 금지.
    columns:
      - name: person_ref
        type: text
        primary: true
        nullable: false
        # Matches person_ref in raw_ingestion_events / commitments. JOIN key is purely local.
      - name: display_name
        type: text
        nullable: true
        # ContactsContract.CommonDataKinds.StructuredName.DISPLAY_NAME
      - name: nickname
        type: text
        nullable: true
        # ContactsContract.CommonDataKinds.Nickname.NAME
      - name: company
        type: text
        nullable: true
        # ContactsContract.CommonDataKinds.Organization.COMPANY
      - name: title
        type: text
        nullable: true
        # ContactsContract.CommonDataKinds.Organization.TITLE
      - name: source_contact_id
        type: text
        nullable: true
        # ContactsContract raw contact ID used for change detection in EnrichmentWorker
      - name: last_synced_at
        type: timestamptz
        nullable: false
        # Updated on every EnrichmentWorker run
    indexes:
      - columns: [person_ref]
        type: btree

relationships:
  - from: "raw_ingestion_events.user_id"
    to: "auth.users.id"
    type: many-to-one
    on_delete: cascade

  - from: "commitments.user_id"
    to: "auth.users.id"
    type: many-to-one
    on_delete: cascade

  - from: "calendar_events.user_id"
    to: "auth.users.id"
    type: many-to-one
    on_delete: cascade

  - from: "user_profile.user_id"
    to: "auth.users.id"
    type: one-to-one
    on_delete: cascade

  - from: "commitments.last_edited_by"
    to: "auth.users.id"
    type: many-to-one
    on_delete: set_null
    # MVP는 본인만 편집 가능하므로 last_edited_by == user_id가 거의 항상 성립. 계정 삭제 시 cascade 대신 set_null — 감사 레코드는 유지하되 편집자 참조만 끊음.

  - from: "commitments.supersedes_commitment_id"
    to: "commitments.id"
    type: many-to-one
    on_delete: set_null
    # 체인의 중간 node가 하드 삭제되더라도 tail node는 유지. 일반적으로 EDIT-007은 예전 row를 soft delete(deleted_at)로 보존하므로 이 FK는 cascade 대상 아님.

derived_models:
  SourceStatusProjection:
    owner: android_client_only
    source_ids: [voice, gmail, outlook_mail, naver_imap, daum_imap, google_calendar, outlook_calendar]
    description: "Today/Settings의 source status는 Room 단일 테이블 row가 아니라 Android 로컬 파생 모델이다"
    inputs:
      - "DataStore source별 connected flag / last_cursor / reconnect 필요 플래그"
      - "Android Keystore credential 또는 SAF grant 존재 여부"
      - "WorkManager/runtime sync in-flight 상태"
      - "Room raw_ingestion_events/calendar_events의 마지막 성공 동기화 보조 메타데이터"
    rules:
      - "connection_state=connected: 유효 credential/grant가 있고 사용자가 연결 해제하지 않음"
      - "connection_state=disconnected: credential/grant 부재 또는 사용자가 명시적으로 연결 해제"
      - "connection_state=error: credential 만료, cursor invalidation, source auth 실패 등 복구 필요 상태"
      - "visual_state=syncing: 해당 source sync worker가 in-flight"
      - "visual_state=error: 마지막 상태가 복구 필요 오류"
      - "visual_state=synced: 최근 성공 sync 시각 존재, 현재 오류/진행 중 아님"
      - "visual_state=idle: 그 외"
      - "Today/Settings의 voice source status는 voice + call_recording 파이프라인 상태를 단일 source로 집계한다"

  ContactsSourceProjection:
    owner: android_client_only
    source_id: contacts
    description: "Contacts pseudo-source row는 persons_enrichment + READ_CONTACTS permission으로만 파생되며 Railway/Supabase와 무관하다"
    inputs:
      - "READ_CONTACTS permission grant state"
      - "Room persons_enrichment row count"
      - "EnrichmentWorker last completion timestamp"
    rules:
      - "permission granted면 connection_state=connected, 미부여/거부면 disconnected"
      - "enrichedCount는 persons_enrichment row count"
      - "lastSyncAt은 EnrichmentWorker 마지막 성공 시각"

migration_notes:
  - "auth.users는 Supabase Auth가 관리하는 외부 테이블이다 — BeCalm이 직접 DDL하지 않음"
  - "Room 전용 엔티티 (Supabase 없음): EmailBody, source_artifacts, persons_enrichment — 개인정보(원본 텍스트, 연락처) 보호 목적으로 로컬 only. source_artifacts는 app-private Markdown 원문 archive의 metadata만 저장하며, 파일 본문과 local_path는 네트워크 DTO에 포함 금지. Transcript는 voice pipeline에서 제거되었고, 저장되는 voice/meeting audio text는 commitment.quote(<=100 chars)와 raw_ingestion_events.event_snippet뿐이다. meeting transcript 원문은 Android local archive와 Recordings/BeCalm Meetings/ 복사본에만 보존된다"
  - "Today/Settings의 source status는 별도 Room 테이블이 아니라 로컬 파생 projection이다. source status row/chip을 서버 API 또는 단일 DB row에서 직접 읽는 계약은 없다"
  - "Room RawIngestionEvent·Commitment·CalendarEvent는 Supabase row shape를 기본 mirror하되, sync_status·retry_count·last_attempt_at와 counterparty_ref는 Android-side tracking/seed 컬럼으로 Supabase durable table에는 존재하지 않음"
  - "Supabase 쓰기 경로: Android → Railway POST /v1/raw_ingestion_events:batch → Supabase INSERT. Android에서 Supabase REST 직접 쓰기 없음"
  - "client_event_id: Android에서 생성하는 UUID v4 멱등성 키. Railway가 upsert deduplication에 사용"
  - "relation intelligence 전환: Supabase와 Android Room은 canonical person/relation mirror(`persons`, `person_identities`, `source_event_participants`, `commitment_participants`, `person_interactions`)를 공유한다. Android-only sync/projection/cache 컬럼은 허용하지만 backend-managed source wiring의 기준 key는 `person_id`다"
  - "raw_ingestion_events / commitments의 상대방 seed 필드는 `counterparty_ref`로 통일한다. Android Room, DTO 내부 모델, Railway API input 모두 이 이름을 사용한다. People/PersonDetail UI 모델과 route argument는 `person_id`만 사용한다."
  - "`person_ref`는 Vertex/LLM item output schema와 Android local contacts enrichment cache(`persons_enrichment.person_ref`)의 legacy-compatible anchor 이름으로만 허용된다. raw/commitment durable schema나 People/PersonDetail primary projection에서 `person_ref` grouping/fallback은 제거됐다."
  - "commitments.status 컬럼 → action_state 컬럼으로 대체: enum이 pending|done|overdue에서 pending|reminded|followed_up|completed로 변경. Room 마이그레이션: ALTER TABLE commitments RENAME COLUMN status TO action_state; UPDATE commitments SET action_state='pending' WHERE action_state='done' OR action_state='overdue'"
  - "calendar_events.status 컬럼 (confirmed|cancelled) 신설: 취소된 캘린더 이벤트의 soft-keep을 위해. Room 마이그레이션: ALTER TABLE calendar_events ADD COLUMN status TEXT NOT NULL DEFAULT 'confirmed'; Supabase 미러는 Railway migration에서 동일 컬럼 추가. 기존 row는 default 'confirmed'로 backfill됨. ING-009/010에서 deletedEvent/isCancelled 감지 시 DELETE 대신 UPDATE status='cancelled'"
  - "commitments.due_date(date) → due_at(timestamptz) + due_hint(text) + due_is_approximate(bool) 세 컬럼으로 확장: (1) due_at은 ISO8601 KST(+09:00) 시점 — 기존 due_date의 00:00 KST 값으로 backfill, (2) due_hint는 LLM이 추출한 원문 시점 표현 ('다음주'·'월말' 등), (3) due_is_approximate는 due_at이 명시적 날짜 아닌 hint 추론 여부. Room 마이그레이션: ALTER TABLE commitments ADD COLUMN due_at INTEGER; UPDATE commitments SET due_at = strftime('%s', due_date || ' 00:00:00', '-9 hours') * 1000 WHERE due_date IS NOT NULL; ALTER TABLE commitments ADD COLUMN due_hint TEXT; ALTER TABLE commitments ADD COLUMN due_is_approximate INTEGER NOT NULL DEFAULT 0; ALTER TABLE commitments DROP COLUMN due_date. Supabase Postgres: 동일 DDL(ADD COLUMN + backfill + DROP COLUMN). 기존 index `idx_commitments_user_action_due`와 `idx_commitments_user_person_due`는 due_at 기준으로 재생성"
  - "commitments.quote 컬럼: LLM이 추출한 원문 발화/텍스트 단편(verbatim, <=100 chars). full transcript 대체물이 아니라 recall용 최소 evidence다. 앱이 절대 요약·편집하지 않으며, Railway mirror 대상이므로 Supabase RLS 적용 필수"
  - "commitments.source_event_occurred_at: 추출 시각이 아닌 원본 이벤트 발생 시각. Railway payload에 포함됨"
  - "persons_enrichment: CONTACTS 권한 부여 시 EnrichmentWorker가 ContactsContract.Data에서 읽어 채움. person_ref PRIMARY KEY — 동일 person_ref의 최신 연락처 정보로 UPSERT. 일반 로그아웃에서는 user-scoped DB와 함께 보존되며, 계정 삭제/앱 삭제 시에만 전체 삭제"
  - "Supabase 리전: ap-northeast-2 (PIPA 한국 개인정보보호법 준수)"
  - "Room DB 파일 분리 정책: DB 파일명은 `becalm_<sha256(supabase_user_id)[:16]>.db` 형식으로 user 단위 격리 (AUTH-008). 동일 디바이스에서 계정 전환·공유 시 RLS와 무관하게 로컬 레벨에서 데이터가 섞이지 않는다. 로그아웃은 해당 user의 DB 연결을 close()할 뿐 파일 삭제는 하지 않음 — 동일 계정 재로그인 시 데이터 복원"
  - "user_profile 테이블: 로그인 직후 Android가 auth session + 기본 timezone/locale로 로컬 row를 bootstrap하고, 이후 Railway `PATCH /v1/user_profile`로 mirror한다. phone_e164_self는 Settings > 내 프로필에서 사용자 직접 입력 — 미입력 시 voice 파이프라인 Gemini 프롬프트는 fallback 문구 '본인과 상대방을 구분해 direction을 추정하라'만 사용. display_name_override는 UI 상단 바 인사말 및 Gemini 프롬프트에서 활용. Supabase 미러는 export/PIPA 용도이며 MVP Android는 server→Room 역방향 sync를 사용하지 않는다"
  - "Vertex AI 리전: asia-northeast3 (서울). ZDR(Zero Data Retention) 플래그 필수. voice-pipeline v2는 Railway `POST /v1/extractions/commitments`에서 Vertex AI Gemini 2.5 Flash를 호출하며 오디오 바이트·transcript·Gemini 응답은 요청 lifetime 내 ephemeral. Railway는 draft만 반환하고, Android가 Room commitments를 먼저 갱신한 뒤 commitments:batch로 Supabase mirror를 수행한다. meeting audio도 같은 endpoint를 재사용하고 source_type은 Android Room에서 보존한다"
  - "PIPA 제3자 제공 + 국외 이전 동의(pipa_third_party_consent)는 DataStore에 저장되며 raw_ingestion_events.sync_status='awaiting_consent'와 연동. 미동의 시 voice/call_recording/meeting source에 대한 Railway extraction 업로드가 차단됨 (VOI-004, MTG-006, ONB-PIPA)"
  - "원문 보존 정책 (MVP 확정): Room raw_ingestion_events 및 연관 EmailBody/source_artifacts는 timestamp 기준 자동 삭제하지 않는다. 원문 recall은 app-private Markdown archive(source_artifacts.artifact_type='markdown_original')가 소유하며 사용자가 Privacy Management에서 특정 날짜 이전 원문 삭제를 명시 실행할 때만 source_artifacts 파일과 metadata가 삭제된다. 삭제 후에도 raw_ingestion_events·commitments·calendar_events·person index는 유지되어 timeline/context metadata가 보존된다. synced되지 않은 raw_ingestion_events는 Railway durable result 전까지 어떤 user cleanup에서도 삭제 금지. Supabase 서버 미러는 원문 본문을 저장하지 않고 raw metadata/commitments lifecycle만 따른다"
  - "RISK — Samsung Sleeping Apps: REQUEST_IGNORE_BATTERY_OPTIMIZATIONS 승인과 별개로 Samsung One UI '잠자는 앱 / 깊은 잠자는 앱' 목록이 WorkManager 주기적 작업을 최대 24시간 이상 지연시킬 수 있음(실측). 완화책: ING-011 foreground catch-up이 앱 오픈 시 100% 도달을 보장하므로 주기적 WorkManager는 보조 중복 경로로 격하. 모니터링 지표: periodic_sync_completion_rate (목표 ≥80%). 80% 미만 지속 시 deploy-gate 경고."
  - "RISK — Per-source cursor invalidation: Gmail historyId는 7일 오프라인 후 HTTP 410으로 만료됨. IMAP UIDVALIDITY 변경(메일함 재생성)은 전체 UID 시퀀스를 무효화함. backend mirror pagination도 reset될 수 있다. 각 어댑터는 이 오류를 감지하고 DataStore cursor를 초기화한 뒤 제한된 전체 재동기화를 수행해야 함 — 메일함 전체를 blind full-pull하면 안 됨 (ING-013 커버)."
  - "RISK — CONTACTS 권한 부여 범위: EnrichmentWorker는 ContactsContract.CommonDataKinds.StructuredName·Nickname·Organization만 읽음. SMS·통화기록·사진 등 접근 없음. 앱 스토어 심사 시 READ_CONTACTS 사용 목적 명시 필요 (개인화된 표시명 — 서버 전송 없음)"
  - "commitments 편집/삭제/이의제기/승계 컬럼 6개 추가: last_edited_by(uuid, fk auth.users.id), last_edited_at(timestamptz), quote_disputed(bool default false), quote_disputed_at(timestamptz), deleted_at(timestamptz), supersedes_commitment_id(uuid, fk commitments.id). Room 마이그레이션: ALTER TABLE commitments ADD COLUMN last_edited_by TEXT; ADD COLUMN last_edited_at INTEGER; ADD COLUMN quote_disputed INTEGER NOT NULL DEFAULT 0; ADD COLUMN quote_disputed_at INTEGER; ADD COLUMN deleted_at INTEGER; ADD COLUMN supersedes_commitment_id TEXT REFERENCES commitments(id) ON DELETE SET NULL; CREATE INDEX idx_commitments_user_deleted ON commitments(user_id, deleted_at); CREATE INDEX idx_commitments_supersedes ON commitments(supersedes_commitment_id). Supabase Postgres: 동일 DDL(uuid 타입·NULL allowed·FK 명시) + 선택적 `CREATE INDEX idx_commitments_user_deleted_partial ON commitments(user_id) WHERE deleted_at IS NULL` (post-MVP 최적화). 기존 row는 모든 신규 컬럼이 NULL 또는 false로 backfill — 서비스 동작에 영향 없음. 모든 클라이언트 쿼리는 `WHERE deleted_at IS NULL` 필터 추가 필수(AppDatabase DAO 레벨 일괄 적용). commitment-edit.spec.yml EDIT-001..008 및 manual-commitment.spec.yml MAN-001..006이 이 스키마를 전제로 한다."
  - "source_type enum 확장: raw_ingestion_events는 meeting을 추가해 9종(voice|call_recording|meeting|gmail|outlook_mail|naver_imap|daum_imap|google_calendar|outlook_calendar)을 허용한다. commitments.source_type은 여기에 manual을 추가해 10종을 허용한다. 수동 약속은 원본 이벤트가 없어 raw 테이블에 row를 만들지 않는다(manual-commitment.spec.yml MAN-003 invariant). 마이그레이션 DDL 변경 없음(컬럼 타입은 TEXT) — 애플리케이션 레벨 enum 검증과 Railway validation만 업데이트."
  - "calendar_events 반복 일정 컬럼 2개 추가: recurring_event_id(text, nullable), original_start_at(timestamptz, nullable). Google Calendar의 recurringEventId·originalStartTime 및 MS Graph의 seriesMasterId·originalStart에서 채운다. Room 마이그레이션: ALTER TABLE calendar_events ADD COLUMN recurring_event_id TEXT; ADD COLUMN original_start_at INTEGER; CREATE INDEX idx_calendar_events_user_recurring ON calendar_events(user_id, recurring_event_id). Supabase Postgres: 동일 DDL + 동일 index. 기존 row는 NULL backfill — 현재 동작에 영향 없음(non-recurring 이벤트는 여전히 NULL). post-MVP에서 '반복 — 매주 월' 뱃지, 시리즈 전체 [완료] 등 UI에 활용. 이동(override)된 instance는 start_at != original_start_at로 감지되어 '원래: M/d HH:mm' 보조 라벨 표시 가능."
