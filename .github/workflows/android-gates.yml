# Android deterministic gates.
# Reads .pipeline/platform.yml for project_root.

name: Android Deterministic Gates

on:
  workflow_call:
  workflow_dispatch:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python tools
        run: pip install pyyaml detect-secrets

      - name: Read project_root
        id: config
        run: |
          PROJECT_ROOT=$(python3 -c "
          import yaml
          with open('.pipeline/platform.yml') as f:
              print(yaml.safe_load(f).get('project_root', '.'))
          ")
          echo "root=$PROJECT_ROOT" >> "$GITHUB_OUTPUT"

      - name: Spec coverage
        run: python .pipeline/core/spec-coverage.py

      - name: Assert guard
        run: python .pipeline/core/assert-guard.py

      - name: Secret detection
        run: |
          if [ -f .secrets.baseline ]; then
            detect-secrets scan --baseline .secrets.baseline
          else
            detect-secrets scan > .secrets.baseline
            echo "[WARN] Baseline created"
          fi

      - name: Cache OWASP Dependency-Check data
        uses: actions/cache@v5
        with:
          path: ~/.gradle/dependency-check-data
          key: dependency-check-${{ runner.os }}-${{ hashFiles('android/gradle/libs.versions.toml', 'android/**/*.gradle.kts') }}
          restore-keys: |
            dependency-check-${{ runner.os }}-

      - name: Gradle dependency check
        if: ${{ secrets.NVD_API_KEY != '' }}
        working-directory: ${{ steps.config.outputs.root }}/android
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: ./gradlew dependencyCheckAnalyze

      - name: Gradle dependency check task presence
        if: ${{ secrets.NVD_API_KEY == '' }}
        working-directory: ${{ steps.config.outputs.root }}/android
        run: |
          echo "[WARN] NVD_API_KEY is not configured; validating dependencyCheckAnalyze task only."
          ./gradlew tasks --all --console=plain | grep -q "dependencyCheckAnalyze"

      - name: Android Lint (security + a11y)
        working-directory: ${{ steps.config.outputs.root }}/android
        run: ./gradlew lint

      - name: APK size check
        working-directory: ${{ steps.config.outputs.root }}/android
        run: bash ../.pipeline/adapters/android/perf-check.sh
