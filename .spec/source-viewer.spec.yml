# Backend API: external Railway service (becalm-backend repo). This repo is client_primary.
module: source-viewer
platform: android
version: 1
# Boundary reference: docs/becalm-mvp-boundary.md

behaviors:
  - id: SRC-001
    type: ui_interaction
    description: "PersonsScreen 진입 시 인터랙션이 있는 인물 목록이 인물 중심 섹션으로 표시된다. 미이행 약속이 있는 인물을 '미이행 약속' 섹션에 먼저 표시하고, 나머지는 most_recent_event_time 내림차순 '최근 연락' 섹션에 표시한다. 각 카드에 persons_enrichment 기반 표시명(display_name 또는 nickname, 없으면 person_ref 원본값) + company/title(있을 경우) + 채널 아이콘 클러스터 + 미이행 약속 건수 DNBadge + 최근 이벤트 미리보기 + 타임스탬프 표시됨"
    screen: "PersonsScreen"
    interaction: "화면 진입"
    precondition: "인증 완료, Room에 person_ref='+821012345678' raw_ingestion_events 2건(voice 1, gmail 1) + persons_enrichment {display_name='김철수', company='ABC Corp', title='팀장'} + 미이행 Commitment 2건 존재"
    expected: "'미이행 약속' 섹션에 인물 카드 표시됨. 표시명: '김철수 · ABC Corp · 팀장'. 채널 아이콘: 음성+이메일. DNBadge: '미이행 2건'. 같은 섹션 안에서는 더 최근 이벤트를 가진 인물이 상단. 커서 기반 페이지네이션(limit=20)"
    source: phase2-acceptance
    tests: []

  - id: SRC-002
    type: ui_interaction
    description: "인물 카드 탭 시 PersonDetailScreen으로 이동하며 헤더에 enriched 정보(full_name, nickname, company, title, 이벤트 수, 미이행 약속 수)와 기존 raw/calendar/commitment에서 파생한 이메일/통화/미팅/약속 통계가 표시되고, 본문에는 source 필터(All/Email/Call/Meeting/Commitment)와 단일 timeline이 표시된다"
    screen: "PersonDetailScreen"
    interaction: "인물 카드 탭"
    precondition: "PersonsScreen에 person_ref='+821012345678' 카드 표시됨. persons_enrichment {display_name='김철수', nickname='철수', company='ABC Corp', title='팀장'}. Room에 voice 1건 + gmail 1건 + give Commitment 1건(pending) + take Commitment 1건(completed)"
    expected: "PersonDetailScreen 표시됨. 헤더: '김철수(철수) · ABC Corp · 팀장 · 이벤트 2건 · 미이행 약속 1건'. source 필터 표시됨. All timeline에는 pending Commitment, completed Commitment, voice, gmail 이벤트가 source_event_time 내림차순으로 표시됨. Email 필터는 gmail 이벤트만, Commitment 필터는 pending/completed Commitment만 표시함"
    source: phase2-acceptance
    tests: []

  - id: SRC-003
    type: ui_interaction
    description: "인물 검색 — 이름·이메일·전화번호 substring으로 Room 기반 목록을 클라이언트 필터링한다"
    screen: "PersonsScreen"
    interaction: "검색창에 'lee' 입력"
    precondition: "Room에 person_ref='lee@corp.com' 1건 + person_ref='+821012345678'(display_name='김철수') 1건 존재"
    expected: "'lee@corp.com' 카드만 표시됨. 김철수 카드 숨겨짐. 검색어 지우면 전체 목록 복원됨"
    source: phase2-acceptance
    tests: []

  - id: SRC-004
    type: ui_interaction
    description: "이벤트 항목 탭 시 원시 이벤트 상세 시트가 표시된다 — 소스 타입별 상세: voice(event_title, duration_seconds, commitments_extracted_count, commitment별 verbatim quote), email(subject=event_title, event_snippet, EmailBody 전문), calendar(title=event_title, location, attendees_raw), 수집 타임스탬프"
    screen: "RawEventDetailSheet"
    interaction: "PersonDetailScreen 상호작용 히스토리의 이벤트 항목 탭"
    precondition: "PersonDetailScreen에 source_type='voice' 이벤트 1건 표시됨(event_title='팀 회의', duration_seconds=1800, commitments_extracted_count=2)"
    expected: "바텀 시트 열림. '팀 회의' 제목, '30분', '약속 추출 2건' 표시됨. commitment 2건 각각에 대해 verbatim quote(각 <=100 chars)가 전부 표시됨. full transcript 뷰는 없음. ingestion timestamp 표시됨"
    source: phase2-acceptance
    tests: []

  - id: SRC-005
    type: ui_interaction
    description: "Unassigned 버킷 — person_ref IS NULL인 이벤트를 별도 섹션으로 표시한다"
    screen: "PersonsScreen"
    interaction: "화면 진입"
    precondition: "Room에 person_ref=NULL raw_ingestion_events 2건 존재"
    expected: "'미분류' 섹션 표시됨. 2건의 이벤트 목록 표시됨. person_ref가 있는 인물 카드와 분리됨"
    source: phase2-acceptance
    tests: []

  - id: SRC-006
    type: gesture
    description: "pull-to-refresh 시 PersonsScreen은 Room 그룹핑 쿼리를 즉시 재실행하고, 동시에 foreground catch-up(ING-011) + 연락처 enrichment 재동기화(ENR-005)를 트리거한다. 서버 GET으로 persons 목록을 역갱신하지 않는다"
    gesture: "pull-to-refresh"
    screen: "PersonsScreen"
    precondition: "PersonsScreen 표시됨, 네트워크 연결됨"
    expected: "pull-to-refresh 즉시 Room 기반 person grouping 쿼리가 재실행된다. 동시에 ING-011로 신규 raw event가 로컬 수집되고, ENR-005가 연락처 변경을 반영한다. 둘 중 하나라도 Room 데이터를 바꾸면 인물 목록이 자동 갱신된다"
    source: phase2-acceptance
    tests: []

  - id: SRC-007
    type: lifecycle
    description: "오프라인 모드 — 네트워크 없을 때 Room 캐시로 렌더링하고 헤더에 '오프라인 — 마지막 동기화 <ts>' 배지를 표시한다"
    trigger: "PersonsScreen 진입 또는 refresh 시도 (네트워크 없음)"
    precondition: "네트워크 연결 없음, Room에 캐시된 person 데이터 존재"
    expected: "인물 목록 Room 캐시로 표시됨. 상단에 '오프라인 — 마지막 동기화 HH:mm' 배지 표시됨. 크래시 없음"
    source: phase2-acceptance
    tests: []

  - id: SRC-008
    type: ui_interaction
    description: "PersonDetailScreen 본문 단일 timeline 구조 — pending/completed commitments, raw events, calendar meetings를 source_event_time 내림차순으로 합쳐 표시하고 source 필터(All/Email/Call/Meeting/Commitment)로 좁힌다. commitments_extracted_count >= 1인 raw 이벤트 항목에 배지 표시됨"
    screen: "PersonDetailScreen"
    interaction: "화면 진입"
    precondition: "person_ref='+821012345678' 선택됨. Room에 voice 이벤트 1건(commitments_extracted_count=2) + give Commitment 2건(1건 pending, 1건 completed)"
    expected: "All 필터가 선택된 상태로 단일 timeline 표시됨. pending commitment, completed commitment, voice 이벤트가 시간 내림차순으로 표시되고 voice 이벤트에는 '약속 추출 2건' 배지가 표시됨. Commitment 필터 선택 시 commitment 2건만 표시됨"
    source: phase2-acceptance
    tests: []

invariants:
  - "원문보기(PersonDetailScreen)와 PersonsScreen 목록은 모두 Room에서 primary 조회한다 — 서버 GET으로 Room을 역갱신하지 않는다"
  - "Android Room은 backend relation intelligence의 canonical schema(`persons`, `person_identities`, `source_event_participants`, `commitment_participants`, `person_interactions`)를 mirror한다. Local-only repair/cache 컬럼과 table은 허용하되 canonical person key는 `person_id`다"
  - "People UI는 source별 raw 결과나 legacy person_ref grouping을 직접 렌더링하지 않는다 — PersonInteractionIndexWorker가 backend relation rows에서 생성한 resolved person_interactions/person_identities projection만 사용한다"
  - "Source adapter는 사람을 만들지 않는다 — sender/recipient/caller/attendee/mentioned/title 등 source-local participant를 만들고, canonical person 승격은 backend relation intelligence가 수행한다"
  - "모든 source adapter는 본문 해석 또는 give/take extraction 전에 `NormalizedSourceEvent` shape(raw event metadata + optional transient body + participants[])로 정규화한다. Email/voice/call/meeting/calendar별 fetch/store 방식은 달라도 backend extraction 및 relation persistence 입구는 같은 adapter/structured persister를 사용한다"
  - "PersonInteractionIndexWorker는 source_event_participants/commitment_participants가 없는 raw/commitment/calendar row를 person projection으로 승격하지 않는다"
  - "persons_enrichment 조인은 순수 온디바이스 Room LEFT JOIN — Railway/Supabase로 연락처 정보 전송 없음"
  - "enrichment 없는 person_id는 person_id 또는 person_identities.display_name_hint/raw_value로 표시됨 — 크래시 없음"
  - "People tab 신규 person 자동 승격은 participant + verified/contact/email/phone/manual alias anchor에 한정한다 — mentioned/title/reference/name-only 후보는 review 또는 detail reference로만 사용한다"
  - "Person detail timeline은 중복 source evidence를 projection 단계에서 collapse한다 — 같은 사람의 같은 source event는 한 번만 렌더링하고, 같은 source에서 나온 commitment는 history card 반복 대신 commitment 섹션 또는 event badge로 표현한다"
  - "Person detail은 source별 raw 결과를 별도 화면 구조로 분기하지 않는다 — 공통 person_interactions projection에서 만든 InteractionRow를 단일 timeline으로 합치고 source filter에서만 Email/Call/Meeting/Commitment를 구분한다"
  - "Calendar schedule과 email/call/meeting 원본이 시간 및 participant overlap으로 같은 약속을 가리키면 원본 email/call/meeting을 primary로 렌더링하고 calendar는 evidence 성격으로만 취급한다"
  - "voice detail은 transcript viewer가 아니라 commitment evidence viewer다 — full transcript는 저장/표시하지 않는다"
  - "teamwithout.com 프로토타입은 강한 UI reference로만 사용한다 — 직접 녹음 UI와 신규 데이터 수집/스키마 추가는 이 모듈 범위가 아니다"
