# Backend API: external Railway service (becalm-backend repo). This repo is client_primary.
module: auth
platform: android
version: 1
# Boundary reference: docs/becalm-mvp-boundary.md

behaviors:
  - id: AUTH-001
    type: api
    description: "이메일+비밀번호로 Supabase Auth 로그인 성공 시 access_token + refresh_token을 EncryptedSharedPreferences에 저장한다"
    endpoint: "POST /auth/v1/token?grant_type=password"
    precondition: "Supabase 프로젝트 초기화, 가입된 user (email=test@becalm.com, password=ValidPass1!)"
    expected: "HTTP 200, {access_token: string, refresh_token: string} — 토큰이 EncryptedSharedPreferences에 저장됨"
    source: phase2-acceptance
    tests: []

  - id: AUTH-002
    type: api
    description: "잘못된 비밀번호로 로그인 시 Supabase Auth가 400을 반환하고 앱은 LoginScreen에 에러 메시지를 표시한다"
    endpoint: "POST /auth/v1/token?grant_type=password"
    precondition: "가입된 user, 잘못된 password='wrongpass'"
    expected: "HTTP 400, {error: 'invalid_grant'} — LoginScreen에 '이메일 또는 비밀번호가 올바르지 않습니다' 메시지 표시됨"
    source: phase2-acceptance
    tests: []

  - id: AUTH-003
    type: api
    description: "Google OAuth 소셜 로그인 성공 시 Supabase Auth 세션이 생성되고 토큰이 저장된다"
    endpoint: "POST /auth/v1/token?grant_type=id_token"
    precondition: "Google OAuth client_id 설정됨, Google 계정으로 로그인 성공"
    expected: "HTTP 200, {access_token: string} — 세션 생성, 토큰 EncryptedSharedPreferences 저장됨"
    source: phase2-acceptance
    tests: []

  - id: AUTH-004
    type: api
    description: "access_token 만료 시 refresh_token으로 자동 갱신하고 재시도한다"
    endpoint: "POST /auth/v1/token?grant_type=refresh_token"
    precondition: "access_token 만료, refresh_token 유효"
    expected: "HTTP 200, 새 access_token 발급됨 — EncryptedSharedPreferences 업데이트됨"
    source: phase2-acceptance
    tests: []

  - id: AUTH-005
    type: api
    description: "로그아웃 시 Supabase Auth 세션이 종료되고 로컬 토큰 및 해당 user의 in-memory Room 연결이 해제된다. Room DB 파일(AUTH-008 규칙으로 user-scoped)은 디스크에 유지되어 동일 계정으로 재로그인 시 데이터가 복원된다. DataStore에서 사용자별 cursor·온보딩 플래그도 보존 — 단 글로벌 키(PIPA 동의 timestamp 등 current session state)는 초기화"
    endpoint: "POST /auth/v1/logout"
    precondition: "유효한 access_token"
    expected: "HTTP 204 — EncryptedSharedPreferences의 access_token/refresh_token 삭제됨, 현재 user의 Room DB 연결은 close()되지만 DB 파일(becalm_<user_id_hash>.db)은 삭제되지 않음, DataStore의 user-scoped key들은 보존됨. terms_accepted는 유지되므로 앱은 LoginScreen으로 직접 복귀한다"
    source: phase2-acceptance
    tests: []

  - id: AUTH-006
    type: ui_interaction
    description: "이용약관 미동의 시 앱이 종료된다"
    screen: "TermsScreen"
    interaction: "[미동의] 버튼 탭"
    precondition: "앱 첫 실행 (onboarding_completed = false), TermsScreen 표시됨"
    expected: "앱 프로세스 종료됨 (finish() 호출). DataStore onboarding_completed = false 유지"
    source: phase2-acceptance
    tests: []

  - id: AUTH-007
    type: api
    description: "Railway API 호출 시 401 수신하면 Supabase Auth로 토큰 갱신 후 동일 요청을 1회 재시도한다. 재시도도 401이면 로그인 화면으로 이동한다"
    endpoint: "POST /auth/v1/token?grant_type=refresh_token"
    precondition: "Railway API 호출 → HTTP 401 수신, refresh_token 유효"
    expected: "Supabase Auth refresh 성공 → 동일 Railway API 요청 재시도 1회 수행됨. 재시도 성공 시 정상 응답 반환됨. 재시도도 401이면 LoginScreen으로 이동됨"
    source: phase2-acceptance
    tests: []

  - id: AUTH-008
    type: lifecycle
    description: "Room DB 파일은 로그인한 Supabase user_id 단위로 분리된다 — 파일명 규칙 `becalm_<sha256(user_id)[:16]>.db`. 동일 디바이스에서 계정 전환(예: 회사 → 개인) 시 이전 계정의 데이터가 새 계정 세션에 섞이지 않고, 동일 계정으로 재로그인 시 기존 DB 파일이 그대로 열려 로컬 데이터가 복원된다. DataStore의 사용자별 상태(cursor_*, contacts_permission_asked, pipa_consent_timestamp 등)는 동일하게 `user_<hash>` 네임스페이스로 분리 저장"
    trigger: "로그인 성공 (AUTH-001/003/004) 직후 RoomDatabase 인스턴스 초기화"
    precondition: "Supabase Auth에서 user.id(UUID) 획득"
    expected: "Application context에서 Room.databaseBuilder(ctx, AppDatabase::class.java, 'becalm_${user_id_hash}.db').build() 호출됨. 동일 계정 재로그인 시 기존 파일 re-open(데이터 보존). 다른 계정 로그인 시 별도 파일 생성. 파일 리스트는 ContextCompat.getDatabasesDir()에 복수 존재 가능. 계정 삭제(미래) 시에만 해당 파일 Context.deleteDatabase(name) 호출"
    source: phase2-acceptance
    tests: []

  - id: AUTH-009
    type: lifecycle
    description: "인증 전(pre-login) 또는 로그아웃 직후에는 user-scoped Room에 의존하는 startup/background 경로가 실행되면 안 된다. WorkManager/Hilt worker 생성과 persisted stale work 복원까지 포함해, foreground catch-up, periodic redundancy, source manual sync는 모두 AuthState.Authenticated 이후에만 열릴 수 있다"
    trigger: "앱 cold start, 프로세스 foreground 진입, 로그아웃 직후"
    precondition: "current_user_id == null 또는 AuthRepository.observeAuthState() != Authenticated"
    expected: "BeCalmDatabaseProvider.current() 가 호출되지 않음. AppRuntimeSyncCoordinator는 auth-gated no-op 상태를 유지한다. ForegroundCatchUpScheduler / periodic source workers / manual source sync CTA는 enqueue를 수행하지 않는다. UI는 Terms/Login 또는 cached read-only shell로만 진입하며 background worker crash가 발생하지 않는다"
    source: phase2-acceptance
    tests: []

  - id: AUTH-010
    type: lifecycle
    description: "SplashScreen은 transition-only gate다. cold start에서 AuthViewModel은 persisted session + terms/onboarding DataStore를 먼저 resolve한 뒤, Terms / Login / OnboardingPipaConsent / Today 중 하나로 즉시 라우팅해야 하며 indefinite blank loading shell에 머무르면 안 된다"
    trigger: "앱 cold start 직후 SplashScreen 첫 composition"
    precondition: "MainActivity 시작, Compose root mounted"
    expected: "유효 세션이 없으면 termsAccepted 값에 따라 Terms 또는 Login으로 이동. 유효 세션이 있으면 onboardingCompleted 값에 따라 OnboardingPipaConsent 또는 Today로 이동. 세션 bootstrap 실패 시 Error 상태를 통해 Terms fallback이 허용된다"
    source: phase2-acceptance
    tests: []

  - id: AUTH-011
    type: ui_interaction
    description: "TermsScreen과 LoginScreen은 public auth shell이다. 첫 렌더 시 onboarding/runtime-owner ViewModel 없이 그려질 수 있어야 하며, Terms 동의 persistence는 auth/public layer에서 처리된 뒤 Login으로 이동한다"
    screen: "TermsScreen, LoginScreen"
    interaction: "앱 cold start 후 public auth route 진입, TermsScreen에서 [계속] 탭"
    precondition: "세션 없음 또는 Terms/Login route 표시"
    expected: "첫 프레임 렌더가 onboarding/runtime-owner graph 초기화에 막히지 않음. Startup trace는 Splash route resolution, Nav destination change, Terms composition, Terms first layout을 구분할 수 있어야 한다. TermsScreen은 terms_accepted=true를 저장한 뒤 Login으로 이동한다. LoginScreen은 SignedOut 첫 렌더에서 onboarding/runtime-owner ViewModel을 생성하지 않는다. 실패 시 auth/public layer error로 남고 blank shell에 머무르지 않는다"
    source: phase2-acceptance
    tests: []

invariants:
  - "인증 토큰은 EncryptedSharedPreferences 또는 Android Keystore에만 저장된다 — plaintext 저장 금지"
  - "로그아웃 시 Room DB 데이터는 삭제하지 않는다 (로컬 데이터 보존)"
  - "모든 Railway API 호출에는 Authorization: Bearer <supabase_jwt> 헤더가 첨부된다"
  - "Room DB 파일은 user_id 기반으로 분리된다 — 한 디바이스에서 여러 계정 사용 시에도 데이터 격리가 보장된다 (AUTH-008)"
  - "AuthState.Authenticated 이전에는 어떤 worker/DAO 경로도 user-scoped Room을 lazy-open 하거나 source sync enqueue를 시작하면 안 된다; persisted stale WorkManager row 복원도 예외가 아니다 (AUTH-009)"
  - "SplashScreen은 bootstrap gate일 뿐 장기 체류 화면이 아니다; startup auth bootstrap이 끝나면 Terms / Login / Onboarding / Today 중 하나로 반드시 이행해야 한다 (AUTH-010)"
  - "public auth shell(Splash/Terms/Login)은 onboarding/runtime-owner dependency graph 없이 렌더 가능해야 한다 (AUTH-011)"
