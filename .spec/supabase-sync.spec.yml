module: supabase-sync
platform: android
version: 1

behaviors:
  - id: SYNC-001
    type: api
    description: "UploadWorker가 Room commitments를 Supabase commitments 테이블에 INSERT하고 sync_status를 synced로 업데이트한다"
    endpoint: "POST /rest/v1/commitments"
    precondition: "Room commitments에 sync_status='pending' 레코드 1건, Bearer 토큰 유효"
    expected: "HTTP 201 → Room commitments.sync_status='synced'로 UPDATE됨"
    source: phase2-acceptance
    tests: []

  - id: SYNC-002
    type: api
    description: "UploadWorker가 Room calendar_events를 Supabase calendar_events에 UPSERT한다"
    endpoint: "POST /rest/v1/calendar_events"
    precondition: "Room calendar_events에 sync_status='pending' 레코드 1건, Bearer 토큰 유효"
    expected: "HTTP 201 (또는 200 upsert) → Room calendar_events.sync_status='synced'로 UPDATE됨"
    source: phase2-acceptance
    tests: []

  - id: SYNC-003
    type: api
    description: "Supabase INSERT 실패(5xx) 시 Room 레코드의 retry_count가 증가하고 sync_status='failed'로 업데이트된다"
    endpoint: "POST /rest/v1/raw_ingestion_events"
    precondition: "Supabase 서버 500 응답 모킹, Room 레코드 retry_count=0"
    expected: "Room 레코드 sync_status='failed', retry_count=1로 UPDATE됨. WorkManager 재시도 등록됨"
    source: phase2-acceptance
    tests: []

  - id: SYNC-004
    type: lifecycle
    description: "앱 백그라운드 전환 후 WorkManager UploadWorker가 재시작되어 pending 레코드를 처리한다"
    trigger: "앱이 BACKGROUND로 전환됨"
    precondition: "Room에 sync_status='pending' 레코드 존재, WorkManager 제약: NETWORK_CONNECTED"
    expected: "네트워크 연결 시 WorkManager UploadWorker 재실행됨. pending 레코드 처리됨"
    source: phase2-acceptance
    tests: []

  - id: SYNC-005
    type: api
    description: "RLS 정책이 다른 user_id의 데이터 접근을 거부한다"
    endpoint: "GET /rest/v1/raw_ingestion_events"
    precondition: "user_id=A의 토큰으로 user_id=B의 레코드 조회 시도"
    expected: "HTTP 200, {data: []} — 빈 배열 반환 (403 또는 0건)"
    source: phase2-acceptance
    tests: []

invariants:
  - "raw_ingestion_events 도달률 100% — Supabase 확인 전까지 Room 레코드 유지"
  - "Supabase에는 commitments, calendar_events, raw_ingestion_events만 업로드됨. transcripts·email_bodies는 절대 업로드 안 됨"
