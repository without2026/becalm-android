name: Android Tests
on:
  workflow_call:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Read project_root
        id: config
        run: |
          pip install -q pyyaml 2>/dev/null || true
          PROJECT_ROOT=$(python3 -c "
          import yaml
          with open('.pipeline/platform.yml') as f:
              print(yaml.safe_load(f).get('project_root', '.'))
          ")
          echo "root=$PROJECT_ROOT" >> "$GITHUB_OUTPUT"

      - name: Unit tests
        working-directory: ${{ steps.config.outputs.root }}/android
        run: ./gradlew testDebugUnitTest --no-daemon --console=plain

  release-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Read project_root
        id: config
        run: |
          pip install -q pyyaml 2>/dev/null || true
          PROJECT_ROOT=$(python3 -c "
          import yaml
          with open('.pipeline/platform.yml') as f:
              print(yaml.safe_load(f).get('project_root', '.'))
          ")
          echo "root=$PROJECT_ROOT" >> "$GITHUB_OUTPUT"

      - name: Release build smoke
        working-directory: ${{ steps.config.outputs.root }}/android
        run: ./gradlew assembleRelease lintRelease --no-daemon --console=plain

      - name: APK size smoke
        working-directory: ${{ steps.config.outputs.root }}/android
        run: bash ../.pipeline/adapters/android/perf-check.sh

  instrumented-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Espresso tests (API 33 emulator)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          script: |
            ROOT=$(python3 -c "import yaml; print(yaml.safe_load(open('.pipeline/platform.yml')).get('project_root', '.'))")
            cd "$ROOT/android" && ./gradlew connectedDebugAndroidTest --no-daemon --console=plain

  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Read project_root
        id: config
        run: |
          pip install -q pyyaml 2>/dev/null || true
          PROJECT_ROOT=$(python3 -c "
          import yaml
          with open('.pipeline/platform.yml') as f:
              print(yaml.safe_load(f).get('project_root', '.'))
          ")
          echo "root=$PROJECT_ROOT" >> "$GITHUB_OUTPUT"

      - name: Backend tests (optional Python API)
        run: |
          ROOT="${{ steps.config.outputs.root }}"
          if [ ! -f "$ROOT/api/requirements.txt" ]; then
            echo "[INFO] No api/requirements.txt — skipping backend pytest (Kotlin-only app OK)"
            exit 0
          fi
          pip install --upgrade pip
          pip install -r "$ROOT/api/requirements.txt" 2>/dev/null || true
          pip install pytest pytest-timeout 2>/dev/null || true
          if [ ! -d "$ROOT/api/tests" ]; then
            echo "[INFO] No api/tests — skipping backend pytest"
            exit 0
          fi
          (cd "$ROOT/api" && pytest -xvs tests/ --timeout=60)
