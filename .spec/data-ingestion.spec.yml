# Backend API: external Railway service (becalm-backend repo). This repo is client_primary.
#
# SYNC ARCHITECTURE NOTE:
# PRIMARY 100%-arrival path: ING-011 foreground catch-up (ON_START / pull-to-refresh)
#   + Room-as-source-of-truth + immediate UploadWorker (SYNC-006).
# SECONDARY redundancy path: periodic WorkManager jobs (ING-006..010).
# ContentObserver (ING-001) covers realtime detection ONLY while process is alive.
# Events missed while process is dead are recovered via ING-011 MediaStore cursor.

module: data-ingestion
platform: android
version: 1

behaviors:
  - id: ING-001
    type: lifecycle
    description: "ContentObserver가 Samsung Voice Recorder 신규 녹음 파일 저장을 감지하면 Room raw_ingestion_events에 pending 레코드를 INSERT한다. ContentObserver는 앱 프로세스가 살아있는 동안만 작동한다 — 프로세스 종료 중 발생한 이벤트는 ING-011 foreground catch-up이 MediaStore timestamp cursor로 보완한다"
    trigger: "Samsung Voice Recorder가 새 .m4a 파일을 SAF-granted URI에 저장, 앱 프로세스가 FOREGROUND 또는 BACKGROUND에서 살아있음"
    precondition: "앱 프로세스가 FOREGROUND 또는 BACKGROUND 상태, SAF 권한 보유, Room DB 초기화 완료, ContentObserver 등록됨"
    expected: "Room raw_ingestion_events에 {source_type:'voice', sync_status:'pending', retry_count:0, person_ref:null} 레코드 1건 INSERT됨"
    source: phase2-acceptance
    tests: []

  - id: ING-002
    type: lifecycle
    description: "WorkManager UploadWorker가 pending 레코드를 Railway batch 엔드포인트에 업로드하고 sync_status를 synced로 업데이트한다. 이 WorkManager periodic job은 ING-011 foreground catch-up의 보조 중복 경로다"
    trigger: "WorkManager UploadWorker 실행 (네트워크 연결 있음)"
    precondition: "Room에 sync_status='pending' raw_ingestion_events 레코드 1건 이상 존재, Supabase JWT 유효"
    expected: "POST /v1/raw_ingestion_events:batch 성공(HTTP 200) → Room sync_status='synced'로 UPDATE됨. 레코드 DELETE 없음"
    source: phase2-acceptance
    tests: []

  - id: ING-003
    type: lifecycle
    description: "네트워크 없을 때 UploadWorker는 Room 레코드를 삭제하지 않고 retry_count를 증가시킨 뒤 exponential backoff로 재시도한다"
    trigger: "WorkManager UploadWorker 실행 (네트워크 없음 또는 Railway 응답 오류)"
    precondition: "Room에 sync_status='pending', retry_count=0인 레코드 1건 존재, 네트워크 연결 없음"
    expected: "Room 레코드 sync_status='failed', retry_count=1로 UPDATE됨. 레코드 DELETE 없음. WorkManager 재시도 스케줄 등록됨"
    source: phase2-acceptance
    tests: []

  - id: ING-004
    type: api
    description: "Railway batch upload 성공 시 HTTP 200 + ack payload 반환. Railway가 Supabase에 실제 INSERT를 수행한다"
    endpoint: "POST /v1/raw_ingestion_events:batch"
    precondition: "Supabase JWT Bearer 토큰 유효, body에 events[] 배열(client_event_id, source_type, timestamp 포함)"
    expected: "HTTP 200, {acknowledged: N, failed: []} — Room sync_status='synced'로 UPDATE됨"
    source: phase2-acceptance
    tests: []

  - id: ING-005
    type: api
    description: "Railway batch upload 시 인증 토큰 없으면 401 반환"
    endpoint: "POST /v1/raw_ingestion_events:batch"
    precondition: "Authorization 헤더 없음"
    expected: "HTTP 401, {error: 'unauthorized', message: string}"
    source: phase2-acceptance
    tests: []

  - id: ING-006
    type: lifecycle
    description: "[주기적 보조 경로] Gmail OAuth WorkManager periodic sync가 신규 이메일을 로컬 파싱하여 Room EmailBody + RawIngestionEvent로 저장한다. Gmail 자격증명은 Android Keystore에 보관되며 Railway로 전송되지 않는다"
    trigger: "WorkManager GmailSyncWorker 실행 (15분 주기)"
    precondition: "Gmail OAuth 토큰 유효(Keystore 저장), Room DB 초기화, 마지막 sync 이후 신규 메시지 1건 존재"
    expected: "Room raw_ingestion_events 1건(source_type='gmail', person_ref=발신자이메일) + EmailBody 1건 INSERT됨"
    source: phase2-acceptance
    tests: []

  - id: ING-007
    type: lifecycle
    description: "[주기적 보조 경로] Outlook Mail Microsoft Graph WorkManager periodic sync가 신규 이메일을 로컬 파싱하여 Room에 저장한다. Outlook OAuth 토큰은 Keystore에 보관되며 Railway로 전송되지 않는다"
    trigger: "WorkManager OutlookSyncWorker 실행 (15분 주기)"
    precondition: "Microsoft Graph OAuth 토큰 유효(Keystore 저장), 신규 메시지 1건 존재"
    expected: "Room raw_ingestion_events 1건(source_type='outlook_mail', person_ref=발신자이메일) + EmailBody 1건 INSERT됨"
    source: phase2-acceptance
    tests: []

  - id: ING-008
    type: lifecycle
    description: "[주기적 보조 경로] 네이버 IMAP sync가 신규 이메일을 로컬 파싱하여 Room에 저장한다. IMAP 앱 비밀번호는 Android Keystore에 보관되며 Railway로 전송되지 않는다"
    trigger: "WorkManager NaverImapSyncWorker 실행"
    precondition: "Keystore에 네이버 IMAP credential 저장됨, IMAP 연결 성공, 신규 메시지 1건"
    expected: "Room raw_ingestion_events 1건(source_type='naver_imap', person_ref=발신자이메일) + EmailBody 1건 INSERT됨"
    source: phase2-acceptance
    tests: []

  - id: ING-009
    type: lifecycle
    description: "[주기적 보조 경로] Google Calendar sync가 오늘의 이벤트를 Room CalendarEvent에 저장한다"
    trigger: "WorkManager CalendarSyncWorker 실행 (1시간 주기)"
    precondition: "Google Calendar OAuth 토큰 유효(Keystore 저장), 오늘 캘린더 이벤트 1건 존재"
    expected: "Room calendar_events 1건(source_type='google_calendar') INSERT 또는 UPSERT됨"
    source: phase2-acceptance
    tests: []

  - id: ING-010
    type: lifecycle
    description: "[주기적 보조 경로] Outlook Calendar sync가 오늘의 이벤트를 Room CalendarEvent에 저장한다"
    trigger: "WorkManager OutlookCalendarSyncWorker 실행"
    precondition: "Microsoft Graph Calendar 토큰 유효(Keystore 저장), 오늘 이벤트 1건 존재"
    expected: "Room calendar_events 1건(source_type='outlook_calendar') INSERT 또는 UPSERT됨"
    source: phase2-acceptance
    tests: []

  - id: ING-011
    type: lifecycle
    description: "[PRIMARY 100%-arrival 경로] 앱 foreground 진입(ON_START) 또는 pull-to-refresh 시 6개 소스 어댑터를 병렬 코루틴으로 실행하여 catch-up sync를 수행한다. 각 어댑터는 DataStore의 last_cursor를 읽어 해당 소스의 'since cursor' API를 호출하고 신규 이벤트를 Room에 INSERT(sync_status='pending')한다. 이후 SYNC-006 즉시 업로드 워커를 enqueueUniqueWork('sync-all-upload', REPLACE)로 트리거한다"
    trigger: "앱이 ON_START 생명주기 진입 (BACKGROUND→FOREGROUND 포함) 또는 사용자 pull-to-refresh"
    precondition: "인증 완료, 최소 1개 소스 연결됨, 네트워크 연결됨"
    expected: "6개 소스 어댑터 병렬 실행됨(각 어댑터 독립 성공/실패 격리). 각 어댑터가 last_cursor 이후 신규 이벤트를 Room에 INSERT함. UploadWorker enqueueUniqueWork('sync-all-upload', REPLACE) 호출됨. DashboardScreen의 OverallSyncIndicator가 'syncing N/6' 상태로 업데이트됨"
    source: phase2-acceptance
    tests: []

  - id: ING-012
    type: lifecycle
    description: "각 소스 어댑터는 DataStore에 source별 last_cursor를 영속 저장한다. 커서 타입: voice=MediaStore DATE_MODIFIED epoch millis, gmail=history.list startHistoryId, outlook_mail=messages/delta @odata.deltaLink, naver_imap/daum_imap=UIDVALIDITY+last_UID, google_calendar=events.list syncToken, outlook_calendar=events/delta deltaLink"
    trigger: "소스 어댑터가 성공적으로 sync 완료"
    precondition: "어댑터가 최소 1건의 이벤트를 처리하거나 source API가 새 cursor를 반환"
    expected: "DataStore에 해당 소스의 last_cursor가 UPDATE됨. 다음 ING-011 실행 시 업데이트된 cursor로 API 호출함"
    source: phase2-acceptance
    tests: []

  - id: ING-013
    type: lifecycle
    description: "커서 무효화(Gmail 410 historyId 만료 / IMAP UIDVALIDITY 변경 / MS Graph 410 deltaToken stale) 시 해당 소스 어댑터가 DataStore cursor를 초기화하고 제한된 전체 재동기화(최근 30일)를 수행한다"
    trigger: "소스 API가 커서 무효화 오류 반환 (Gmail HTTP 410, IMAP UIDVALIDITY mismatch, MS Graph HTTP 410)"
    precondition: "어댑터 cursor가 DataStore에 저장됨, source API가 410 또는 UIDVALIDITY mismatch 응답"
    expected: "DataStore 해당 소스 cursor 초기화됨(null). 최근 30일 범위로 전체 재동기화 실행됨. 신규 cursor 저장됨. OverallSyncIndicator의 해당 소스 칩이 syncing 상태로 표시됨"
    source: phase2-acceptance
    tests: []

invariants:
  - "raw_ingestion_events는 Railway ack(sync_status='synced') 확인 전까지 Room에서 DELETE되지 않는다"
  - "Transcript 및 EmailBody는 Railway 또는 Supabase로 업로드되지 않는다 (로컬 only)"
  - "Gmail/Outlook OAuth 토큰 및 IMAP 앱 비밀번호는 Android Keystore에만 저장되며 Railway 서버로 전송되지 않는다"
  - "이메일/캘린더 데이터는 Android 기기에서 직접 로컬 파싱 후 구조화된 이벤트만 Railway로 업로드된다"
  - "6개 소스 어댑터는 병렬 실행되며 한 어댑터의 실패가 다른 어댑터의 실행을 중단시키지 않는다"
  - "커서는 로그아웃 또는 앱 삭제 시 DataStore에서 삭제된다"
