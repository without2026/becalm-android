# Backend API: external Railway service (becalm-backend repo). This repo is client_primary.
module: commitment-management
platform: android
version: 1

behaviors:
  - id: CMT-001
    type: ui_interaction
    description: "CommitmentManagementScreen 진입 시 전체 약속 목록이 표시된다. 기본 탭: '전체'. 각 약속 카드에 direction 배지(내가 한/상대가 한) + quote + title + person_ref 표시명 + due_date + action_state 표시됨"
    screen: "CommitmentManagementScreen"
    interaction: "하단 탭 '약속관리' 탭"
    precondition: "인증 완료, Room에 Commitment 3건(give 2건 + take 1건) 존재"
    expected: "CommitmentManagementScreen 표시됨. 상단에 CommitmentFilterTabs(전체/내가 한/상대가 한) 표시됨. 3건 모두 표시됨. 각 카드에 quote, title, person_ref 기반 표시명, due_date, action_state 표시됨"
    source: phase2-acceptance
    tests: []

  - id: CMT-002
    type: ui_interaction
    description: "CommitmentFilterTabs — '내가 한' 탭 선택 시 direction='give' 약속만 필터링됨"
    screen: "CommitmentManagementScreen"
    interaction: "'내가 한' 탭 탭"
    precondition: "CommitmentManagementScreen 표시됨, Room에 give 2건 + take 1건"
    expected: "give 2건만 표시됨. take 1건 숨겨짐. '상대가 한' 탭 탭 시 take 1건만 표시됨. '전체' 탭 탭 시 3건 복원됨"
    source: phase2-acceptance
    tests: []

  - id: CMT-003
    type: ui_interaction
    description: "CommitmentCard 탭 시 약속 상세 시트가 열린다 — quote 전문 + 출처 정보(source_event_title, source_event_occurred_at) + person_ref 표시명 + action_state 변경 버튼"
    screen: "CommitmentDetailSheet"
    interaction: "CommitmentCard 탭"
    precondition: "CommitmentManagementScreen에 Commitment 1건 표시됨(source_event_title='2024-03-15 팀 미팅', quote='다음 주까지 보고서 제출')"
    expected: "바텀 시트 열림. quote='다음 주까지 보고서 제출' 전문 표시됨. '출처: 2024-03-15 팀 미팅' 표시됨. source_event_occurred_at 표시됨. action_state 변경 버튼([리마인드]/[팔로업]/[완료]) 표시됨"
    source: phase2-acceptance
    tests: []

  - id: CMT-004
    type: ui_interaction
    description: "D-N 배지 — due_date까지 남은 일수를 CommitmentCard에 표시한다. D-0(오늘), D-1, D-2 등. 만료된 경우 빨간색으로 'D+N' 표시됨"
    screen: "CommitmentManagementScreen"
    interaction: "화면 진입"
    precondition: "오늘 2026-04-16. Room에 Commitment 1건(due_date=2026-04-18), 1건(due_date=2026-04-16), 1건(due_date=2026-04-10)"
    expected: "2026-04-18 카드: 'D-2' 표시됨. 2026-04-16 카드: 'D-0' 표시됨. 2026-04-10 카드: 'D+6' 빨간색 표시됨"
    source: phase2-acceptance
    tests: []

  - id: CMT-005
    type: ui_interaction
    description: "[리마인드] 버튼 탭 시 상대방에게 알림을 설정한다. action_state를 'reminded'로 변경하고 Railway PATCH /v1/commitments/{id}를 호출한다"
    screen: "CommitmentDetailSheet"
    interaction: "[리마인드] 버튼 탭"
    precondition: "CommitmentDetailSheet에서 action_state='pending' Commitment 표시됨"
    expected: "Room의 commitment action_state='reminded'로 UPDATE됨. PATCH /v1/commitments/{id} {action_state: 'reminded'} 호출됨. 버튼 상태 갱신됨. AlarmManager 알림 스케줄 등록됨(due_date 당일 오전 9시)"
    source: phase2-acceptance
    tests: []

  - id: CMT-006
    type: ui_interaction
    description: "[팔로업] 버튼 탭 시 action_state를 'followed_up'으로 변경하고 Railway PATCH /v1/commitments/{id}를 호출한다"
    screen: "CommitmentDetailSheet"
    interaction: "[팔로업] 버튼 탭"
    precondition: "CommitmentDetailSheet에서 action_state='pending' 또는 'reminded' Commitment 표시됨"
    expected: "Room의 commitment action_state='followed_up'으로 UPDATE됨. PATCH /v1/commitments/{id} {action_state: 'followed_up'} 호출됨. 카드 상태 갱신됨"
    source: phase2-acceptance
    tests: []

  - id: CMT-007
    type: ui_interaction
    description: "[완료] 버튼 탭 시 action_state를 'completed'로 변경하고 완료 섹션으로 이동된다. Railway PATCH /v1/commitments/{id} 호출됨"
    screen: "CommitmentDetailSheet"
    interaction: "[완료] 버튼 탭"
    precondition: "CommitmentDetailSheet에서 action_state='pending'/'reminded'/'followed_up' Commitment 표시됨"
    expected: "Room의 commitment action_state='completed'로 UPDATE됨. PATCH /v1/commitments/{id} {action_state: 'completed'} 호출됨. 카드가 '완료된 약속' 섹션으로 이동됨"
    source: phase2-acceptance
    tests: []

  - id: CMT-008
    type: lifecycle
    description: "AlarmManager 알림 — due_date 당일 오전 9시에 push notification을 발송한다. action_state='completed'인 약속은 알림 발송 생략"
    trigger: "AlarmManager 스케줄된 알람 실행 (due_date 당일 09:00)"
    precondition: "Room에 Commitment 1건(due_date=오늘, action_state='pending' 또는 'reminded')"
    expected: "Push notification 발송됨. title: '오늘 마감 약속이 있습니다', body: commitment.title. 탭 시 CommitmentManagementScreen으로 딥링크됨. action_state='completed'인 약속은 알림 발송 없음"
    source: phase2-acceptance
    tests: []

  - id: CMT-009
    type: ui_interaction
    description: "완료된 약속 섹션 — '이행 완료' 섹션이 활성 약속 목록 아래에 접힌 상태로 표시된다. 탭 시 펼쳐져 completed commitments 목록이 표시됨"
    screen: "CommitmentManagementScreen"
    interaction: "'이행 완료' 섹션 헤더 탭"
    precondition: "CommitmentManagementScreen 표시됨, Room에 action_state='completed' Commitment 2건 + action_state='pending' 1건"
    expected: "상단: pending 1건 표시됨. 하단: '이행 완료 (2)' 섹션 헤더 표시됨. 헤더 탭 시 completed 2건 펼쳐짐. 완료 카드는 회색 처리(dimmed)됨"
    source: phase2-acceptance
    tests: []

  - id: CMT-010
    type: gesture
    description: "pull-to-refresh 시 Railway GET /v1/commitments를 재호출하고 Room 캐시를 갱신한다"
    gesture: "pull-to-refresh"
    screen: "CommitmentManagementScreen"
    precondition: "CommitmentManagementScreen 표시됨, 네트워크 연결됨"
    expected: "GET /v1/commitments 호출됨(현재 action_state 필터 유지). Room 갱신됨. 목록 업데이트됨"
    source: phase2-acceptance
    tests: []

invariants:
  - "CommitmentManagementScreen은 Room(로컬) 데이터를 primary source로 사용한다"
  - "action_state 변경은 Room 즉시 UPDATE + Railway PATCH /v1/commitments/{id} 비동기 호출 순서로 처리된다"
  - "PATCH /v1/commitments/{id} 실패 시 Room의 action_state는 낙관적 업데이트 상태를 유지하고 sync_status='pending'으로 재시도 큐에 등록된다"
  - "AlarmManager 알림은 action_state='completed' 약속에 대해 발송하지 않는다"
  - "quote 필드는 원문 그대로 표시된다 — 요약 또는 편집 없음"
