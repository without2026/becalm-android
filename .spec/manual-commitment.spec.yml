# Backend API: external Railway service (becalm-backend repo). This repo is client_primary.
#
# 이 스펙은 과거 "신규 수동 약속 추가" 경로를 더 이상 primary UX로 노출하지 않는
# boundary를 codify한다. Commitments 탭의 + 버튼은 MAN-001 수동 폼이 아니라
# message-screenshot-ingestion.spec.yml의 evidence import sheet를 연다.
#
# 남는 사용 상황: commitment-edit.spec.yml EDIT-007 supersede 경로의 내부 입력 화면.
# 사용자가 원본 evidence 없이 새 약속을 직접 만드는 경로는 신규 entry point가 없다.

module: manual-commitment
platform: android
version: 3

behaviors:
  - id: MAN-001
    type: ui_interaction
    description: "CommitmentManagementScreen 우하단 + 버튼은 신규 manual CommitmentCreateSheet를 열지 않는다. 대신 evidence import sheet를 연다"
    screen: "CommitmentManagementScreen"
    interaction: "FAB [+] 탭"
    precondition: "CommitmentManagementScreen 표시됨"
    expected: "CommitmentCreateSheet 빈 폼은 열리지 않는다. 화면에는 '증거 추가' sheet가 표시되고 메신저 스크린샷, 회의 녹음, 회의 전사본 import action이 보인다. 신규 manual source_type row는 생성되지 않는다"
    source: phase2-acceptance
    tests:
      - "CommitmentManagementScreenTest.commitment_management_fab_opens_evidence_import_sheet"

  - id: MAN-002
    type: ui_interaction
    description: "CommitmentCreateSheet는 EDIT-007 supersede 내부 경로 전용이다. quote 필드는 기존 source evidence에서 복사되어 읽기 전용으로 표시된다"
    screen: "CommitmentCreateSheet"
    interaction: "EDIT-007 supersede 진입"
    precondition: "기존 commitment를 다른 약속으로 교체하는 흐름"
    expected: "supersedeOf가 없는 빈 생성 모드는 존재하지 않는다. source_type/source_ref/source_event_title/source_event_occurred_at/quote는 원본 commitment에서 상속된다. quote는 읽기 전용 evidence 카드로 표시되고 사용자가 수정할 수 없다"
    source: phase2-acceptance
    tests: []

  - id: MAN-003
    type: ui_interaction
    description: "신규 source_type='manual' commitment 생성은 primary UI에서 제거된다. manual source_type은 기존 데이터/서버 contract 호환과 supersede fallback을 위해서만 남는다"
    screen: "CommitmentCreateSheet"
    interaction: "일반 Commitments FAB"
    precondition: "CommitmentManagementScreen 표시됨"
    expected: "source_type='manual' raw_ingestion_events row는 생성되지 않고, 신규 manual commitment 생성 API 호출도 발생하지 않는다. 새 evidence가 필요하면 message_screenshot/meeting source raw event를 먼저 만들고 LLM extraction 결과로 action/schedule/decision을 저장한다"
    source: phase2-acceptance
    tests: []

  - id: MAN-004
    type: ui_interaction
    description: "수동 약속은 UI에서 '수동 추가' 배지로 구분된다 — CommitmentCard 상단 우측에 📝 아이콘과 '수동 추가' 라벨. CommitmentDetailSheet의 '출처' 섹션은 '사용자 직접 추가 ({created_at}, KST)'로 표시되며 source_event_title·source_event_occurred_at은 숨김. PersonDetailScreen 목록에서도 동일 배지 표시"
    screen: "CommitmentManagementScreen | CommitmentDetailSheet | PersonDetailScreen"
    interaction: "화면 진입"
    precondition: "Room에 source_type='manual' commitment 존재"
    expected: "CommitmentCard: 📝 아이콘 + '수동 추가' 라벨. CommitmentDetailSheet: '출처' 섹션 텍스트 '사용자 직접 추가 2026-04-18 14:30 KST' + 원문 링크 없음. LLM 추출 약속의 '출처: {source_event_title}'과 시각적 구분. direction 배지·quote·due_at·action_state는 LLM 추출 약속과 동일하게 렌더링 — 생명주기는 구분 없음"
    source: phase2-acceptance
    tests: []

  - id: MAN-005
    type: ui_interaction
    description: "Supersede 입력 validation 규칙 — title 공백 제거 후 1~200자. direction ∈ ('give','take') 1개 선택 필수. quote는 원본 commitment에서 상속되며 사용자가 입력하지 않는다. person_ref는 공백 제거 후 lowercase 정규화(비워도 허용). due_at 입력 시 유효 ISO8601 KST(과거도 허용). 규칙 위반 시 해당 필드 하단 빨간 헬퍼 텍스트 + 저장 실패"
    screen: "CommitmentCreateSheet"
    interaction: "[저장] 탭 or 필드 blur"
    precondition: "EDIT-007 supersedeOf가 있는 CommitmentCreateSheet 열림"
    expected: "title 빈값: '제목을 입력해주세요'. title >200: '최대 200자'. direction 미선택: RadioButton 특성상 하나는 선택되어야 하므로 초기 default는 'give'. quote는 원본 evidence text로 표시되고 TextField가 아니다. due_at 선택 후 해제 가능(null 허용). person_ref는 TextField에 입력 가능. 저장 시 source row가 없으면 명시적 오류를 표시하고 repository write를 실행하지 않는다"
    source: phase2-acceptance
    tests: []

  - id: MAN-006
    type: ui_interaction
    description: "수동 약속은 LLM 재추출 대상이 아니다 — 어떤 WorkManager worker(CommitmentExtractionWorker 등)도 source_type='manual' commitment를 재처리하지 않는다. 또한 raw_ingestion_events 리텐션 30일 정책(data-ingestion.spec.yml) 대상도 아니다 (연관 raw event 자체가 없음). 사용자가 명시적으로 삭제(EDIT-006)하지 않는 한 영속 보존"
    screen: "(lifecycle — UI 없음)"
    interaction: "(none)"
    precondition: "Room에 source_type='manual' commitment 존재"
    expected: "CommitmentExtractionWorker·VoiceExtractionWorker·이메일 어댑터의 worker loop는 source_type='manual'을 건너뛴다. RetentionSweepWorker는 raw_ingestion_events만 스윕하므로 manual commitment에 영향 없음. 사용자가 EDIT-006 [삭제]로 deleted_at=now() 설정 시에만 UI에서 제거됨. action_state 전이·AlarmManager·PATCH /v1/commitments는 LLM 추출 약속과 완전히 동일한 파이프라인 사용"
    source: phase2-acceptance
    tests: []

invariants:
  - "Commitments 탭 + 버튼은 신규 manual commitment 생성으로 연결되지 않는다"
  - "CommitmentCreateSheet에는 신규 blank manual mode가 없다. EDIT-007 supersedeOf가 있는 경우에만 저장 가능하다"
  - "manual source_type은 commitments.source_type compatibility 및 supersede 결과 provenance 값으로만 남고 raw_ingestion_events에는 쓰지 않는다"
  - "새 evidence 입력은 message_screenshot/meeting raw event를 생성한 뒤 공통 LLM extraction pipeline을 거친다"
  - "LLM 추출 파이프라인(CommitmentExtractionWorker·VoiceExtractionWorker 등)은 source_type='manual' commitment를 재처리하지 않는다"
  - "action_state 전이·편집(commitment-edit.spec.yml)·알림(CMT-008)은 LLM 추출 약속과 완전히 동일하게 동작한다 — source_type만 시각 배지로 구분"
  - "raw_ingestion_events 30일 리텐션 정책은 manual commitment에 영향 없음 (연관 raw event 없음)"
