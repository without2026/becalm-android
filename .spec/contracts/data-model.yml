version: 1

# BeCalm Android MVP — Data Model Contract
# Persistence: Room (local primary) + Supabase Postgres (mirror via Railway FastAPI).
# Railway is the ONLY writer to Supabase — Android does NOT call Supabase REST directly for data R/W.
# EmailBody lives in Room only — never uploaded to Railway or Supabase.
# Transcript (STT 중간 산출물): 어디에도 영속되지 않음. 음성 파이프라인(voice-pipeline.spec.yml v2)은 Vertex AI Gemini 2.5 Flash의 audio multimodal 처리로 오디오 → commitments를 한 번에 추출하며, 중간 transcript는 Railway 요청 lifetime 내 ephemeral로만 존재.
# persons_enrichment lives in Room only — never uploaded to Railway or Supabase (PIPA).

tables:
  # ---- Supabase tables (written by Railway; mirrored from Room via Railway batch API) ----

  - name: raw_ingestion_events
    columns:
      - name: id
        type: uuid
        primary: true
        nullable: false
        default: gen_random_uuid()
      - name: user_id
        type: uuid
        nullable: false
        fk: "auth.users.id"
      - name: client_event_id
        type: uuid
        nullable: false
        # Client-generated idempotency key (UUID v4). Railway uses this for upsert deduplication.
      - name: source_type
        type: text
        nullable: false
        # enum: voice | call_recording | gmail | outlook_mail | naver_imap | daum_imap | google_calendar | outlook_calendar
        # voice = Samsung 음성 녹음(Voice Recorder), call_recording = Samsung 통화 녹음(Call). 두 소스는 동일한 Vertex AI Gemini 파이프라인(VOI-001)에서 처리되며, UI·필터링·법적 증거성 표시에서만 구분됨
      - name: source_ref
        type: text
        nullable: true
        # email message_id, file URI, calendar event id, etc.
      - name: person_ref
        type: text
        nullable: true
        # Canonicalized counterparty identifier. Precedence: phone (E.164) > email (lowercase) > display_name (normalized).
        # NULL for events with no identifiable counterparty (e.g., self-dictated note). Groups under "Unassigned" in UI.
      - name: event_title
        type: text
        nullable: true
        # voice: MediaStore TITLE / email: subject / calendar: event title. Populated at ingestion time.
      - name: event_snippet
        type: text
        nullable: true
        # voice: 추출된 첫 번째 commitment의 quote 첫 ~200자 (POST /v1/voice/transcribe_extract 응답 후 Railway가 set) — transcript 자체는 영속되지 않으므로 quote가 유일한 텍스트 소스. commitments가 0건이면 null. / email: first 200 chars of body / calendar: null
      - name: duration_seconds
        type: int
        nullable: true
        # voice only: MediaStore DURATION / 1000. null for non-voice sources.
      - name: location
        type: text
        nullable: true
        # calendar only: event location. null for non-calendar sources.
      - name: commitments_extracted_count
        type: int
        nullable: false
        default: "0"
        # Number of commitments extracted from this event by the LLM pipeline. Updated after extraction.
      - name: timestamp
        type: timestamptz
        nullable: false
      - name: sync_status
        type: text
        nullable: false
        default: "'pending'"
        # enum: pending | synced | failed | awaiting_consent — Room-side tracking column, not uploaded to Supabase
        # awaiting_consent: voice source만 사용. pipa_third_party_consent=false인 동안 VoiceUploadWorker가 업로드를 보류. 동의 ON 시 자동으로 pending으로 전이 (VOI-004).
      - name: retry_count
        type: int
        nullable: false
        default: "0"
      - name: last_attempt_at
        type: timestamptz
        nullable: true
    indexes:
      - columns: [user_id, sync_status]
        type: btree
      - columns: [user_id, timestamp]
        type: btree
      - columns: [user_id, person_ref, timestamp]
        type: btree
        # idx_raw_events_user_person_time — supports PersonDetailScreen timeline query
    rls: true

  - name: commitments
    columns:
      - name: id
        type: uuid
        primary: true
        nullable: false
        default: gen_random_uuid()
      - name: user_id
        type: uuid
        nullable: false
        fk: "auth.users.id"
      - name: direction
        type: text
        nullable: false
        # enum: give | take
      - name: counterparty_raw
        type: text
        nullable: true
        # phone# | email | attendee name — raw, uncanonized
      - name: person_ref
        type: text
        nullable: true
        # Canonicalized counterparty identifier. Same precedence rule as raw_ingestion_events.person_ref.
        # NULL for commitments where counterparty is not identifiable.
      - name: title
        type: text
        nullable: false
      - name: description
        type: text
        nullable: true
      - name: quote
        type: text
        nullable: false
        # Verbatim text fragment from source event from which this commitment was extracted.
        # Legally sensitive — treat as evidentiary record. Never summarized or modified by app.
      - name: source_event_title
        type: text
        nullable: true
        # Denormalized event_title of the source raw_ingestion_event. For display in CommitmentCard.
      - name: source_event_occurred_at
        type: timestamptz
        nullable: false
        # Timestamp of the source event (not extraction time). Required for attribution display.
      - name: due_at
        type: timestamptz
        nullable: true
        # CommitmentDraft.due_at(ISO8601 KST)에서 정규화된 시점. 저장은 UTC, 클라이언트 렌더링·Railway 페이로드는 KST(+09:00) 고정. D-N 배지는 due_at을 local KST date로 변환 후 today와 비교
      - name: due_hint
        type: text
        nullable: true
        # LLM이 추출한 원문 시점 표현 (예: '다음주', '월말', '이번달 안'). due_at 유무와 무관하게 보존되어 UI·사용자 편집 시 원문 복원에 사용
      - name: due_is_approximate
        type: boolean
        nullable: false
        default: "false"
        # true = due_at이 명시적 날짜 아닌 hint로부터 LLM이 추론한 값. UI는 '~' prefix (예: '~4/24')로 표시하여 사용자 보정 유도
      - name: action_state
        type: text
        nullable: false
        default: "'pending'"
        # enum: pending | reminded | followed_up | completed | overdue | cancelled
        # Replaces status column. Tracks follow-through lifecycle.
        # Transitions:
        #   pending → reminded (CMT-005, user taps [리마인드])
        #   pending|reminded → followed_up (CMT-006, user taps [팔로업])
        #   pending|reminded|followed_up → completed (CMT-007, user taps [완료])
        #   pending|reminded → overdue (CMT-011, system auto when due_at < now() - 24h AND not completed/cancelled)
        #   pending|reminded|followed_up → cancelled (CMT-012, user taps [취소])
        #   overdue → followed_up|completed|cancelled (user can still act on overdue items)
        #   completed → pending (CMT-013 undo within 5s Snackbar window)
        #   cancelled → pending (CMT-013 undo within 5s Snackbar window)
      - name: source_type
        type: text
        nullable: false
      - name: source_ref
        type: text
        nullable: true
      - name: confidence
        type: float
        nullable: false
        default: "0.0"
      - name: sync_status
        type: text
        nullable: false
        default: "'pending'"
      - name: created_at
        type: timestamptz
        nullable: false
        default: now()
      - name: updated_at
        type: timestamptz
        nullable: false
        default: now()
    indexes:
      - columns: [user_id, action_state, due_at]
        type: btree
        # idx_commitments_user_action_due — supports CommitmentManagementScreen queries
      - columns: [user_id, sync_status]
        type: btree
      - columns: [user_id, person_ref, due_at]
        type: btree
        # idx_commitments_user_person_due — supports /v1/persons/{id}/commitments
    rls: true

  - name: calendar_events
    columns:
      - name: id
        type: uuid
        primary: true
        nullable: false
        default: gen_random_uuid()
      - name: user_id
        type: uuid
        nullable: false
        fk: "auth.users.id"
      - name: source_type
        type: text
        nullable: false
        # enum: google_calendar | outlook_calendar
      - name: source_ref
        type: text
        nullable: true
        # External calendar event ID for upsert
      - name: title
        type: text
        nullable: false
      - name: start_at
        type: timestamptz
        nullable: false
      - name: end_at
        type: timestamptz
        nullable: false
      - name: attendees_raw
        type: text
        nullable: true
      - name: status
        type: text
        nullable: false
        default: "'confirmed'"
        # enum: confirmed | cancelled
        # 취소된 이벤트도 하드 삭제하지 않고 status='cancelled'로 보존하여 UI에서 회색 처리(strike-through) 후 노출 — 사용자가 과거에 본 약속의 흔적을 잃지 않도록 함 (ING-009, ING-010)
      - name: sync_status
        type: text
        nullable: false
        default: "'pending'"
    indexes:
      - columns: [user_id, start_at]
        type: btree
      - columns: [user_id, status, start_at]
        type: btree
        # idx_calendar_events_user_status_start — TodayTimelineScreen에서 status='confirmed' 필터링과 회색 처리 분리 쿼리 지원
    rls: true

  # ---- Room-only table (never uploaded to Railway or Supabase) ----

  - name: persons_enrichment
    room_only: true
    # PIPA invariant: 연락처 데이터는 온디바이스 전용. Railway/Supabase로 전송 절대 금지.
    columns:
      - name: person_ref
        type: text
        primary: true
        nullable: false
        # Matches person_ref in raw_ingestion_events / commitments. JOIN key is purely local.
      - name: display_name
        type: text
        nullable: true
        # ContactsContract.CommonDataKinds.StructuredName.DISPLAY_NAME
      - name: nickname
        type: text
        nullable: true
        # ContactsContract.CommonDataKinds.Nickname.NAME
      - name: company
        type: text
        nullable: true
        # ContactsContract.CommonDataKinds.Organization.COMPANY
      - name: title
        type: text
        nullable: true
        # ContactsContract.CommonDataKinds.Organization.TITLE
      - name: source_contact_id
        type: text
        nullable: true
        # ContactsContract raw contact ID used for change detection in EnrichmentWorker
      - name: last_synced_at
        type: timestamptz
        nullable: false
        # Updated on every EnrichmentWorker run
    indexes:
      - columns: [person_ref]
        type: btree

relationships:
  - from: "raw_ingestion_events.user_id"
    to: "auth.users.id"
    type: many-to-one
    on_delete: cascade

  - from: "commitments.user_id"
    to: "auth.users.id"
    type: many-to-one
    on_delete: cascade

  - from: "calendar_events.user_id"
    to: "auth.users.id"
    type: many-to-one
    on_delete: cascade

migration_notes:
  - "auth.users는 Supabase Auth가 관리하는 외부 테이블이다 — BeCalm이 직접 DDL하지 않음"
  - "Room 전용 엔티티 (Supabase 없음): EmailBody, persons_enrichment — 개인정보(원본 텍스트, 연락처) 보호 목적으로 로컬 only. (Transcript는 voice-pipeline v2에서 제거됨 — 오디오 → commitments 직접 추출 구조, 중간 transcript는 어디에도 저장되지 않음)"
  - "Room RawIngestionEvent·Commitment·CalendarEvent는 Supabase 테이블과 1:1 mirror. sync_status·retry_count·last_attempt_at는 Room-side tracking 컬럼으로 Supabase에는 존재하지 않음"
  - "Supabase 쓰기 경로: Android → Railway POST /v1/raw_ingestion_events:batch → Supabase INSERT. Android에서 Supabase REST 직접 쓰기 없음"
  - "client_event_id: Android에서 생성하는 UUID v4 멱등성 키. Railway가 upsert deduplication에 사용"
  - "person_ref 컬럼: MVP는 별도 persons 테이블 없이 raw_ingestion_events·commitments의 person_ref TEXT로 가상 그룹핑. 정규화 우선순위: 전화번호(E.164) > 이메일(소문자) > 표시이름(정규화). 동일 연락처가 채널별 다른 식별자를 가질 경우 중복 그룹핑 위험 있음 — post-MVP에서 persons 테이블 + 수동 병합 UI로 해결"
  - "commitments.status 컬럼 → action_state 컬럼으로 대체: enum이 pending|done|overdue에서 pending|reminded|followed_up|completed로 변경. Room 마이그레이션: ALTER TABLE commitments RENAME COLUMN status TO action_state; UPDATE commitments SET action_state='pending' WHERE action_state='done' OR action_state='overdue'"
  - "calendar_events.status 컬럼 (confirmed|cancelled) 신설: 취소된 캘린더 이벤트의 soft-keep을 위해. Room 마이그레이션: ALTER TABLE calendar_events ADD COLUMN status TEXT NOT NULL DEFAULT 'confirmed'; Supabase 미러는 Railway migration에서 동일 컬럼 추가. 기존 row는 default 'confirmed'로 backfill됨. ING-009/010에서 deletedEvent/isCancelled 감지 시 DELETE 대신 UPDATE status='cancelled'"
  - "commitments.due_date(date) → due_at(timestamptz) + due_hint(text) + due_is_approximate(bool) 세 컬럼으로 확장: (1) due_at은 ISO8601 KST(+09:00) 시점 — 기존 due_date의 00:00 KST 값으로 backfill, (2) due_hint는 LLM이 추출한 원문 시점 표현 ('다음주'·'월말' 등), (3) due_is_approximate는 due_at이 명시적 날짜 아닌 hint 추론 여부. Room 마이그레이션: ALTER TABLE commitments ADD COLUMN due_at INTEGER; UPDATE commitments SET due_at = strftime('%s', due_date || ' 00:00:00', '-9 hours') * 1000 WHERE due_date IS NOT NULL; ALTER TABLE commitments ADD COLUMN due_hint TEXT; ALTER TABLE commitments ADD COLUMN due_is_approximate INTEGER NOT NULL DEFAULT 0; ALTER TABLE commitments DROP COLUMN due_date. Supabase Postgres: 동일 DDL(ADD COLUMN + backfill + DROP COLUMN). 기존 index `idx_commitments_user_action_due`와 `idx_commitments_user_person_due`는 due_at 기준으로 재생성"
  - "commitments.quote 컬럼: LLM이 추출한 원문 발화/텍스트 단편. 법적 증거 기록 성격 — 앱이 절대 요약·편집하지 않음. Railway로 업로드되므로 Supabase RLS 적용 필수"
  - "commitments.source_event_occurred_at: 추출 시각이 아닌 원본 이벤트 발생 시각. Railway payload에 포함됨"
  - "persons_enrichment: CONTACTS 권한 부여 시 EnrichmentWorker가 ContactsContract.Data에서 읽어 채움. person_ref PRIMARY KEY — 동일 person_ref의 최신 연락처 정보로 UPSERT. 로그아웃 시 전체 삭제"
  - "Supabase 리전: ap-northeast-2 (PIPA 한국 개인정보보호법 준수)"
  - "Room DB 파일 분리 정책: DB 파일명은 `becalm_<sha256(supabase_user_id)[:16]>.db` 형식으로 user 단위 격리 (AUTH-008). 동일 디바이스에서 계정 전환·공유 시 RLS와 무관하게 로컬 레벨에서 데이터가 섞이지 않는다. 로그아웃은 해당 user의 DB 연결을 close()할 뿐 파일 삭제는 하지 않음 — 동일 계정 재로그인 시 데이터 복원"
  - "Vertex AI 리전: asia-northeast3 (서울). ZDR(Zero Data Retention) 플래그 필수. voice-pipeline v2는 Railway `POST /v1/voice/transcribe_extract`에서 Vertex AI Gemini 2.5 Flash를 호출하며 오디오 바이트·transcript·Gemini 응답은 요청 lifetime 내 ephemeral. commitments만 Supabase에 INSERT됨"
  - "PIPA 제3자 제공 + 국외 이전 동의(pipa_third_party_consent)는 DataStore에 저장되며 raw_ingestion_events.sync_status='awaiting_consent'와 연동. 미동의 시 voice source에 대한 Railway 업로드가 차단됨 (VOI-004, ONB-PIPA)"
  - "리텐션 정책 (MVP 확정): Room raw_ingestion_events 및 연관 EmailBody는 timestamp 기준 30일 rolling window로 자동 삭제된다. 일일 WorkManager RetentionSweepWorker가 `DELETE FROM raw_ingestion_events WHERE timestamp < now() - INTERVAL '30 days' AND sync_status='synced'`를 실행하며 synced되지 않은 레코드는 업로드 완료 전까지 보존된다. commitments 및 calendar_events는 action_state/status 기준 별도 lifecycle을 따르므로 30일 정책 적용 대상 아님. Supabase(서버 미러)는 동일 규칙을 서버 측 pg_cron으로 병렬 적용 — 단 MVP는 Supabase 서버 리텐션 60일(클라이언트 삭제 후에도 30일 버퍼 보관)로 완화하여 다기기·복구 use case에 대비 (post-MVP에 재검토). persons_enrichment는 CONTACTS 원본이 사용자 기기에 상존하는 한 삭제하지 않음 — 로그아웃/계정 삭제 시에만 일괄 삭제 (AUTH-005)"
  - "RISK — Samsung Sleeping Apps: REQUEST_IGNORE_BATTERY_OPTIMIZATIONS 승인과 별개로 Samsung One UI '잠자는 앱 / 깊은 잠자는 앱' 목록이 WorkManager 주기적 작업을 최대 24시간 이상 지연시킬 수 있음(실측). 완화책: ING-011 foreground catch-up이 앱 오픈 시 100% 도달을 보장하므로 주기적 WorkManager는 보조 중복 경로로 격하. 모니터링 지표: periodic_sync_completion_rate (목표 ≥80%). 80% 미만 지속 시 deploy-gate 경고."
  - "RISK — Per-source cursor invalidation: Gmail historyId는 7일 오프라인 후 HTTP 410으로 만료됨. IMAP UIDVALIDITY 변경(메일함 재생성)은 전체 UID 시퀀스를 무효화함. MS Graph deltaToken은 staleness 후 HTTP 410 반환. 각 어댑터는 이 오류를 감지하고 DataStore cursor를 초기화한 뒤 최근 30일 범위로 제한된 전체 재동기화를 수행해야 함 — 메일함 전체를 blind full-pull하면 안 됨 (ING-013 커버)."
  - "RISK — CONTACTS 권한 부여 범위: EnrichmentWorker는 ContactsContract.CommonDataKinds.StructuredName·Nickname·Organization만 읽음. SMS·통화기록·사진 등 접근 없음. 앱 스토어 심사 시 READ_CONTACTS 사용 목적 명시 필요 (개인화된 표시명 — 서버 전송 없음)"
