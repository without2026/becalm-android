name: Adapter Build Dispatcher

on:
  workflow_call:
    inputs:
      adapter:
        description: "Adapter name from platform.yml (electron, android, etc.)"
        required: true
        type: string
      build_type:
        description: "Android build type: debug or release"
        required: false
        default: "release"
        type: string
      build_target:
        description: "Build target: win, mac, linux, or all"
        required: false
        default: "all"
        type: string
      require_signing:
        description: "Fail protected targets when signing secrets are missing"
        required: false
        default: false
        type: boolean

jobs:
  android-build:
    if: inputs.adapter == 'android'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read project_root
        id: config
        run: |
          pip install -q pyyaml 2>/dev/null || true
          PROJECT_ROOT=$(python3 -c "
          import yaml
          with open('.pipeline/platform.yml') as f:
              print(yaml.safe_load(f).get('project_root', '.'))
          ")
          echo "root=$PROJECT_ROOT" >> "$GITHUB_OUTPUT"

      - name: Build Android app bundle
        working-directory: ${{ steps.config.outputs.root }}/android
        env:
          BECALM_API_BASE_URL: ${{ secrets.BECALM_API_BASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          BECALM_RELEASE_STORE_FILE: ${{ secrets.BECALM_RELEASE_STORE_FILE }}
          BECALM_RELEASE_STORE_PASSWORD: ${{ secrets.BECALM_RELEASE_STORE_PASSWORD }}
          BECALM_RELEASE_KEY_ALIAS: ${{ secrets.BECALM_RELEASE_KEY_ALIAS }}
          BECALM_RELEASE_KEY_PASSWORD: ${{ secrets.BECALM_RELEASE_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew 2>/dev/null || true
          if [ "${{ inputs.require_signing }}" = "true" ]; then
            ./gradlew verifyReleaseRuntimeConfigured verifyReleaseSigningConfigured --no-daemon --console=plain
          fi
          if [ "${{ inputs.build_type }}" = "release" ]; then
            ./gradlew bundleRelease --no-daemon --console=plain
          else
            ./gradlew bundleDebug --no-daemon --console=plain
          fi

      - name: Android artifact size check
        working-directory: ${{ steps.config.outputs.root }}/android
        run: bash ../.pipeline/adapters/android/perf-check.sh

      - uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: ${{ steps.config.outputs.root }}/android/app/build/outputs/bundle/**/*.aab
          if-no-files-found: error

  unsupported-adapter:
    if: inputs.adapter != 'android'
    runs-on: ubuntu-latest
    steps:
      - name: Fail unsupported adapter
        run: |
          echo "::error::No build workflow is configured for adapter=${{ inputs.adapter }}"
          exit 1
