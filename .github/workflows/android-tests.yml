# Android test suite.
# Reads .pipeline/platform.yml for project_root.

name: Android Tests

on:
  workflow_call:
  workflow_dispatch:

env:
  # local.properties is intentionally gitignored, so CI must provide the same
  # non-secret backend URL explicitly for debug/unit/instrumented runtime graphs.
  BECALM_API_BASE_URL: https://dev-dev-7309.up.railway.app

jobs:
  read-config:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      root: ${{ steps.config.outputs.root }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Read project_root
        id: config
        run: |
          pip install -q pyyaml 2>/dev/null || true
          PROJECT_ROOT=$(python3 -c "
          import yaml
          with open('.pipeline/platform.yml') as f:
              print(yaml.safe_load(f).get('project_root', '.'))
          ")
          echo "root=$PROJECT_ROOT" >> "$GITHUB_OUTPUT"

  unit-tests:
    needs: read-config
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin
      - name: Unit tests
        working-directory: ${{ needs.read-config.outputs.root }}/android
        run: |
          chmod +x ./gradlew 2>/dev/null || true
          ./gradlew testDebugUnitTest --no-daemon --console=plain
      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-unit-test-reports
          path: |
            ${{ needs.read-config.outputs.root }}/android/app/build/reports/tests/testDebugUnitTest/
            ${{ needs.read-config.outputs.root }}/android/app/build/test-results/testDebugUnitTest/
          if-no-files-found: ignore

  release-smoke:
    needs: read-config
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin
      - name: Restore google-services.json
        working-directory: ${{ needs.read-config.outputs.root }}/android
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON_B64" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON_B64" | base64 -d > app/google-services.json
          else
            echo "[WARN] GOOGLE_SERVICES_JSON_B64 is not configured; Firebase plugins remain disabled."
          fi
      - name: Release build smoke
        working-directory: ${{ needs.read-config.outputs.root }}/android
        run: |
          chmod +x ./gradlew 2>/dev/null || true
          ./gradlew assembleRelease lintRelease --no-daemon --console=plain
      - name: APK size smoke
        working-directory: ${{ needs.read-config.outputs.root }}/android
        run: bash ../.pipeline/adapters/android/perf-check.sh
      - name: Upload release smoke reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-release-smoke-reports
          path: |
            ${{ needs.read-config.outputs.root }}/android/app/build/reports/
            ${{ needs.read-config.outputs.root }}/android/app/build/outputs/logs/
          if-no-files-found: ignore

  instrumented-tests:
    needs: read-config
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Espresso tests (API 33 emulator)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: bash -lc 'ROOT="${{ needs.read-config.outputs.root }}"; cd "$ROOT/android"; chmod +x ./gradlew 2>/dev/null || true; ./gradlew connectedDebugAndroidTest --no-daemon --console=plain; cd - >/dev/null; ADB="$(command -v adb)" ANDROID_SERIAL=emulator-5554 "$ROOT/qa/emulator/scripts/measure_android_readiness.sh"'
      - name: Upload instrumented test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-instrumented-test-reports
          path: |
            ${{ needs.read-config.outputs.root }}/android/app/build/reports/androidTests/connected/
            ${{ needs.read-config.outputs.root }}/android/app/build/outputs/androidTest-results/
            ${{ needs.read-config.outputs.root }}/qa/emulator/reports/readiness/
          if-no-files-found: ignore

  backend-tests:
    needs: read-config
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Backend tests (optional Python API)
        run: |
          ROOT="${{ needs.read-config.outputs.root }}"
          if [ ! -f "$ROOT/api/requirements.txt" ]; then
            echo "[INFO] No api/requirements.txt — skipping backend pytest (Kotlin-only app OK)"
            exit 0
          fi
          pip install --upgrade pip
          pip install -r "$ROOT/api/requirements.txt" 2>/dev/null || true
          pip install pytest pytest-timeout 2>/dev/null || true
          if [ ! -d "$ROOT/api/tests" ]; then
            echo "[INFO] No api/tests — skipping backend pytest"
            exit 0
          fi
          (cd "$ROOT/api" && pytest -xvs tests/ --timeout=60)
