# Backend API: external Railway service (becalm-backend repo). This repo is client_primary.
# Source management = per-source administration and error recovery path.
# The PRIMARY sync trigger is ING-011 (foreground catch-up) and DASH-009 (pull-to-refresh).
# Per-source manual trigger (SMG-005) is intentionally only accessible inside source detail — not on dashboard.
# Source of truth is local Room/UI state; provider fetch owner is source-specific.
# Fetch owner table:
#   backend-managed: gmail, outlook_mail, google_calendar, outlook_calendar
#   local-worker: voice, meeting, naver_imap, daum_imap
module: source-management
platform: android
version: 1
# Boundary reference: docs/becalm-mvp-boundary.md

behaviors:
  - id: SMG-001
    type: ui_interaction
    description: "Settings → Sources 목록 화면에서 9개 소스의 현재 상태(connected / disconnected / error + 이유)와 '연락처' 의사 소스 행을 표시한다. 총 10개 행"
    screen: "SourcesListScreen"
    interaction: "화면 진입"
    precondition: "설정 화면에서 Sources 항목 탭. Gmail connected, Outlook error(토큰 만료), voice connected, meeting connected, Naver Email disconnected, Daum Email connected, google_calendar connected, outlook_calendar disconnected. READ_CONTACTS 부여됨"
    expected: "9개 행 표시됨. Gmail: '연결됨'. Outlook: '오류 — 토큰이 만료되었습니다'. voice: '연결됨'. Meetings: '연결됨'. Naver Email: '미연결'. Daum Email: '연결됨'. google_calendar: '연결됨'. outlook_calendar: '미연결'. 연락처: '연결됨 — N명 보강됨' + last_synced_at. READ_CONTACTS 미부여 시 연락처 행: '미연결'"
    source: phase2-acceptance
    tests: []

  - id: SMG-002
    type: ui_interaction
    description: "연결된 소스 탭 시 소스 상세 화면 표시 — last_sync_at, events_synced_count, last_error(있는 경우), [연결 해제] 버튼"
    screen: "SourceDetailScreen"
    interaction: "connected 소스 카드 탭"
    precondition: "SourcesListScreen에서 Gmail(connected) 카드 탭"
    expected: "SourceDetailScreen 표시됨. last_sync_at: 'HH:mm' 형식. events_synced_count: N건. last_error: 없음(오류 없을 시 미표시). [연결 해제] 버튼 표시됨. [지금 동기화] 버튼 표시됨"
    source: phase2-acceptance
    tests: []

  - id: SMG-003
    type: ui_interaction
    description: "미연결 또는 오류 상태 소스 탭 시 해당 소스의 재연결 플로우로 이동한다 — OAuth 소스는 OAuth 재인증, IMAP 소스는 앱 비밀번호 재입력, voice/meeting은 SAF Recordings 폴더 재선택"
    screen: "SourceDetailScreen"
    interaction: "disconnected 또는 error 소스 카드 탭"
    precondition: "SourcesListScreen에서 Outlook Mail(error) 카드 탭"
    expected: "SourceDetailScreen 표시됨. [다시 연결] 버튼 표시됨. [다시 연결] 탭 시 Microsoft OAuth 재인증 플로우 실행됨. Gmail/Outlook Mail/calendar source의 경우 backend-managed OAuth start URL을 브라우저/Custom Tab으로 열고 callback 후 연결 상태 polling으로 완료를 확인한다. Naver/Daum IMAP은 backend OAuth가 없으며 앱 비밀번호 재입력 화면으로 이동한다. 재인증 성공 시 SourceDetailScreen 상태가 connected로 갱신됨"
    source: phase2-acceptance
    tests: []

  - id: SMG-004
    type: ui_interaction
    description: "소스 연결 해제 시 해당 소스의 DataStore cursor/connection flag 초기화, local-worker credentials 삭제, 기존 Room 데이터는 유지, 칩 상태가 idle로 변경된다"
    screen: "SourceDetailScreen"
    interaction: "[연결 해제] 버튼 탭"
    precondition: "SourceDetailScreen에서 Gmail connected 상태, [연결 해제] 탭 + 확인 다이얼로그 [확인] 탭"
    expected: "DataStore gmail local compatibility cursor와 backend-managed flag가 초기화됨. Naver/Daum IMAP은 Keystore app-password credential과 per-folder UID cursor가 삭제됨. Room의 기존 raw_ingestion_events + EmailBody + commitments/quotes는 유지됨(삭제 없음). SourceStatusStrip 해당 소스 칩이 idle(회색)로 변경됨"
    source: phase2-acceptance
    tests: []

  - id: SMG-005
    type: ui_interaction
    description: "소스 상세 화면의 [지금 동기화] 버튼이 provider fetch owner에 맞는 수동 동기화를 실행한다. backend-managed source는 Railway sync endpoint를, local source는 WorkManager worker를 사용한다. 이것이 앱에서 유일한 소스별 수동 트리거다"
    screen: "SourceDetailScreen"
    interaction: "[지금 동기화] 버튼 탭"
    precondition: "인증 완료 상태에서 SourceDetailScreen 표시됨, Gmail connected 상태, [지금 동기화] 탭, 네트워크 연결됨"
    expected: "Railway `POST /v1/mail_sources:sync?provider=gmail` 이 호출됨. 다른 소스는 영향받지 않는다. SourceStatusStrip Gmail 칩 syncing 상태로 전환 → 완료 후 synced로 전환됨. IMAP/voice/meeting 같은 local source는 기존처럼 해당 WorkManager worker만 실행된다. 인증 전이면 CTA는 숨김 또는 비활성화되어 enqueue가 발생하지 않는다"
    source: phase2-acceptance
    tests: []

  - id: SMG-006
    type: ui_interaction
    description: "Meetings 소스 상세 화면은 미팅 오디오를 앱 내 Recordings 내부 폴더로 저장하는 명시적 추가 버튼을 표시한다"
    screen: "SourceDetailScreen"
    interaction: "source_id='meeting' 화면 진입"
    precondition: "인증 완료, Recordings SAF tree URI grant 보유"
    expected: "[미팅 오디오 추가] 버튼 표시. picker는 audio/m4a, audio/mp4, audio/aac, audio/mpeg, audio/wav 및 .m4a/.mp4/.aac/.mp3/.wav만 허용한다. 전사본/text/manual_text 추가 버튼은 표시하지 않는다"
    source: user-request
    tests: []

invariants:
  - "수동 source sync는 authenticated session이 있을 때만 허용된다 — pre-login 상태에서는 backend endpoint 호출과 WorkManager enqueue 모두 금지"
  - "Room/local UI source of truth와 provider fetch owner를 혼동하지 않는다: Room은 계속 UI read model이고, Gmail/Outlook Mail/calendar fetch는 Railway owner, IMAP/voice fetch는 Android local worker owner다"
  - "Naver/Daum IMAP credential은 Android Keystore에만 저장되며 Railway로 전송하지 않는다"
  - "소스 연결 해제 시 기존 Room 데이터(raw_ingestion_events, EmailBody, commitments/quotes)는 삭제하지 않는다"
  - "소스 연결 해제 시 해당 소스의 Keystore credentials와 DataStore cursor만 삭제된다"
  - "[지금 동기화]는 소스 상세 화면에서만 접근 가능하다 — 대시보드에서 소스별 개별 동기화 불가"
  - "source category contract: `meeting`은 calendar category가 아니라 meeting category다. 다만 Person detail의 '미팅' 필터는 `google_calendar`, `outlook_calendar`, `meeting`을 함께 포함한다"
  - "main tab source status는 compact summary만 표시한다. source별 상세 오류, 재시도, 재연결은 SourceDetailScreen 또는 Settings/Sources에서 수행한다"
