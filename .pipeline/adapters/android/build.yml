name: Android Build
on:
  workflow_call:
    inputs:
      build_type:
        description: "Build type: debug or release"
        required: false
        default: "release"
        type: string
      require_signing:
        description: "Fail protected release builds when Android upload signing is missing"
        required: false
        default: false
        type: boolean

jobs:
  read-config:
    runs-on: ubuntu-latest
    outputs:
      root: ${{ steps.config.outputs.root }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Read project_root
        id: config
        run: |
          pip install -q pyyaml 2>/dev/null || true
          PROJECT_ROOT=$(python3 -c "
          import yaml
          with open('.pipeline/platform.yml') as f:
              print(yaml.safe_load(f).get('project_root', '.'))
          ")
          echo "root=$PROJECT_ROOT" >> "$GITHUB_OUTPUT"

  build-aab:
    needs: read-config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin

      - name: Restore google-services.json
        working-directory: ${{ needs.read-config.outputs.root }}/android
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON_B64" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON_B64" | base64 -d > app/google-services.json
          else
            echo "[WARN] GOOGLE_SERVICES_JSON_B64 is not configured; Firebase plugins remain disabled."
          fi

      - name: Build app bundle
        working-directory: ${{ needs.read-config.outputs.root }}/android
        env:
          BECALM_API_BASE_URL: ${{ secrets.BECALM_API_BASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          AMPLITUDE_API_KEY: ${{ secrets.AMPLITUDE_API_KEY }}
          BECALM_RELEASE_STORE_FILE: ${{ secrets.BECALM_RELEASE_STORE_FILE }}
          BECALM_RELEASE_STORE_PASSWORD: ${{ secrets.BECALM_RELEASE_STORE_PASSWORD }}
          BECALM_RELEASE_KEY_ALIAS: ${{ secrets.BECALM_RELEASE_KEY_ALIAS }}
          BECALM_RELEASE_KEY_PASSWORD: ${{ secrets.BECALM_RELEASE_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew 2>/dev/null || true
          if [ "${{ inputs.require_signing }}" = "true" ]; then
            ./gradlew verifyReleaseRuntimeConfigured verifyReleaseSigningConfigured --no-daemon --console=plain
          fi
          if [ "${{ inputs.build_type }}" = "release" ]; then
            ./gradlew bundleRelease --no-daemon --console=plain
          else
            ./gradlew bundleDebug --no-daemon --console=plain
          fi

      - name: Android artifact size check
        working-directory: ${{ needs.read-config.outputs.root }}/android
        run: bash ../.pipeline/adapters/android/perf-check.sh

      - uses: actions/upload-artifact@v7
        with:
          name: android-aab
          path: ${{ needs.read-config.outputs.root }}/android/app/build/outputs/bundle/**/*.aab
          if-no-files-found: error
