# Backend API: external Railway service (becalm-backend repo). This repo is client_primary.
module: commitment-management
platform: android
version: 1

behaviors:
  - id: CMT-001
    type: ui_interaction
    description: "CommitmentManagementScreen 진입 시 전체 tracked item 목록이 표시된다. 기본 탭: '전체'. 각 카드는 프로토타입처럼 person_ref 기반 표시명과 source_event_* 맥락을 먼저 인지할 수 있게 표시하고, item_type(action|schedule|decision), subtype(direction|schedule_status|decision_status), title, due_at(KST 표시) 또는 due_hint, 그리고 action item일 때만 action_state를 표시한다. due_is_approximate=true인 경우 due_at 앞에 '~' 마크와 함께 due_hint도 보조 표시('~4/24 (월말)')"
    screen: "CommitmentManagementScreen"
    interaction: "하단 탭 '약속관리' 탭"
    precondition: "인증 완료, Room에 trackable item 5건(action give 2건 + action take 1건 + schedule 1건 + decision 1건) 존재"
    expected: "CommitmentManagementScreen 표시됨. 상단에 CommitmentFilterTabs(전체/액션/내가 한/상대가 한/일정/결정) 표시됨. 5건 모두 표시됨. 각 카드에 person_ref 기반 표시명 + source_event_title/source_type 맥락 + type chip + subtype chip + title + due_at(M/d HH:mm KST) 또는 due_hint 표시됨. action item은 action_state와 direction(give/take) 표시, schedule item은 schedule_status 표시, decision item은 decision_status 표시"
    source: phase2-acceptance
    tests: []

  - id: CMT-002
    type: ui_interaction
    description: "CommitmentFilterTabs — type/action subtype 기준으로 목록을 필터링한다. action은 direction='give'|'take'로 세부 필터 가능하다"
    screen: "CommitmentManagementScreen"
    interaction: "'액션' / '내가 한' / '상대가 한' / '일정' / '결정' 탭 탭"
    precondition: "CommitmentManagementScreen 표시됨, Room에 action give 2건 + action take 1건 + schedule 1건 + decision 1건"
    expected: "'액션' 탭 시 action 3건만 표시됨. '내가 한' 탭 시 direction='give' action 2건만 표시됨. '상대가 한' 탭 시 direction='take' action 1건만 표시됨. '일정' 탭 시 schedule 1건만 표시됨. '결정' 탭 시 decision 1건만 표시됨. '전체' 탭 탭 시 5건 복원됨"
    source: phase2-acceptance
    tests: []

  - id: CMT-003
    type: ui_interaction
    description: "CommitmentCard 탭 시 약속 상세 시트가 열린다 — quote 전문 + 출처 정보(source_event_title, source_event_occurred_at) + person_ref 표시명 + action_state 변경 버튼"
    screen: "CommitmentDetailSheet"
    interaction: "CommitmentCard 탭"
    precondition: "CommitmentManagementScreen에 Commitment 1건 표시됨(source_event_title='2024-03-15 팀 미팅', quote='다음 주까지 보고서 제출')"
    expected: "바텀 시트 열림. quote='다음 주까지 보고서 제출' 전문 표시됨. '출처: 2024-03-15 팀 미팅' 표시됨. source_event_occurred_at 표시됨. action_state 변경 버튼([리마인드]/[팔로업]/[완료]) 표시됨"
    source: phase2-acceptance
    tests: []

  - id: CMT-004
    type: ui_interaction
    description: "D-N 배지 — due_at까지 남은 일수를 KST local date 기준으로 CommitmentCard에 표시한다. D-0(오늘), D-1, D-2 등. due_at이 경과(현재 시각 > due_at)한 pending/reminded/followed_up 상태에서는 빨간색 'D+N' 표시됨. due_is_approximate=true면 'D~N' 형식으로 물결표 prefix"
    screen: "CommitmentManagementScreen"
    interaction: "화면 진입"
    precondition: "오늘 2026-04-18 KST. Room에 Commitment 1건(due_at=2026-04-20T10:00+09:00), 1건(due_at=2026-04-18T15:00+09:00), 1건(due_at=2026-04-12T00:00+09:00, action_state='pending')"
    expected: "2026-04-20 카드: 'D-2' 표시됨. 2026-04-18 카드: 'D-0' 표시됨. 2026-04-12 카드: 'D+6' 빨간색 표시됨. due_is_approximate=true 카드는 'D~N' 표기"
    source: phase2-acceptance
    tests: []

  - id: CMT-005
    type: ui_interaction
    description: "[리마인드] 버튼 탭 시 본인(사용자)에게 마감 1시간 전 local push 알림을 예약한다. action_state를 'reminded'로 변경하고 Railway PATCH /v1/commitments/{id}를 호출한다. AlarmManager는 due_at - 1h 시점에 알람을 등록한다 — 당일 오전 9시 일괄 발송이 아니라 마감 임박 시점 기반. 마감이 이미 지났거나 due_at이 null이면 AlarmManager 등록 없이 action_state만 변경"
    screen: "CommitmentDetailSheet"
    interaction: "[리마인드] 버튼 탭"
    precondition: "CommitmentDetailSheet에서 action_state='pending' Commitment 표시됨"
    expected: "Room의 commitment action_state='reminded'로 UPDATE됨. PATCH /v1/commitments/{id} {action_state: 'reminded'} 호출됨. 버튼 상태 갱신됨. due_at != null && due_at - 1h > now() 인 경우 AlarmManager에 setExactAndAllowWhileIdle(alarm_time = due_at - 1h, PendingIntent.FLAG_IMMUTABLE) 등록됨. userId/DataStore read와 AlarmManager 예약은 suspend/off-main 경로에서 수행하며 UI thread에서 runBlocking을 사용하지 않는다. due_at이 이미 과거거나 null이면 alarm 등록 생략"
    source: phase2-acceptance
    tests: []

  - id: CMT-006
    type: ui_interaction
    description: "[팔로업] 버튼 탭 시 action_state를 'followed_up'으로 변경하고 Railway PATCH /v1/commitments/{id}를 호출한다"
    screen: "CommitmentDetailSheet"
    interaction: "[팔로업] 버튼 탭"
    precondition: "CommitmentDetailSheet에서 action_state='pending' 또는 'reminded' Commitment 표시됨"
    expected: "Room의 commitment action_state='followed_up'으로 UPDATE됨. PATCH /v1/commitments/{id} {action_state: 'followed_up'} 호출됨. 카드 상태 갱신됨"
    source: phase2-acceptance
    tests: []

  - id: CMT-007
    type: ui_interaction
    description: "[완료] 버튼 탭 시 action_state를 'completed'로 변경하고 완료 섹션으로 이동된다. Railway PATCH /v1/commitments/{id} 호출됨"
    screen: "CommitmentDetailSheet"
    interaction: "[완료] 버튼 탭"
    precondition: "CommitmentDetailSheet에서 action_state='pending'/'reminded'/'followed_up' Commitment 표시됨"
    expected: "Room의 commitment action_state='completed'로 UPDATE됨. PATCH /v1/commitments/{id} {action_state: 'completed'} 호출됨. 카드가 '완료된 약속' 섹션으로 이동됨"
    source: phase2-acceptance
    tests: []

  - id: CMT-008
    type: lifecycle
    description: "AlarmManager 알림 — CMT-005에서 예약된 alarm이 due_at - 1h 시점에 local push notification을 발송한다. action_state='completed'|'cancelled'인 약속은 사용자가 이미 처리/취소한 것이므로 알람 시각에 도달했더라도 notification 발송 없이 silent drop"
    trigger: "AlarmManager 스케줄된 알람 실행 (alarm_time = due_at - 1h)"
    precondition: "CMT-005에서 등록된 alarm이 alarm_time에 도달, Room에 해당 commitment 존재"
    expected: "AlarmReceiver가 최신 action_state를 Room에서 재조회 → pending/reminded/followed_up 중 하나면 notification 발송, completed/cancelled면 silent drop. 발송 시 title: '곧 마감되는 약속 (1시간 뒤)', body: '[내가 한/상대가 한] {commitment.title}' — direction 배지는 실제 direction 값으로 치환. 탭 시 CommitmentDetailSheet(id={commitment.id})로 딥링크됨. Notification channel: 'commitment_due_soon' (IMPORTANCE_HIGH)"
    source: phase2-acceptance
    tests: []

  - id: CMT-009
    type: ui_interaction
    description: "완료된 약속 섹션 — '이행 완료' 섹션이 활성 약속 목록 아래에 접힌 상태로 표시된다. 탭 시 펼쳐져 completed commitments 목록이 표시됨"
    screen: "CommitmentManagementScreen"
    interaction: "'이행 완료' 섹션 헤더 탭"
    precondition: "CommitmentManagementScreen 표시됨, Room에 action_state='completed' Commitment 2건 + action_state='pending' 1건"
    expected: "상단: pending 1건 표시됨. 하단: '이행 완료 (2)' 섹션 헤더 표시됨. 헤더 탭 시 completed 2건 펼쳐짐. 완료 카드는 회색 처리(dimmed)됨"
    source: phase2-acceptance
    tests: []

  - id: CMT-010
    type: gesture
    description: "pull-to-refresh 시 CommitmentManagementScreen은 Room 목록을 즉시 재조회하고, 동시에 foreground catch-up(ING-011) + 즉시 업로드(SYNC-006)를 트리거한다. 서버 GET으로 Room을 역갱신하지 않는다"
    gesture: "pull-to-refresh"
    screen: "CommitmentManagementScreen"
    precondition: "CommitmentManagementScreen 표시됨, 네트워크 연결됨"
    expected: "pull-to-refresh 즉시 현재 action_state 필터로 Room 목록 재조회됨. 동시에 ING-011이 실행되어 새 source event를 로컬 수집하고, 그 결과 생성된 commitments가 Room에 반영되면 목록이 갱신됨. pending mutation이 있으면 SYNC-006으로 mirror flush가 시작된다"
    source: phase2-acceptance
    tests: []

  - id: CMT-011
    type: lifecycle
    description: "시스템 자동 'overdue' 전이 — due_at 경과 후 24시간이 지나도 completed/cancelled로 전환되지 않은 pending/reminded/followed_up 약속은 주기적 워커가 action_state='overdue'로 자동 UPDATE한다. 24시간 grace period는 당일 마감 직후 사용자가 즉시 completed 처리할 시간을 보장하기 위함"
    trigger: "WorkManager OverdueSweepWorker 실행 (6시간 주기, KEEP policy)"
    precondition: "Room에 due_at IS NOT NULL AND due_at < now() - 24h AND action_state IN ('pending','reminded','followed_up') commitment 존재"
    expected: "해당 commitments에 대해 Room UPDATE action_state='overdue'. Railway PATCH /v1/commitments/{id} {action_state:'overdue'} 배치 호출 (네트워크 가용 시). OverdueSweepWorker는 사용자 수동 action 없이 system-derived. UI는 'overdue'를 기존 D+N 빨간색 외에 '놓침' 배지로 구분. 사용자는 overdue 상태에서도 [팔로업]·[완료]·[취소] 가능 (재전이 경로)"
    source: phase2-acceptance
    tests: []

  - id: CMT-012
    type: ui_interaction
    description: "[취소] 버튼 탭 시 action_state='cancelled'로 전이한다 — 약속 자체가 무효화됐거나 LLM 오추출이어서 사용자가 더 이상 추적할 필요가 없음을 의미. completed와 달리 '이행 완료'가 아닌 '폐기'로 별도 집계"
    screen: "CommitmentDetailSheet"
    interaction: "[취소] 버튼 탭"
    precondition: "CommitmentDetailSheet에서 action_state IN ('pending','reminded','followed_up','overdue') Commitment 표시됨"
    expected: "Room의 commitment action_state='cancelled'로 UPDATE됨. PATCH /v1/commitments/{id} {action_state:'cancelled'} 호출됨. 카드가 기본 목록에서 사라지고 '취소된 약속' 섹션(접힌 상태)으로 이동. CMT-005에서 등록된 AlarmManager alarm이 있으면 AlarmManager.cancel()로 해제. 사용자에게 CMT-013 undo Snackbar 표시"
    source: phase2-acceptance
    tests: []

  - id: CMT-013
    type: ui_interaction
    description: "action_state 변경(completed 또는 cancelled) 후 5초 이내 Undo Snackbar 제공 — [실행 취소] 탭 시 직전 action_state로 복원한다. 다른 action_state 전이(reminded/followed_up/overdue)에는 Undo 없음 (reversible이지만 사용자 실수 가능성 낮음)"
    screen: "CommitmentManagementScreen | CommitmentDetailSheet"
    interaction: "[완료] 또는 [취소] 탭 직후 Snackbar 표시 → [실행 취소] 탭 (또는 5초 dismiss)"
    precondition: "방금 completed 또는 cancelled로 전이한 commitment, Snackbar 표시 중, 5초 경과 전"
    expected: "Snackbar: '완료로 변경되었습니다. [실행 취소]' (또는 '취소되었습니다. [실행 취소]'). [실행 취소] 탭 시 Room의 action_state가 직전 값(예: pending/reminded/followed_up/overdue)으로 UPDATE됨. PATCH /v1/commitments/{id} {action_state: 직전값} 호출됨. completed→undo 시 해제됐던 AlarmManager alarm은 재등록하지 않음(사용자가 다시 [리마인드] 필요). 5초 dismiss 시 Snackbar 사라지며 전이는 확정됨"
    source: phase2-acceptance
    tests: []

invariants:
  - "CommitmentManagementScreen은 Room(로컬) 데이터를 primary source로 사용한다"
  - "action_state 변경은 Room 즉시 UPDATE + Railway PATCH /v1/commitments/{id} 비동기 호출 순서로 처리된다"
  - "PATCH /v1/commitments/{id} 실패 시 Room의 action_state는 낙관적 업데이트 상태를 유지하고 sync_status='pending'으로 재시도 큐에 등록된다"
  - "AlarmManager 알림은 action_state IN ('completed','cancelled') 약속에 대해 발송하지 않는다 (AlarmReceiver가 최신 action_state 재조회 후 silent drop)"
  - "quote 필드는 원문 그대로 표시된다 — 요약 또는 편집 없음"
  - "action_state 전이는 데이터 모델에 정의된 transition matrix를 따른다 — 불법 전이(예: completed→reminded)는 클라이언트·서버 양쪽에서 422로 거부"
  - "overdue 전이는 시스템 자동(CMT-011)이며 사용자 수동으로 overdue 설정할 수 없다 — 사용자는 cancelled로만 명시적 폐기 가능"
  - "Undo Snackbar(CMT-013)는 completed·cancelled 전이에만 제공되며 5초 window 내 1회 복원 가능"
