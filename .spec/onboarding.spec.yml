# Backend API: external Railway service (becalm-backend repo). This repo is client_primary.
module: onboarding
platform: android
version: 2
# Boundary reference: docs/becalm-mvp-boundary.md

behaviors:
  - id: ONB-001
    type: ui_interaction
    description: "첫 실행 시 TermsScreen이 가장 먼저 표시되고 [동의] 탭 시 LoginScreen으로 이동한다"
    screen: "TermsScreen"
    interaction: "[동의] 버튼 탭"
    precondition: "앱 신규 설치 후 첫 실행, DataStore onboarding_completed=false"
    expected: "LoginScreen으로 네비게이션됨. DataStore terms_accepted=true 저장됨"
    source: phase2-acceptance
    tests: []

  - id: ONB-SETUP
    type: ui_interaction
    description: "로그인 직후 온보딩은 단일 Setup 화면으로 진입한다. 약관/개인정보 핵심 요약은 한 페이지 안에서 확인되며, 이후 권한과 소스는 필수/추천/선택 섹션으로 나뉜다. Android 시스템 권한, SAF picker, OAuth 브라우저는 외부 요청으로 순차 표시될 수 있지만 앱 내부 full-screen onboarding page를 권한마다 하나씩 넘기지 않는다"
    screen: "OnboardingSetupScreen"
    interaction: "[선택한 항목 연결] 또는 각 항목 [연결] / [건너뛰기]"
    precondition: "ONB-001(terms_accepted=true) 및 Supabase Auth 로그인 완료, DataStore onboarding_completed=false"
    expected: "OnboardingSetupScreen이 표시됨. 필수 섹션은 이미 완료된 약관/로그인 및 개인정보 핵심 안내를 표시한다. 추천 섹션은 연락처, 알림, 녹음 폴더를 표시한다. 선택 섹션은 Gmail, Outlook Mail, Google Calendar, Outlook Calendar를 표시한다. 사용자가 모든 선택 항목을 건너뛰어도 onboarding_completed=true 저장 후 main 화면으로 진입 가능하다. 기존 개별 onboarding route는 설정/복구/호환 경로로만 남는다"
    source: product-onboarding-refactor
    tests: []

  - id: ONB-PIPA
    type: consent
    description: "PIPA 제3자 제공 + 국외 이전 동의는 standalone 필수 페이지가 아니라 관련 소스 연결 직전의 inline consent로 처리한다. 음성 녹음 폴더를 연결할 때는 Google LLC Vertex AI(미국 법인, 데이터 처리 리전 asia-northeast3 서울)에 오디오를 전송한다는 사실을 명시 고지하고 동의가 저장된 뒤 SAF picker를 실행한다"
    screen: "OnboardingSetupScreen"
    interaction: "녹음 폴더 [연결] 또는 음성 처리 consent action"
    precondition: "ONB-001(terms_accepted=true) 및 Supabase Auth 로그인 완료, DataStore pipa_third_party_consent 미설정"
    expected: "inline 고지문에 다음 내용이 표시됨 — (1) 제공받는 자: Google LLC, (2) 제공 항목: 녹음 파일 전체 오디오 바이트, (3) 제공 목적: 약속/할 일 자동 추출(Gemini 2.5 Flash audio multimodal), (4) 데이터 처리 리전: asia-northeast3(서울), (5) 보유 및 이용 기간: 요청 처리 후 즉시 삭제(ZDR), (6) 거부 권리 및 불이익: 동의 거부 시 음성 자동 처리 기능만 비활성화되고 나머지 앱 기능은 정상 사용 가능. 동의 저장 후 녹음 폴더 SAF picker가 실행된다"
    source: phase2-acceptance
    tests: []

  - id: ONB-002
    type: ui_interaction
    description: "Setup 화면의 녹음 폴더 항목은 Samsung One UI 기본 'Recordings/' 경로를 자동 탐색한다. Samsung One UI 6.x 기준 음성 녹음(Voice Recorder)과 통화 녹음(Call)은 동일한 상위 'Recordings/' 폴더 하위의 서로 다른 서브디렉토리에 저장되므로 상위 폴더 단일 SAF grant로 두 경로를 동시에 커버한다"
    screen: "OnboardingSetupScreen"
    interaction: "화면 진입 (자동)"
    precondition: "ONB-PIPA 완료(pipa_third_party_consent=true), READ_MEDIA_AUDIO 권한 미부여"
    expected: "OnboardingSetupScreen의 녹음 폴더 항목에서 자동 탐색 결과가 사용된다. 자동 탐색 우선순위: (1) '/storage/emulated/0/Recordings/' (Samsung One UI 6.x 표준), (2) '/storage/emulated/0/VoiceRecorder/' (일부 구형/변형 기종 fallback). 발견 시 SAF picker 초기 위치로 사용하고, 모두 실패 시 수동 folder picker로 폴백한다. pipa_third_party_consent=false인 경우 녹음 자동 처리만 비활성화되고 setup 진행은 막지 않는다"
    source: phase2-acceptance
    tests: []

  - id: ONB-003
    type: permission
    description: "녹음 폴더 권한 요청 시 READ_MEDIA_AUDIO + SAF URI 권한을 요청한다. SAF grant는 상위 'Recordings/' 단일 URI에 부여되며 하위 'Voice Recorder/'(source_type='voice'), 'Call/'(source_type='call_recording'), 앱 생성 'BeCalm Meetings/'(source_type='meeting') 서브디렉토리를 동시에 커버한다 — 사용자는 한 번의 폴더 선택으로 녹음 감지와 미팅 자료 저장을 모두 활성화한다"
    os_permission: "READ_MEDIA_AUDIO"
    precondition: "OnboardingSetupScreen 표시됨, 녹음 폴더 항목 미연결, READ_MEDIA_AUDIO 미부여"
    expected: "시스템 READ_MEDIA_AUDIO 권한 다이얼로그 표시됨. 승인 시 SAF folder picker가 'Recordings/' 초기 위치로 열림. grant된 URI는 tree permission으로 하위 서브디렉토리 traverse를 포함하므로 음성/통화 두 폴더를 별도 grant 없이 감지한다"
    source: phase2-acceptance
    tests: []

  - id: ONB-CONTACTS
    type: permission
    description: "연락처 권한 요청 화면 — PIPA 사유 고지 후 [허용] / [나중에] 선택. PIPA 동의 분기 이후의 조건부 단계이며 recording-folder step 수행 여부와 무관하게 진입 가능해야 한다"
    screen: "OnboardingSetupScreen"
    interaction: "[허용] 또는 [나중에] 버튼 탭"
    precondition: "ONB-002/003 완료 또는 ONB-PIPA 거부로 recording-folder step이 스킵된 후, READ_CONTACTS 미부여"
    expected: "OnboardingSetupScreen의 연락처 항목에 고지문이 표시된다: '연락처 접근은 약속 상대방의 이름·회사·직함을 앱 안에서만 표시하는 데 사용되며 서버로 전송되지 않습니다'. [허용] 탭 시 시스템 READ_CONTACTS 권한 다이얼로그 표시됨. 승인 또는 거부 후 setup 화면에 남는다. [나중에] 탭 시 해당 항목이 skipped 상태가 된다"
    source: phase2-acceptance
    tests: []

  - id: ONB-004
    type: ui_interaction
    description: "Gmail OAuth 연결 항목에서 [건너뛰기] 탭 시 같은 Setup 화면에 남고 해당 항목만 skipped 상태가 된다"
    screen: "OnboardingSetupScreen"
    interaction: "Gmail row [건너뛰기] 버튼 탭"
    precondition: "Setup 화면, Gmail 미연결"
    expected: "OnboardingSetupScreen에 남아 Gmail row가 건너뜀 상태로 표시된다. DataStore gmail_connected=false 유지"
    source: phase2-acceptance
    tests: []

  - id: ONB-005
    type: ui_interaction
    description: "배터리 최적화 예외 요청은 첫 진입을 막지 않는 후속 추천이다. Setup 완료 조건에 포함하지 않으며 기존 BatteryOptimizationScreen은 설정/복구 경로로 유지한다"
    screen: "OnboardingSetupScreen"
    interaction: "Setup 완료"
    precondition: "로그인 후 첫 setup"
    expected: "BATTERY_OPT step은 skipped 또는 later 상태로 저장될 수 있으며 main 화면 진입을 막지 않는다"
    source: phase2-acceptance
    tests: []

  - id: ONB-006
    type: ui_interaction
    description: "온보딩 완료 후 재실행 시 TermsScreen을 건너뛰고 TodayTimelineScreen으로 바로 이동한다"
    screen: "SplashScreen"
    interaction: "앱 재실행"
    precondition: "DataStore onboarding_completed=true, terms_accepted=true, Supabase Auth 세션 유효"
    expected: "TodayTimelineScreen으로 바로 이동됨 (TermsScreen, LoginScreen 건너뜀)"
    source: phase2-acceptance
    tests: []

  - id: ONB-007
    type: lifecycle
    description: "온보딩 실패 이벤트가 Sentry에 전송된다"
    trigger: "온보딩 중 OAuth 인증 실패 또는 권한 거부 발생"
    precondition: "Sentry DSN 설정됨, 온보딩 진행 중"
    expected: "Sentry에 onboarding_step_failed 이벤트 전송됨 (step 이름, error 포함)"
    source: phase2-acceptance
    tests: []

  - id: ONB-008
    type: lifecycle
    description: "온보딩 완료는 main 화면 진입을 우선한다. 초기 동기화는 앱 런타임/Today source status에서 진행되며 standalone ColdSyncScreen은 복구/호환 route로 유지한다"
    trigger: "OnboardingSetupScreen [BeCalm 시작] 또는 [나중에 설정]"
    precondition: "DataStore onboarding_completed=false, Room 전체 0건"
    expected: "DataStore onboarding_completed=true 저장 후 Today로 이동한다. cold sync 또는 source refresh는 런타임 작업으로 예약되며 main 화면 진입을 막지 않는다"
    source: phase2-acceptance
    tests: []

  - id: ONB-009
    type: lifecycle
    description: "외부 브라우저/OAuth/설정 앱 왕복 또는 프로세스 재생성 후에도 완료한 온보딩 step은 완료 상태로 복원되고, 앱은 첫 미완료 step부터 재개한다"
    trigger: "온보딩 중 OAuth 브라우저 또는 OS Settings로 이동한 뒤 앱으로 복귀"
    precondition: "DataStore onboarding_completed=false, 하나 이상의 onboarding step terminal status가 저장됨"
    expected: "SplashScreen은 onboarding step status와 provider consent/connected flag를 읽어 첫 미완료 step으로 이동한다. 이미 GRANTED/COMPLETE/SKIPPED/DENIED인 step은 다시 요구하지 않는다. 이메일 PIPA consent를 이미 수락했지만 provider 연결이 미완료인 경우 PIPA 화면이 아니라 해당 connect 화면으로 재개한다"
    source: runtime-debug
    tests: []

invariants:
  - "이용약관 미동의 시 절대 앱 기능에 접근할 수 없다"
  - "온보딩은 권한별 full-screen 순차 진행이 아니라 단일 Setup 화면 중심이다. 건너뛴 OAuth 소스는 설정 화면에서 재연결 가능하다"
  - "DataStore onboarding_completed=true는 OnboardingSetupScreen 완료 또는 [나중에 설정] 후에 기록된다"
  - "DataStore는 onboarding_completed와 별도로 per-step terminal status를 저장한다 — 외부 OAuth/설정 화면 왕복이나 프로세스 재생성 후 이미 완료한 step을 다시 요구하지 않는다"
  - "CONTACTS 권한 거부는 온보딩을 중단시키지 않는다 — graceful skip"
  - "PIPA 제3자 제공 + 국외 이전 동의 거부는 온보딩을 중단시키지 않는다 — 음성 기능만 비활성화되고 Settings에서 추후 변경 가능"
  - "온보딩은 고정 12-step 선형 플로우가 아니라 조건부 setup graph다: 약관 → 로그인 → Setup(필수 요약 + 추천 권한 + 선택 소스) → Today"
